name: Conformance

# PR-level conformance gate (design 13 — the authoritative phase). Runs the
# conformance engine over the PR's changed files. Advisory findings are surfaced
# as a job summary; only patterns the profile marks `enforcement: block` (and
# that ship a certified detector) fail the check.

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Install conformance
        working-directory: integration
        run: npm ci || npm install

      - name: Run blocking calibration
        working-directory: integration
        run: npm run eval:blocking

      - name: Run conformance check
        env:
          CONFORMANCE_CATALOGUE_ROOT: ${{ github.workspace }}
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          node "$CONFORMANCE_CATALOGUE_ROOT/integration/bin/conformance.mjs" \
            check --event PR_REVIEW --base "origin/$BASE_REF" \
            | tee "$GITHUB_STEP_SUMMARY"
