name: Conformance PR Review
description: Run the Quality Software advisory conformance review for a pull request.

inputs:
  base-ref:
    description: Base branch or ref to compare against.
    required: false
    default: main
  node-version:
    description: Node.js version used to run the conformance CLI.
    required: false
    default: "22"
  artifact-name:
    description: Name of the uploaded review artefact.
    required: false
    default: conformance-review

runs:
  using: composite
  steps:
    - name: Setup Node.js
      continue-on-error: true
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Run advisory conformance review
      shell: bash
      env:
        BASE_REF: ${{ inputs.base-ref }}
      run: bash "$GITHUB_ACTION_PATH/review.sh"

    - name: Upload conformance review
      if: always()
      continue-on-error: true
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ runner.temp }}/conformance-review
        if-no-files-found: warn
        retention-days: 14
