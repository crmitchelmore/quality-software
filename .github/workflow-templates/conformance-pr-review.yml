name: Conformance PR Review

on:
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-conformance
  cancel-in-progress: true

jobs:
  conformance-pr-review:
    name: Advisory conformance review
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        continue-on-error: true
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Run advisory conformance review
        # Pin @main to a release tag or commit SHA before making this check required.
        uses: crmitchelmore/quality-software/.github/actions/conformance-pr-review@main
        with:
          base-ref: ${{ github.base_ref || 'main' }}
