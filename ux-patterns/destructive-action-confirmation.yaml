id: destructive-action-confirmation
title: Destructive Action Confirmation
discipline: ux
category: trust-safety
maturity: time-tested
short_description: >-
  Require deliberate, specific confirmation before irreversible or high-impact destructive actions so users
  understand exactly what will be lost.
description: >-
  Destructive action confirmation protects users from actions such as deleting accounts, removing data,
  revoking access, cancelling plans, or applying irreversible bulk changes. Unlike generic confirmation, it
  is reserved for consequences that are severe, hard to undo, or affect other people. The confirmation must
  slow the user just enough to review scope and consequence: what object is affected, what data or access is
  lost, whether recovery is possible, and when it takes effect. The pattern is weakened by overuse; if every
  minor action has a scary prompt, users stop reading the one that matters.
problem: >-
  Destructive controls are easy to click accidentally or misunderstand, and recovery may be impossible or
  costly after the action completes.
context: >-
  Use for irreversible deletion, account closure, permission revocation, data export removal, bulk changes,
  permanent publication, and other high-impact actions.
forces:
  - >-
    Strong confirmation prevents harm, but excessive friction can trap users who legitimately need to clean
    up or leave.
  - >-
    Specific consequence copy builds trust, but requires the system to know and communicate the real scope.
  - >-
    Some actions are technically restorable for a period, so the confirmation should distinguish soft delete
    from permanent deletion.
solution: >-
  Place destructive actions away from primary happy-path controls, label them with the destructive verb, and
  use a confirmation surface that names the affected object and consequence. For very high-stakes actions,
  require typed confirmation, secondary approval, or a delay with cancellation. Offer export, undo, or
  recovery where possible, and do not imply recovery exists when it does not.
when_to_use:
  - >-
    The action deletes, revokes, charges, publishes, or otherwise changes state in a way that is hard to
    reverse.
  - >-
    The scope includes multiple items, other users, or regulated data.
  - >-
    A mistaken action would create support, legal, financial, or safety harm.
anti_patterns:
  - >-
    Asking "Are you sure?" without naming what will be deleted.
  - >-
    Using confirmation modals for routine reversible actions and training users to ignore them.
  - >-
    Styling the destructive action as the primary highlighted button.
heuristics:
  - >-
    Reserve strong confirmation for strong consequences.
  - >-
    Name the object, scope, timing, and recovery limits in the confirmation.
  - >-
    Make the safe escape path visually and semantically clear.
  - >-
    Consider typed confirmation or delay for account-level or bulk irreversible actions.
examples:
  - title: Delete account
    poor: >-
      A red "Delete" button in account settings opens a modal that says "Are you sure?" with Delete as the
      primary button.
    better: >-
      The flow explains that the account, projects, and billing history will be scheduled for deletion,
      offers export first, and requires typing the account name before continuing.
    explanation: >-
      The better version matches friction to consequence and verifies the user understands the exact scope.
  - title: Remove one uploaded image
    poor: >-
      Removing a draft image requires a scary modal and typed confirmation even though the image can be
      re-uploaded.
    better: >-
      The image is removed immediately with an Undo option while the draft remains open.
    explanation: >-
      Not every deletion deserves heavy confirmation; reversible low-stakes actions are better handled by
      undo.
related_practice_patterns:
  - pattern: confirmation-and-undo
    reason: >-
      Destructive confirmation is used when undo alone is insufficient for the risk.
  - pattern: microcopy
    reason: >-
      The confirmation's safety depends on clear consequence copy, not generic warning language.
  - pattern: system-status-visibility
    reason: >-
      Users need status after confirmation when deletion is scheduled, processing, complete, or failed.
related_software_patterns:
  - pattern: memento
    reason: >-
      If the system captures prior state for recovery, the UX can communicate the recovery window accurately.
  - pattern: audit-logging
    reason: >-
      High-impact destructive actions often need an audit trail of who confirmed what and when.
related_philosophies:
  - philosophy: design-of-everyday-things
    reason: >-
      Designing for slips and recovery is central to Norman's treatment of human error.
  - philosophy: nielsen-usability-heuristics
    reason: >-
      Error prevention and user control both motivate explicit destructive-action confirmation.
tags:
  - destructive-actions
  - confirmation
  - safety
  - trust
product_stages:
  - early
  - growth
  - enterprise
ratings:
  early:
    score: 5
    notes: >-
      Essential as soon as users can delete valuable data or close accounts.
  growth:
    score: 5
    notes: >-
      Increasing action volume and team collaboration make clear destructive safeguards more important.
  enterprise:
    score: 5
    notes: >-
      Mandatory for administrative, bulk, and regulated actions, often with audit and approval layers.
references:
  - title: "The Design of Everyday Things"
    author: Don Norman
    year: 2013
  - title: "Confirmation Dialogs Can Prevent User Errors — If Not Overused"
    author: Nielsen Norman Group
    url: "https://www.nngroup.com/articles/confirmation-dialog/"
