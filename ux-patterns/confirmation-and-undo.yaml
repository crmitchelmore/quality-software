id: confirmation-and-undo
title: Confirmation & Undo
discipline: ux
category: feedback-status
maturity: time-tested
short_description: >-
  Protect users from unintended consequences by either asking for confirmation before high-risk actions or
  making low-risk actions easy to undo afterwards.
description: >-
  Confirmation and undo are complementary safeguards. Confirmation interrupts before an action to ensure
  the user understands a consequence; undo lets the user act quickly and recover if the action was mistaken.
  The art is choosing the right protection for the stakes. Low-risk, reversible actions are often better
  served by immediate action plus undo, avoiding habituating users to meaningless prompts. High-risk,
  irreversible, costly, or security-sensitive actions need explicit confirmation with clear consequence
  language. The pattern protects trust by making errors recoverable without slowing every interaction.
problem: >-
  Users misclick, misunderstand, or change their mind. If every action is instant and irreversible, mistakes
  become costly; if every action asks for confirmation, users stop reading and the product feels sluggish.
context: >-
  Applies to delete, archive, send, publish, billing, permission, bulk, and settings changes where the cost
  and reversibility of mistakes vary.
forces:
  - >-
    Undo preserves flow, but requires the system to retain enough state to reverse the action safely.
  - >-
    Confirmation can prevent severe errors, but repeated prompts create habituation and false safety.
  - >-
    Some actions are technically reversible but socially or legally consequential once seen by others.
solution: >-
  Classify actions by consequence and reversibility. For low-risk reversible changes, perform the action,
  show clear feedback, and offer undo for an appropriate window. For high-risk or irreversible changes,
  require a focused confirmation that names the object, consequence, and any recovery limits. Avoid generic
  "Are you sure?" prompts; make the decision specific.
when_to_use:
  - >-
    Users can take actions whose consequences are easy to trigger accidentally.
  - >-
    Some actions are reversible enough to support undo, while others require prior confirmation.
  - >-
    The product needs to balance speed with trust and safety.
anti_patterns:
  - >-
    Confirming every minor action until users reflexively dismiss prompts.
  - >-
    Offering undo for actions that have already exposed private data or triggered external effects.
  - >-
    Using vague confirmation copy that does not identify the object or consequence.
heuristics:
  - >-
    Prefer undo for frequent, low-stakes, reversible actions; reserve confirmation for high-stakes actions.
  - >-
    Confirmation copy should name the exact object and consequence.
  - >-
    Keep undo visible long enough for human correction, but not so long that state becomes ambiguous.
  - >-
    For bulk or destructive actions, show scope before commitment.
examples:
  - title: Archiving a task
    poor: >-
      Every archive click opens a modal asking "Are you sure?", slowing a user cleaning up dozens of tasks.
    better: >-
      The task archives immediately, a toast says "Task archived" with Undo, and the list updates without
      losing the user's place.
    explanation: >-
      The action is low-risk and reversible, so undo protects mistakes while preserving flow.
  - title: Deleting a workspace
    poor: >-
      Deleting an entire workspace is a single red button with no details about what will be removed.
    better: >-
      The confirmation names the workspace, summarises the data that will be deleted, requires the user to
      type the workspace name, and explains recovery limits.
    explanation: >-
      High-consequence actions need deliberate confirmation and specific consequence framing.
related_practice_patterns:
  - pattern: optimistic-ui-feedback
    reason: >-
      Immediate action plus rollback or undo uses the same responsiveness trade-off as optimistic feedback.
  - pattern: destructive-action-confirmation
    reason: >-
      Destructive confirmation is the high-stakes branch of this broader protection pattern.
  - pattern: toast-notification
    reason: >-
      Toasts are a common lightweight surface for short undo windows after reversible actions.
related_software_patterns:
  - pattern: memento
    reason: >-
      Undo often requires capturing previous state so it can be restored safely.
  - pattern: compensating-transaction
    reason: >-
      Reversing a committed operation may require a compensating action rather than a simple state restore.
  - pattern: optimistic-ui
    reason: >-
      Low-risk actions can update immediately while retaining a path to reverse or reconcile.
related_philosophies:
  - philosophy: design-of-everyday-things
    reason: >-
      Norman emphasises designing for error and recovery rather than blaming users for slips.
  - philosophy: nielsen-usability-heuristics
    reason: >-
      User control and freedom is the heuristic behind escape hatches such as undo.
tags:
  - undo
  - confirmation
  - safety
  - error-recovery
product_stages:
  - early
  - growth
  - enterprise
ratings:
  early:
    score: 4
    notes: >-
      Essential for obvious destructive actions; richer undo can wait until the product has stable state
      handling.
  growth:
    score: 5
    notes: >-
      As action volume increases, undo prevents friction while confirmations protect trust.
  enterprise:
    score: 5
    notes: >-
      Critical for bulk, regulated, and administrative workflows, with audit and permission implications.
references:
  - title: "Designing Interfaces"
    author: Jenifer Tidwell, Charles Brewer, and Aynne Valencia
    year: 2020
  - title: "The Design of Everyday Things"
    author: Don Norman
    year: 2013
