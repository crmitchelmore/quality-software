id: optimistic-ui-feedback
title: Optimistic UI Feedback
aka:
  - Optimistic Updates
  - Optimistic Rendering
discipline: ux
category: feedback-status
maturity: established
short_description: >-
  Reflect the user's action in the interface immediately, assuming it will succeed, then reconcile
  with the server result — making the product feel instant while staying honest about failures.
description: >-
  Optimistic UI feedback updates the interface the moment a user acts, before the backend has confirmed
  the change, on the assumption that the operation will usually succeed. A "like" fills in, an item
  appears in the list, a message shows as sent — instantly — while the network request proceeds in the
  background. If the server later rejects the action, the UI rolls back and explains what happened. The
  pattern trades a small risk of having to retract a change for a large gain in perceived responsiveness,
  because users experience the interface at the speed of their own intent rather than the speed of the
  network. Its central design challenge is handling the unhappy path gracefully so the optimism never
  becomes a lie.
problem: >-
  When every action waits for a server round-trip before showing any result, the interface feels slow
  and unresponsive even on fast connections, and users double-tap or abandon actions because they get
  no immediate acknowledgement.
context: >-
  Suits high-frequency, low-stakes actions (likes, toggles, adding to a list, sending chat messages)
  where success is overwhelmingly likely and rollback is cheap to communicate.
forces:
  - Perceived speed competes with truthfulness — showing success early risks showing a result that fails.
  - Rollback must be visible and understandable, or users lose trust when state silently changes.
  - High-stakes or rarely-succeeding actions make optimism dangerous; the cost of a wrong assumption rises.
solution: >-
  Update local state and the view immediately on the user's action, issue the request in the background,
  and keep enough information to reverse the change. On success, quietly confirm. On failure, roll the
  UI back to its prior state and surface a clear, specific message with a way to retry. Reserve the
  pattern for actions with a high success rate and a low cost of reversal.
when_to_use:
  - Actions are frequent, low-risk, and almost always succeed (likes, toggles, reordering).
  - Network latency would otherwise make the interface feel sluggish.
  - You can cheaply represent and reverse the change if the server rejects it.
anti_patterns:
  - Showing optimistic success for irreversible or high-stakes actions (payments, deletions) where a
    wrong assumption is costly.
  - Failing silently on rollback so the user never learns their action did not take effect.
  - Optimistically confirming then leaving stale state when the request errors out.
heuristics:
  - "Visibility of system status — acknowledge instantly, but never fake a final state you cannot honour."
  - "Match the cost of optimism to the stakes: cheap, reversible, high-success actions only."
  - "Make rollback as legible as the original action — same place, clear reason, easy retry."
  - "Preserve the user's other work when reverting; roll back only the failed change."
examples:
  - title: Sending a chat message
    poor: >-
      Tapping send shows a spinner over the composer and the message only appears in the thread once the
      server responds, so a slow network makes the chat feel laggy and users re-send duplicates.
    better: >-
      The message appears in the thread instantly in a subtle "sending" state; on confirmation the state
      clears, and on failure it shows a red "Tap to retry" marker without losing the typed text.
    explanation: >-
      The better version lets the conversation move at the user's pace while still being truthful about
      delivery, and the failure path is explicit rather than silent.
  - title: Choosing where optimism is safe
    poor: >-
      A "Delete account" button optimistically shows the account as gone and signs the user out before
      the server confirms; when the request fails the user is locked out of a still-live account.
    better: >-
      Destructive, irreversible actions show an explicit pending state and only confirm completion after
      the server succeeds, keeping optimism for low-stakes interactions.
    explanation: >-
      Optimism is a tool for cheap, reversible actions; applying it to high-stakes operations turns a
      latency win into a trust and correctness hazard.
related_software_patterns:
  - pattern: optimistic-ui
    reason: >-
      This is the UX expression of the software optimistic-ui implementation pattern; the experience
      design and the client-side state mechanics are two views of the same idea.
  - pattern: optimistic-concurrency-control
    reason: >-
      The server-side optimism the UI mirrors — both assume success and reconcile on conflict, so the
      UI's rollback path should map to the backend's conflict response.
related_philosophies:
  - philosophy: design-of-everyday-things
    reason: >-
      Immediate feedback closing the gulf of evaluation is a core Norman principle; optimistic UI is a
      direct application of giving the user prompt, visible response to action.
tags:
  - perceived-performance
  - feedback
  - latency
  - error-handling
ratings:
  early:
    score: 4
    notes: >-
      Cheap to add to a young product and a strong differentiator on feel; the main risk is skimping on
      the failure path under time pressure.
  growth:
    score: 5
    notes: >-
      As traffic and network diversity grow, optimistic feedback keeps the experience fast across poor
      connections and is well worth the rollback engineering.
  enterprise:
    score: 4
    notes: >-
      Valuable at scale but demands disciplined, consistent rollback and error semantics across many
      surfaces so behaviour stays predictable.
references:
  - title: "The Design of Everyday Things"
    author: Don Norman
    year: 2013
  - title: "Optimistic UI patterns (Apollo / client-state guidance)"
    url: "https://www.apollographql.com/docs/react/performance/optimistic-ui/"
