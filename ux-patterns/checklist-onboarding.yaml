id: checklist-onboarding
title: Checklist Onboarding
discipline: ux
category: onboarding-education
maturity: established
short_description: >-
  Give new users a visible sequence of meaningful setup tasks so they can reach first value, track progress,
  and resume where they left off.
description: >-
  Checklist onboarding organises activation into a small set of concrete tasks: create a project, invite a
  teammate, import data, complete a profile, or publish the first item. It turns an ambiguous blank start
  into a progressable plan. Good checklists are outcome-oriented, not busywork; each item should produce
  user value or unlock a necessary capability. They should adapt to role and context, show completion
  honestly, and get out of the way once the user is activated.
problem: >-
  New users may not know which setup actions matter or how much is left before the product becomes useful,
  leading to stalled activation.
context: >-
  Best for products with several required setup actions, team configuration, data import, or a known path to
  an activation milestone.
forces:
  - >-
    Checklists create momentum, but meaningless tasks train users to complete the checklist rather than
    achieve their goal.
  - >-
    Progress motivates, but inaccurate completion logic undermines trust.
  - >-
    A common checklist is simple, but different roles may need different activation paths.
solution: >-
  Define the smallest sequence that leads to first meaningful value for each important segment. Write each
  item as a user outcome, deep-link it to the relevant place, mark completion from real behaviour, and allow
  non-essential items to be skipped or dismissed. Remove or transform the checklist once onboarding is done.
when_to_use:
  - >-
    Activation requires multiple actions that users can complete over one or more sessions.
  - >-
    The product can reliably detect completion of each task.
  - >-
    Users benefit from seeing what remains before the product is fully useful.
anti_patterns:
  - >-
    Adding checklist items because the business wants feature exposure rather than because users need them.
  - >-
    Marking tasks complete when the user merely views a page.
  - >-
    Keeping the onboarding checklist permanently visible after it has stopped being useful.
heuristics:
  - >-
    Checklist items should be valuable verbs, not marketing nouns.
  - >-
    Keep the list short enough to feel achievable.
  - >-
    Use real completion signals and show progress honestly.
  - >-
    Adapt or hide tasks that are irrelevant to the user's role or plan.
examples:
  - title: Team workspace setup
    poor: >-
      The checklist includes "Visit reports", "Open settings", and "Read what's new" because the team wants
      clicks across the product.
    better: >-
      The checklist includes "Create your first project", "Invite one teammate", and "Add three tasks", each
      linking directly to the relevant action.
    explanation: >-
      The better list builds towards a useful workspace rather than vanity feature exposure.
  - title: Data import product
    poor: >-
      Import is shown as complete when the user starts an upload, even if validation later fails.
    better: >-
      The item completes only after records import successfully, with failed import status and retry kept in
      the checklist.
    explanation: >-
      Honest completion preserves trust and keeps users oriented when setup spans background work.
related_practice_patterns:
  - pattern: empty-state-onboarding
    reason: >-
      Empty states often point users to the next checklist item when content has not yet been created.
  - pattern: progress-indicator
    reason: >-
      A checklist is a progress indicator for onboarding tasks rather than a single operation.
  - pattern: aha-moment-activation
    reason: >-
      Checklist tasks should lead users to the product's activation or aha moment.
related_software_patterns:
  - pattern: state-machine-ui
    reason: >-
      Checklist progress should be represented by explicit states so completion, skip, and retry are reliable.
  - pattern: idempotency
    reason: >-
      Setup tasks may be retried; idempotent operations prevent duplicate projects, invites, or imports.
related_philosophies:
  - philosophy: product-led-growth
    reason: >-
      Checklists are a common product-led growth mechanism for guiding self-serve users to activation.
  - philosophy: nielsen-usability-heuristics
    reason: >-
      The pattern supports visibility of progress and user control during setup.
tags:
  - onboarding
  - activation
  - progress
  - setup
product_stages:
  - early
  - growth
  - enterprise
ratings:
  early:
    score: 4
    notes: >-
      Valuable once the team knows the activation path; before that, it can hard-code the wrong journey.
  growth:
    score: 5
    notes: >-
      Excellent fit for scaling self-serve onboarding and improving activation across cohorts.
  enterprise:
    score: 4
    notes: >-
      Useful for administrators and implementation teams, though role-based variation and services-led setup
      may complicate it.
references:
  - title: "User Onboarding"
    author: Samuel Hulick
    year: 2014
  - title: "Product-Led Onboarding"
    author: Ramli John
    year: 2021
