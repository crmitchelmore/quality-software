id: microcopy
title: Microcopy
aka:
  - Interface Copy
  - UX Copy
discipline: ux
category: content-design
maturity: established
short_description: >-
  Use small pieces of interface text to clarify action, reduce anxiety, prevent mistakes, and guide users
  at the exact moment they need help.
description: >-
  Microcopy is the short, purposeful text embedded in an interface: button labels, field hints, helper
  text, empty prompts, error summaries, confirmation messages, tooltips, and permission explanations. It is
  not decorative wording; it is part of the interaction design. Good microcopy answers the user's immediate
  question in plain language, sets expectations about what will happen, and removes ambiguity around risk,
  privacy, cost, or next steps. Because it appears at moments of action, small wording choices can have
  outsized effects on trust and completion.
problem: >-
  Users hesitate, misinterpret controls, or make avoidable errors when interface text is vague, internally
  worded, overly clever, or missing at the decision point.
context: >-
  Applies across forms, onboarding, payments, permissions, destructive actions, search, empty states,
  settings, and any interface where a few words shape confidence and comprehension.
forces:
  - Brevity is necessary in UI, but too little context can make decisions ambiguous.
  - Brand voice can create warmth, but cleverness can obscure meaning at critical moments.
  - Helpful text near every control can become clutter unless prioritised by user uncertainty.
solution: >-
  Write microcopy from the user's task and question, not from the system's implementation. Use specific
  verbs, concrete nouns, and plain language. Put guidance where the decision happens, explain consequences
  before commitment, and reserve personality for low-stakes moments. Test copy in prototypes and production
  support loops, especially where users abandon, ask for help, or make errors.
when_to_use:
  - A user must decide what an action does, what information to enter, or whether a consequence is safe.
  - Support questions or usability tests show confusion around a label, state, or requirement.
  - The product needs to build trust around permissions, payments, data use, or destructive actions.
anti_patterns:
  - Using witty or branded language where users need clarity about risk or recovery.
  - Labelling buttons with generic verbs such as "Submit" when the outcome is more specific.
  - Explaining a validation rule only after the user violates it.
heuristics:
  - "Answer the user's next question in the fewest clear words."
  - "Use specific action labels: say what will happen, not merely that something will happen."
  - "Put help before the error when a requirement is predictable."
  - "Let brand voice support clarity, never compete with it."
examples:
  - title: Button label
    poor: >-
      A billing screen ends with a primary button labelled "Submit", leaving users unsure whether they are
      saving a draft, starting a trial, or charging a card.
    better: >-
      The button says "Start paid plan" and supporting text states "Your card will be charged today".
    explanation: >-
      The better copy makes the consequence explicit at the moment of commitment, reducing anxiety and surprise.
  - title: Field helper text
    poor: >-
      A password field waits until submission to say the password is invalid, without stating the rule.
    better: >-
      Helper text under the field says "Use at least 12 characters" before entry and updates as the user types.
    explanation: >-
      Predictable requirements belong before or during input so users can succeed without trial and error.
related_software_patterns:
  - pattern: problem-details
    reason: >-
      Structured error payloads give microcopy reliable fields for human-readable explanations and recovery actions.
  - pattern: input-validation
    reason: >-
      Validation rules need clear helper and error copy so constraints become understandable to users.
related_practice_patterns:
  - pattern: error-message-design
    reason: >-
      Error messages are a high-stakes form of microcopy with specific recovery requirements.
  - pattern: plain-language
    reason: >-
      Plain-language practice keeps short interface text understandable under time pressure.
  - pattern: permission-priming
    reason: >-
      Permission prompts depend on concise copy that explains value and data use before the system dialogue appears.
related_philosophies:
  - philosophy: dont-make-me-think
    reason: >-
      Microcopy reduces cognitive effort by making actions and consequences self-evident.
  - philosophy: design-of-everyday-things
    reason: >-
      Text often acts as the signifier that makes an affordance understandable.
tags:
  - ux-writing
  - clarity
  - forms
  - trust
product_stages:
  - early
  - growth
  - enterprise
ratings:
  early:
    score: 5
    notes: >-
      Cheap, fast, and high leverage for shaping trust and comprehension before heavier design investment is possible.
  growth:
    score: 5
    notes: >-
      Essential as flows multiply and inconsistent labels start to create measurable friction.
  enterprise:
    score: 4
    notes: >-
      Still critical, though governance, localisation, and legal review can make iteration slower.
references:
  - title: "Microcopy: The Complete Guide"
    author: Kinneret Yifrah
    year: 2017
  - title: "Strategic Writing for UX"
    author: Torrey Podmajersky
    year: 2019
