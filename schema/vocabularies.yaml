# Controlled vocabularies for the pattern catalogue.
# Tooling validates that pattern YAML only uses values defined here.

scales:
  - architectural   # large-scale, system/structure-level
  - integration     # crossing process/service/message boundaries
  - data            # persistence, storage, data flow
  - concurrency     # threading, async, parallelism
  - design          # mid-level object/module design (e.g. GoF)
  - implementation  # small-scale, code-level idioms
  - frontend        # UI/client structural patterns
  - organisational  # team/process-shaped patterns

