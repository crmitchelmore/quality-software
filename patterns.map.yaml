# patterns.map.yaml - detailed companion to the candidate patterns.config.yaml.
# Best-effort review evidence only. Review before relying on it as canonical.
version: 1
meta:
  detector: human-review-plus-codebase-onboarding
  limitations:
    - Pattern evidence is curated from repository structure, docs, tests, and integration code review; it is not a formal proof of full conformance.
    - Candidate patterns below should be revisited as the runtime and catalogue surfaces evolve.
    - Product and UX practices are advisory because the repository is primarily a catalogue/tooling project, not a production UI.

patterns:
  - id: modular-monolith
    title: Modular Monolith
    altitude: high
    confidence: medium
    flavour: Cohesive multi-part repository with explicit bounded areas rather than deployable services.
    evidence:
      - README documents catalogue, practice catalogue, validator design, and runnable integration as four project parts.
      - Source-of-truth YAML, generated docs, tools, integration, and design docs are separated by directory.
    anchors:
      - README.md
      - patterns/
      - philosophies/
      - product-patterns/
      - ux-patterns/
      - tools/src/
      - integration/src/
      - design/validator/
    philosophies: [conceptual-integrity, information-hiding]

  - id: hexagonal-architecture
    title: Hexagonal Architecture
    altitude: high
    confidence: medium
    flavour: Runtime-agnostic conformance core with adapters for Copilot hooks, MCP, CLI, plugin packaging, and PR workflow.
    evidence:
      - contract.ts defines the canonical event, change set, finding, detector, and verdict seam.
      - engine.ts contains the shared conformance engine; adapters translate runtime payloads rather than owning conformance logic.
      - design/validator/12-integration-contract.md states one engine, one contract, thin adapters.
    anchors:
      - integration/src/contract.ts
      - integration/src/engine.ts
      - integration/src/adapters/copilot.ts
      - integration/src/adapters/runtimes.ts
      - integration/src/mcp.ts
      - design/validator/12-integration-contract.md
    philosophies: [information-hiding, clean-architecture-solid]

  - id: layered-architecture
    title: Layered Architecture
    altitude: high
    confidence: medium
    flavour: Contract, engine, model, detector, policy, review, adapter, and presentation layers within the integration package.
    evidence:
      - integration/src is split into contract, model, detectors, policy, review, adapters, judge, llm, cli, and mcp modules.
      - Tests mirror these layers with engine, profile, model, policy, adapter, PR review, and judge coverage.
    anchors:
      - integration/src/contract.ts
      - integration/src/model/
      - integration/src/detectors/
      - integration/src/policy/
      - integration/src/review/
      - integration/src/adapters/
      - integration/test/
    philosophies: [conceptual-integrity]

  - id: microkernel
    title: Microkernel
    altitude: high
    confidence: low
    flavour: Core conformance engine plus plugin-like extension surfaces for hooks, skills, MCP tools, PR action, and future runtimes.
    evidence:
      - integration/src/plugin/install.ts builds and registers the Copilot plugin bundle from one runtime-facing extension seam.
      - .github/skills and adapters expose multiple runtime-specific extension points over the same core.
    anchors:
      - integration/src/plugin/install.ts
      - integration/plugin/plugin.json
      - .github/hooks/conformance.json
      - .github/skills/conformance-review/SKILL.md
      - .github/skills/pr-pattern-review/SKILL.md
      - integration/src/adapters/
    philosophies: [information-hiding]

  - id: pipes-and-filters
    title: Pipes and Filters
    altitude: high
    confidence: low
    flavour: Evidence extraction, candidate selection, deterministic certification, LLM advisory judgement, and finding projection as separate stages.
    evidence:
      - project-map.ts separates parsing modules from deriving edges, duplicates, candidates, and capabilities.
      - judge.ts routes pattern/region pairs through prompt construction, parsing, span validation, and advisory findings.
      - policy/certify.ts separately certifies deterministic violations.
      - review/pr-review.ts coordinates the PR review flow while baseline reconstruction, consistency advisories, reuse checks, and summaries live in separate review filters.
    anchors:
      - integration/src/model/project-map.ts
      - integration/src/judge/judge.ts
      - integration/src/policy/certify.ts
      - integration/src/engine.ts
      - integration/src/review/pr-review.ts
      - integration/src/review/baseline.ts
      - integration/src/review/consistency.ts
      - integration/src/review/reuse.ts
      - integration/src/review/summary.ts
    philosophies: [simple-made-easy]

  - id: adapter
    title: Adapter
    altitude: medium
    confidence: high
    flavour: Runtime payloads are adapted to the canonical ChangeSet/Verdict contract.
    evidence:
      - copilot.ts maps Copilot hook payloads to canonical events and projects verdicts back to hook JSON.
      - runtimes.ts is the dialect expansion seam for Copilot, Claude, Codex, and generic hook payloads.
    anchors:
      - integration/src/adapters/copilot.ts
      - integration/src/adapters/runtimes.ts
      - integration/src/mcp.ts
    philosophies: [information-hiding]

  - id: strategy
    title: Strategy
    altitude: medium
    confidence: medium
    flavour: Providers, detectors, and model-routing decisions are replaceable policy objects behind common interfaces.
    evidence:
      - model/lang/registry.ts selects language providers for TypeScript and universal extraction.
      - detectors/index.ts builds the active detector set from a resolved profile.
      - llm/router.ts routes pattern judgement by scale/event and budget.
    anchors:
      - integration/src/model/lang/registry.ts
      - integration/src/model/lang/types.ts
      - integration/src/detectors/index.ts
      - integration/src/llm/router.ts
    philosophies: [simple-made-easy]

  - id: facade
    title: Facade
    altitude: medium
    confidence: medium
    flavour: CLI and MCP provide simple operational surfaces over catalogue, profile, engine, onboarding, and review internals.
    evidence:
      - cli.ts exposes hook, init, onboard, check, review, install-copilot, doctor, and profile commands while delegating deeper behaviour.
      - mcp.ts exposes conformance_profile, conformance_check_change, conformance_suggest_reuse, and conformance_init.
      - review/pr-review.ts remains the stable PR-review facade while specialised review modules hide baseline, consistency, reuse, summary, and git details.
    anchors:
      - integration/src/cli.ts
      - integration/src/mcp.ts
      - integration/src/review/pr-review.ts
    philosophies: [a-philosophy-of-software-design]

  - id: factory-method
    title: Factory Method
    altitude: medium
    confidence: medium
    flavour: Construction of detectors, evidence-derived profiles, inventories, and pattern maps is centralised.
    evidence:
      - buildDetectors(profile) selects detector variants from the resolved profile.
      - proposeProfileFromEvidence(map, catalogue) converts evidence into a conservative candidate profile.
      - buildPatternMap(map, catalogue) converts evidence into reviewable anchors and flavours.
      - copilotPluginManifest() and installCopilotPlugin() centralise construction of the local plugin bundle.
    anchors:
      - integration/src/detectors/index.ts
      - integration/src/model/proposal.ts
      - integration/src/model/pattern-map.ts
      - integration/src/model/inventory.ts
      - integration/src/plugin/install.ts
    philosophies: [a-philosophy-of-software-design]

  - id: dependency-injection
    title: Dependency Injection
    altitude: medium
    confidence: medium
    flavour: Core types receive catalogues, profiles, clients, routers, budgets, and registries explicitly.
    evidence:
      - Engine is constructed with a resolved profile and catalogue.
      - LLMJudge accepts an LLM client, router, budget, cache, and audit sink through options.
      - Evidence-map functions accept provider registries and layer-prefix options.
      - installCopilotPlugin() accepts catalogue root, home directory, node path, output streams, and command execution boundary explicitly.
    anchors:
      - integration/src/engine.ts
      - integration/src/judge/judge.ts
      - integration/src/model/project-map.ts
      - integration/src/plugin/install.ts
    philosophies: [clean-architecture-solid]

  - id: contract-first-api
    title: Contract-First API
    altitude: medium
    confidence: high
    flavour: Public seams are expressed as TypeScript contracts, JSON schemas, YAML manifests, and documented hook/MCP contracts.
    evidence:
      - contract.ts is the runtime-agnostic event/verdict contract.
      - schema/ defines source-of-truth pattern, practice-pattern, and philosophy schemas.
      - design/validator/12-integration-contract.md documents canonical events and verdict fields.
      - integration/src/plugin/install.ts owns the Copilot plugin manifest and install contract.
      - integration/src/review/types.ts owns the PR review input/result contract and is re-exported by the facade for backwards compatibility.
    anchors:
      - integration/src/contract.ts
      - integration/src/plugin/install.ts
      - integration/src/review/types.ts
      - schema/pattern.schema.json
      - schema/practice-pattern.schema.json
      - schema/philosophy.schema.json
      - design/validator/12-integration-contract.md
    philosophies: [conceptual-integrity]

  - id: guard-clause
    title: Guard Clause
    altitude: low
    confidence: medium
    flavour: Missing profile, missing files, invalid payloads, unavailable LLM clients, and unsupported hook phases return early.
    evidence:
      - Copilot adapter returns empty JSON on missing profile/path/content and catches hook errors.
      - profile.ts fails fast on missing profile and direct contradictions.
      - judge.ts returns no findings in offline mode and rejects unaligned evidence spans.
      - installCopilotPlugin() exits early when an installed plugin is present without --force or unregistering fails.
    anchors:
      - integration/src/adapters/copilot.ts
      - integration/src/profile.ts
      - integration/src/judge/judge.ts
      - integration/src/plugin/install.ts
    philosophies: [design-by-contract]

  - id: arrange-act-assert
    title: Arrange-Act-Assert
    altitude: low
    confidence: medium
    flavour: Behaviour-focused node:test suites arrange fixtures, exercise real seams, and assert observable outcomes.
    evidence:
      - e2e-todo.test.ts simulates an agent writing files through the Copilot post-write hook.
      - model, policy, profile, adapter, and PR review tests exercise public seams and generated artefacts.
    anchors:
      - integration/test/e2e-todo.test.ts
      - integration/test/model.test.ts
      - integration/test/profile.test.ts
      - integration/test/pr-review.test.ts
      - integration/test/copilot-adapter.test.ts
    philosophies: [mostly-integration-testing, testing-trophy]

