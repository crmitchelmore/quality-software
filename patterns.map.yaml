practicePatterns:
  - id: product-principles
    discipline: product
    confidence: medium
    rationale: Keep conformance scope grounded in explicit maintainability and trust principles.
  - id: product-strategy-stack
    discipline: product
    confidence: medium
    rationale: Keep product.md, validator design, integration MVP, and rulepack roadmap aligned.
  - id: definition-of-ready-done
    discipline: product
    confidence: medium
    rationale: Require evidence, ratification, and validation before moving from advisory to blocking.
  - id: guardrail-metrics
    discipline: product
    confidence: high
    rationale: Promote rulepacks only with precision, waiver, disable, latency, and flapping metrics.
  - id: progressive-disclosure
    discipline: ux
    confidence: medium
    rationale: Show high-signal findings first, then evidence and rationale.
  - id: system-status-visibility
    discipline: ux
    confidence: medium
    rationale: Make advisory, warning, blocking, and fail-open states obvious to agents and reviewers.
  - id: error-message-design
    discipline: ux
    confidence: medium
    rationale: Findings should say what happened, why it matters, and the smallest fix.
