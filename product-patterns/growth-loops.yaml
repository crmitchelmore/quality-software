id: growth-loops
title: Growth Loops
discipline: product
category: growth
maturity: established
short_description: >-
  Design self-reinforcing product systems where user or customer actions produce outputs that bring back
  more users, usage or value, making growth repeatable rather than campaign-dependent.
description: >-
  A growth loop is a causal system in which an input user action creates an output that feeds the next
  cycle of growth. A user creates content that attracts search traffic; a team invites collaborators who
  create more teams; a seller lists inventory that attracts buyers who attract more sellers. Unlike a
  linear funnel, a loop is measured by whether each cycle produces enough qualified input for the next one.
  The practice pushes teams to identify the product mechanism that naturally compounds, remove friction in
  the loop, and manage quality so the loop does not grow through spam, low-fit acquisition or degraded trust.
problem: >-
  Growth depends on repeated campaigns, paid acquisition or sales pushes that stop producing results when
  spend stops. Teams optimise funnel steps but do not understand whether the product itself creates a
  repeatable acquisition, activation or retention engine.
context: >-
  Useful for products with collaborative, content, marketplace, network, usage-expansion or referral
  dynamics where one user's value-producing action can generate more demand or supply.
forces:
  - Loops compound only if the output quality is high enough to create valuable new inputs.
  - Short-term amplification can become spam or channel fatigue without trust guardrails.
  - Some products have multiple loops that interact, making attribution harder than a simple funnel.
  - Loops need an initial source of inputs before they can sustain themselves.
solution: >-
  Map the loop as inputs, product action, output, distribution surface and reinvestment into the next
  cycle. Instrument each conversion in the loop and measure loop efficiency, cycle time and output quality.
  Remove the tightest friction point, strengthen the value users receive for taking the action, and add
  guardrails against low-quality or abusive amplification. Treat campaigns as ways to seed or accelerate a
  durable loop, not as the loop itself.
when_to_use:
  - Growth relies on repeatable behaviours rather than one-off campaign spikes.
  - Users, content, inventory, invitations or usage can create value that attracts more participants.
  - A team needs a systems view beyond acquisition funnels.
anti_patterns:
  - Renaming a marketing campaign as a loop even though it stops when spend stops.
  - Optimising invites or sharing without ensuring recipients receive real value.
  - Allowing loop growth to degrade content, marketplace quality, deliverability or trust.
  - Copying another company's loop without matching the product's natural value exchange.
metrics:
  - Loop conversion at each step from input action to reinvested output.
  - Loop cycle time and number of completed cycles per cohort.
  - Qualified new users, accounts, content or supply generated per active participant.
  - Quality guardrails such as spam reports, referral activation, retention or marketplace fulfilment.
examples:
  - title: From campaign to loop
    poor: >-
      A knowledge-base product buys ads every quarter and calls the resulting sign-ups a growth loop.
    better: >-
      The team designs publishing so helpful public articles rank in search, bring new readers, convert
      teams, and encourage those teams to publish more useful articles.
    explanation: >-
      The better system reinvests product output into future acquisition. The poor version is a linear paid
      channel, not a compounding loop.
  - title: Protecting loop quality
    poor: >-
      A collaboration tool rewards users for inviting anyone, creating noisy invites that recipients ignore
      and email providers start throttling.
    better: >-
      The loop rewards invitations tied to shared workspaces and measures recipient activation, spam
      complaints and collaborator retention.
    explanation: >-
      Growth loops must compound value, not noise. Quality guardrails keep the loop healthy enough to repeat.
related_practice_patterns:
  - pattern: viral-loop
    reason: >-
      Viral loops are a specific growth-loop shape where sharing or invitation by current users creates new users.
  - pattern: guardrail-metrics
    reason: >-
      Guardrails prevent loop optimisation from producing spam, low-quality supply or trust erosion.
related_software_patterns:
  - pattern: event-driven-architecture
    reason: >-
      Product loops are often implemented and observed through events that trigger notifications, sharing,
      recommendations or lifecycle actions.
  - pattern: rate-limiting
    reason: >-
      Rate limiting is a technical guardrail that prevents growth mechanics from becoming abuse or channel spam.
related_philosophies:
  - philosophy: product-led-growth
    reason: >-
      Product-led growth commonly relies on loops where product usage itself drives acquisition, activation or expansion.
  - philosophy: lean-startup
    reason: >-
      Loop hypotheses should be tested cycle by cycle rather than assumed from a diagram.
tags:
  - growth
  - systems-thinking
  - acquisition
  - compounding
product_stages:
  - growth
ratings:
  early:
    score: 3
    notes: >-
      Useful for thinking, but early teams often need to prove the value exchange before a loop can sustain itself.
  growth:
    score: 5
    notes: >-
      Strong fit when acquisition costs rise and the product needs repeatable, compounding growth mechanisms.
  enterprise:
    score: 4
    notes: >-
      Valuable in platforms, marketplaces and collaboration suites, though governance and abuse controls become heavier.
references:
  - title: Growth Loops Are the New Funnels
    author: Reforge
    url: "https://www.reforge.com/blog/growth-loops"
  - title: "Hacking Growth"
    author: Sean Ellis and Morgan Brown
    year: 2017
