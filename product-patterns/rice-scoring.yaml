id: rice-scoring
title: RICE Scoring
aka:
  - Reach Impact Confidence Effort
discipline: product
category: prioritization
maturity: established
short_description: >-
  Prioritise candidate work by estimating reach, impact, confidence and effort, turning a messy backlog
  into a comparable set of bets while making uncertainty explicit.
description: >-
  RICE scoring is a lightweight quantitative prioritisation method for comparing product initiatives.
  Each item is scored on the number of people it will reach, the expected impact on each person or target
  metric, confidence in the estimates, and the effort required to deliver it. The resulting score is not a
  substitute for judgement; it is a way to expose assumptions and make trade-offs visible. Used well, RICE
  helps teams compare different kinds of work — growth experiments, customer pain fixes, technical enablers
  and usability improvements — without pretending the numbers are precise forecasts.
problem: >-
  Backlogs often get ordered by the loudest stakeholder, the newest idea, or the feature with the clearest
  narrative. Teams lack a shared way to compare scale, value, uncertainty and effort across competing bets.
context: >-
  Useful for teams with many candidate initiatives, enough customer or analytics signal to estimate reach,
  and a need to explain why some visible requests are not first.
forces:
  - >-
    Quantification improves comparability but can create false precision when estimates are weak.
  - >-
    High reach can swamp strategically important niche work unless impact and confidence are discussed.
  - >-
    Effort estimates are often optimistic; treating them as ranges is safer than single-point certainty.
solution: >-
  Define consistent scoring scales for reach, impact, confidence and effort. Score each candidate with the
  people closest to the evidence, write down the reasoning behind every number, and rank by
  reach × impact × confidence ÷ effort. Review the top items qualitatively before committing, especially
  where strategic commitments, dependencies or risk make a pure score misleading.
when_to_use:
  - >-
    A product team must rank a mixed backlog and needs a transparent decision aid.
  - >-
    You have at least rough reach data and can express impact against a known outcome.
  - >-
    Stakeholders need to see the assumptions behind prioritisation rather than a black-box ranking.
anti_patterns:
  - >-
    Treating RICE as an objective truth machine and shipping the highest score without judgement.
  - >-
    Inflating confidence to make a favoured idea win instead of using confidence to surface uncertainty.
  - >-
    Comparing scores built on different scales or time horizons.
metrics:
  - >-
    Share of roadmap items with explicit reach, impact, confidence and effort rationale.
  - >-
    Forecast accuracy of reach and effort estimates after delivery.
  - >-
    Reduction in prioritisation escalations or re-litigated backlog decisions.
  - >-
    Outcome movement from top-ranked items compared with lower-ranked items.
examples:
  - title: Scoring with evidence
    poor: >-
      A PM gives a pet feature reach 100,000, impact 3 and confidence 100% because a senior customer asked
      for it, so it floats to the top of the ranking.
    better: >-
      The team estimates reach from usage logs, impact from the affected funnel step, confidence at 50%
      because evidence comes from one segment, and effort from engineering ranges.
    explanation: >-
      The better approach uses RICE to expose uncertainty. Confidence becomes a brake on weak evidence
      rather than a knob for making preferred work appear rational.
  - title: Comparing unlike work
    poor: >-
      Security hardening, onboarding improvements and reporting features sit in separate priority lists,
      so each stakeholder claims their list is most urgent.
    better: >-
      The team scores each item against the same quarterly outcome and then reviews any high-risk mandatory
      work separately before committing the final sequence.
    explanation: >-
      RICE creates a shared comparison surface, while the final qualitative pass prevents mandatory or
      strategic work being hidden by the formula.
related_practice_patterns:
  - pattern: opportunity-scoring
    reason: >-
      Opportunity scoring can supply the impact and confidence evidence that makes RICE less speculative.
  - pattern: outcome-based-roadmap
    reason: >-
      RICE is most useful when candidate items are scored against outcomes already expressed in the roadmap.
related_philosophies:
  - philosophy: outcome-over-output
    reason: >-
      The method works best when impact is defined as behaviour or outcome change, not feature volume.
  - philosophy: continuous-discovery
    reason: >-
      Continuous discovery improves confidence estimates by keeping opportunity evidence fresh.
tags:
  - prioritization
  - scoring
  - portfolio
  - decision-making
product_stages:
  - growth
  - enterprise
ratings:
  early:
    score: 3
    notes: >-
      Helpful once ideas proliferate, but early teams often lack stable reach data and should not let a
      score outrank direct customer learning.
  growth:
    score: 5
    notes: >-
      Strong fit for scaling teams with many bets, analytics data and stakeholders who need transparent
      prioritisation.
  enterprise:
    score: 4
    notes: >-
      Useful at portfolio scale, though enterprise dependencies and regulatory work often need additional
      governance beyond the formula.
references:
  - title: "RICE: Simple prioritization for product managers"
    author: Intercom
    url: "https://www.intercom.com/blog/rice-simple-prioritization-for-product-managers/"
  - title: "Lean Analytics"
    author: Alistair Croll and Benjamin Yoskovitz
    year: 2013
