id: gateway-aggregation
title: Gateway Aggregation
scale: integration
category: cloud-distributed
altitude: high
maturity: established
short_description: >-
  Let an API gateway or edge service combine several backend calls into one client
  response, reducing client chattiness and hiding backend topology.
description: >-
  Gateway Aggregation places a composition layer close to the client. The gateway
  fetches data from multiple backend APIs, applies timeouts and fallbacks, and returns
  a response shaped for one screen or use case. It is most valuable when clients would
  otherwise make many high-latency calls or need to know service boundaries. It should
  remain an orchestration and composition layer, not a hidden domain service with its
  own durable business state.
problem: >-
  Clients become chatty and coupled to internal service topology, producing slow page
  loads and brittle release coordination across many backend APIs.
context: >-
  Mobile, web, and partner APIs backed by multiple services where one client operation
  needs data from several sources.
consequences:
  - Reduces client latency and simplifies client code by hiding fan-out.
  - Centralises cross-cutting timeouts, partial responses, and response shaping.
  - Can become a bottleneck or god service if domain logic accumulates at the gateway.
  - Requires careful caching and per-backend resilience to avoid amplifying failures.
synergies:
  - pattern: api-gateway
    reason: Aggregation is a specialised responsibility often hosted inside an API gateway.
  - pattern: backend-for-frontend
    reason: BFFs use aggregation to produce screen-specific responses for one client type.
  - pattern: aggregator
    reason: The integration aggregator pattern guides correlation and completeness rules for combining results.
  - pattern: timeout
    reason: Backend fan-out must be bounded so one slow dependency does not hold the whole response hostage.
alternatives:
  - backend-for-frontend
  - graphql
  - scatter-gather
conflicts_with:
  - monolith
languages:
  - language-agnostic
  - typescript
  - java
  - csharp
  - go
  - python
frameworks:
  - nodejs
  - express
  - nestjs
  - spring-boot
  - dotnet
  - graphql
project_types:
  - web-api
  - backend-service
  - microservices
  - mobile-app
  - distributed-system
tags:
  - api-gateway
  - composition
  - edge
  - latency
examples:
  - language: typescript
    title: Composing a product page
    negative: |
      // Browser knows every service and waits on many round trips.
      const product = await fetch(`/catalogue/${id}`).then(r => r.json());
      const price = await fetch(`/pricing/${id}`).then(r => r.json());
      const stock = await fetch(`/inventory/${id}`).then(r => r.json());
    positive: |
      app.get("/product-page/:id", async (req, res) => {
        const id = req.params.id;
        const [product, price, stock] = await Promise.all([
          catalogue.getProduct(id),
          pricing.getPrice(id),
          inventory.getAvailability(id),
        ]);

        res.json({ id, name: product.name, price: price.amount, available: stock.available });
      });
    explanation: >-
      The positive version lets the edge compose backend responses once, so the client
      receives a use-case response without learning internal service boundaries.
ratings:
  small:
    score: 2
    notes: Often unnecessary for small apps; direct backend endpoints are simpler.
  medium:
    score: 4
    notes: Good fit when client latency and backend fan-out become visible problems.
  large:
    score: 4
    notes: Valuable at scale, but split by client or domain to avoid a central bottleneck.
references:
  - title: Microsoft Azure Architecture Center; Gateway Aggregation pattern
    url: https://learn.microsoft.com/azure/architecture/patterns/gateway-aggregation
