id: retrieval-augmented-generation
title: Retrieval-Augmented Generation (RAG)
scale: architectural
category: ai-ml
altitude: medium
maturity: emerging
short_description: >-
  Ground language-model responses in retrieved private or domain-specific context instead of relying only on model parameters.
description: >-
  Retrieval-Augmented Generation combines an LLM with a retrieval system that selects relevant documents, records, or snippets at request time. A robust RAG architecture separates ingestion, chunking, embedding, indexing, retrieval, reranking, prompt assembly, generation, and citation checking. It works best when freshness, provenance, and domain grounding matter more than a single model's memorised knowledge, and it should be treated as a distributed data system with permissions, staleness, evaluation, and observability.
problem: >-
  LLMs can hallucinate, lack current private knowledge, and provide answers without traceable evidence, especially when users ask about organisation-specific documents or data.
context: >-
  Use when answers should be grounded in a controlled corpus such as documentation, tickets, policies, product data, or code. Avoid RAG when the task is pure reasoning over information already present in the prompt or when the corpus cannot be permission-filtered safely.
consequences:
  - >-
    Improves factual grounding and freshness when retrieval quality and source permissions are strong.
  - >-
    Adds a data pipeline: chunking, embeddings, indexes, reranking, deletes, and reingestion all need production care.
  - >-
    Bad retrieval can confidently ground the model in irrelevant text, so citations and evals are essential.
  - >-
    Latency and cost increase because each answer may call embedding, vector search, rerankers, and the generator.
synergies:
  - pattern: semantic-caching
    reason: >-
      Semantic caching can reuse answers for similar questions while preserving source and freshness checks.
  - pattern: guardrails-output-validation
    reason: >-
      Guardrails can require cited claims to map back to retrieved passages before a response is accepted.
  - pattern: evaluation-harness
    reason: >-
      Retrieval recall, answer faithfulness, and citation accuracy need repeatable regression tests.
  - pattern: repository
    reason: >-
      Repositories hide vector-store and document-store details behind a stable retrieval interface.
alternatives:
  - prompt-chaining
  - memory-context-window-management
  - semantic-caching
conflicts_with:
  - lazy-load
languages:
  - language-agnostic
  - python
  - typescript
frameworks:
  - langchain
  - llamaindex
  - openai
  - pgvector
  - pinecone
project_types:
  - ml-system
  - backend-service
  - web-api
  - prototype
tags:
  - grounding
  - retrieval
  - citations
diagram: |
  flowchart LR
    User[User] --> API[API]
    API --> Retriever[Retriever]
    Docs[Docs] --> Embed[Embed]
    Embed --> Index[Index]
    Retriever --> Index
    Retriever --> Rerank[Rerank]
    Rerank --> Prompt[Prompt]
    Prompt --> Model[Model]
    Model --> Check[Check]
    Check --> API
examples:
  - language: python
    title: Ground answers with retrieved evidence and citations
    negative: |
      def answer(question: str) -> str:
          prompt = f"Answer this from company policy: {question}"
          return llm.complete(prompt)
    positive: |
      def answer(question: str, user: User) -> Answer:
          hits = retriever.search(question, filters={"tenant": user.tenant_id}, k=20)
          reranked = reranker.top_n(question, hits, n=5)
          context = "\n\n".join(f"[{h.id}] {h.text}" for h in reranked)
          response = llm.complete(
              "Answer only from the sources. Cite source ids for every factual claim.\n"
              f"Sources:\n{context}\nQuestion: {question}"
          )
          return citation_checker.require_supported(response, sources=reranked)
    explanation: >-
      The positive version retrieves permission-filtered evidence, reranks it, asks for cited answers, and validates support instead of hoping the model remembers policy correctly.
ratings:
  small:
    score: 3
    notes: >-
      Useful for document-heavy prototypes, but overkill for tiny apps with only a few static facts.
  medium:
    score: 5
    notes: >-
      Excellent for product knowledge, support, code, and policy assistants once evaluation and ingestion are in place.
  large:
    score: 5
    notes: >-
      Often essential at scale, but requires permission-aware retrieval, freshness monitoring, and rigorous evals.
