id: memory-context-window-management
title: Memory & Context-Window Management
scale: design
category: ai-ml
maturity: emerging
short_description: >-
  Select, summarise, evict, and persist context deliberately so LLM workflows stay relevant, private, and within token limits.
description: >-
  Memory and Context-Window Management controls what information enters an LLM prompt and what survives across turns or runs. It combines short-term conversation state, retrieved facts, summaries, user preferences, task state, and durable memory with policies for relevance, recency, permissions, and deletion. The pattern matters because context is both capability and attack surface: too little loses continuity, too much wastes tokens and leaks irrelevant or sensitive data.
problem: >-
  Naively appending every message or stored memory eventually exceeds context windows, increases cost, dilutes attention, and can expose stale or sensitive information.
context: >-
  Use for chat, agents, copilots, and long-running workflows where state spans more than one model call. Avoid persistent memory unless users understand and can control what is stored.
consequences:
  - >-
    Improves continuity and relevance while keeping prompts within token and latency budgets.
  - >-
    Memory selection mistakes can cause stale instructions, privacy leaks, or missing critical facts.
  - >-
    Summaries are lossy and need provenance when decisions depend on exact details.
  - >-
    Durable memory requires deletion, consent, tenancy, and audit controls like any other data store.
synergies:
  - pattern: retrieval-augmented-generation
    reason: >-
      Retrieval can supply long-term factual context without stuffing everything into the prompt.
  - pattern: semantic-caching
    reason: >-
      Context fingerprints help decide whether a cached semantic answer is still reusable.
  - pattern: repository
    reason: >-
      A memory repository can encapsulate tenancy, retention, and relevance queries.
  - pattern: least-privilege
    reason: >-
      Memory access should be scoped so agents cannot read unrelated user or tenant data.
alternatives:
  - retrieval-augmented-generation
  - memento
  - event-sourcing
conflicts_with:
  - singleton
languages:
  - language-agnostic
  - python
  - typescript
frameworks:
  - langchain
  - llamaindex
  - openai
  - pgvector
  - none
project_types:
  - ml-system
  - backend-service
  - web-api
  - prototype
tags:
  - memory
  - context-window
  - privacy
examples:
  - language: typescript
    title: Select relevant context instead of appending everything
    negative: |
      conversation.push(userMessage);
      const answer = await model.complete(conversation.map(m => m.text).join("\n"));
    positive: |
      const recent = conversation.lastTurns(8);
      const memories = await memory.search(user.id, userMessage.text, { limit: 5 });
      const summary = await summaries.current(conversation.id);

      const prompt = contextBuilder.build({
        system: policy.systemPrompt,
        summary,
        recent,
        memories: memories.filter(m => m.consent === "active"),
        maxTokens: 12_000
      });

      const answer = await model.complete(prompt);
    explanation: >-
      The positive version combines bounded recent turns, consented relevant memories, and a summary under a token budget instead of blindly appending the whole transcript.
ratings:
  small:
    score: 3
    notes: >-
      Useful for chat prototypes, but persistent memory may be overkill without repeated users.
  medium:
    score: 5
    notes: >-
      Essential for production assistants with multi-turn tasks and privacy expectations.
  large:
    score: 5
    notes: >-
      Critical at scale, requiring tenancy, retention, provenance, summarisation quality, and memory-access audits.
