id: tool-use-function-calling
title: Tool Use / Function Calling
scale: integration
category: ai-ml
altitude: low
maturity: cutting-edge
short_description: >-
  Expose typed, permissioned functions to an LLM so it can request external actions through controlled contracts rather than free-form text.
description: >-
  Tool Use or Function Calling turns model intent into structured calls against application capabilities such as search, calculation, ticket creation, or database-backed commands. The application owns tool definitions, validation, authorisation, execution, and result summarisation; the model proposes calls but does not bypass the boundary. Good tool design keeps functions narrow, idempotent where possible, observable, and safe under retries or malformed arguments.
problem: >-
  Free-form model text cannot safely mutate systems, fetch sensitive data, or call APIs because arguments, permissions, and side effects are ambiguous.
context: >-
  Use when a model needs current data or external actions. Avoid exposing broad administrative functions or raw query tools without validation and least privilege.
consequences:
  - >-
    Converts model requests into typed contracts that application code can validate, authorise, and audit.
  - >-
    Tool schemas become public API surfaces for the model and need stable semantics.
  - >-
    Side effects must be idempotent or guarded because models and clients may retry calls.
  - >-
    Overly broad tools recreate prompt injection and privilege-escalation risks at the integration boundary.
synergies:
  - pattern: agent-orchestration
    reason: >-
      Agents rely on tool calls as their safe actuator layer for real-world work.
  - pattern: contract-first-api
    reason: >-
      Tool schemas benefit from the same explicit contract and compatibility discipline as APIs.
  - pattern: idempotency-key
    reason: >-
      Mutating tool calls should accept stable operation keys so repeated attempts do not duplicate side effects.
  - pattern: least-privilege
    reason: >-
      Each tool should expose only the minimum capability the model needs for a task.
alternatives:
  - rest
  - command
  - gateway
conflicts_with:
  - service-locator
languages:
  - language-agnostic
  - python
  - typescript
frameworks:
  - openai
  - anthropic
  - langchain
  - semantic-kernel
  - none
project_types:
  - ml-system
  - backend-service
  - web-api
  - sdk
tags:
  - function-calling
  - tools
  - contracts
examples:
  - language: typescript
    title: Validate tool arguments and permissions
    negative: |
      const toolName = modelOutput.split(" ")[0];
      const rawArgs = modelOutput.slice(toolName.length);
      const result = await (tools as any)[toolName](JSON.parse(rawArgs));
    positive: |
      const createRefund = tool({
        name: "create_refund_draft",
        schema: z.object({ orderId: z.string(), amountCents: z.number().int().positive() }),
        async execute(args, ctx) {
          await ctx.auth.require("refund:draft");
          return refunds.createDraft(args.orderId, args.amountCents, ctx.requestId);
        }
      });

      const call = parseToolCall(modelMessage, [createRefund]);
      const result = await createRefund.execute(call.args, context);
    explanation: >-
      The positive version uses an allow-listed tool, schema validation, authorisation, and an idempotent request identifier instead of executing arbitrary model-named functions.
ratings:
  small:
    score: 3
    notes: >-
      Useful for small assistants that need one or two safe actions, but broad tool surfaces are risky.
  medium:
    score: 5
    notes: >-
      Excellent for product copilots and support workflows that need controlled integration with live systems.
  large:
    score: 5
    notes: >-
      Foundational for enterprise agents, provided tools are versioned, audited, rate-limited, and least-privileged.
