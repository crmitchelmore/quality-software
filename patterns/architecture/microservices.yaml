id: microservices
title: Microservices
aka:
  - Microservice Architecture
scale: architectural
category: architecture
maturity: established
short_description: >-
  Decompose a system into independently deployable services aligned to business capabilities, each owning its data and exposing contracts through APIs, events, or messages.
description: >-
  Microservices optimise for independent delivery, team autonomy, and bounded operational blast radius. Each service encapsulates a business capability, owns its persistence, and communicates through explicit contracts. The architecture succeeds only when service boundaries match domain boundaries and the organisation can operate distributed systems: deployment automation, observability, reliability patterns, contract testing, and data consistency strategies are part of the pattern, not optional extras.
problem: >-
  A large shared codebase and database can make unrelated teams block each other, deployments risky, and scaling or resilience decisions all-or-nothing.
context: >-
  Large products with multiple teams, independently changing business capabilities, strong DevOps maturity, and a real need for independent deployability or scaling.
consequences:
  - >-
    Enables independent deployment, scaling, and ownership by business capability.
  - >-
    Limits blast radius when failures and data ownership are well isolated.
  - >-
    Introduces network latency, partial failure, eventual consistency, and operational overhead.
  - >-
    Poor boundaries produce a distributed monolith that is harder to change than the original monolith.
synergies:
  - pattern: bounded-context
    reason: >-
      Bounded contexts are the best starting point for service boundaries.
  - pattern: database-per-service
    reason: >-
      Independent persistence prevents hidden coupling through a shared database.
  - pattern: api-gateway
    reason: >-
      A gateway can provide a stable client-facing entry point across many services.
  - pattern: saga
    reason: >-
      Sagas coordinate business transactions that span service boundaries without distributed locks.
  - pattern: outbox
    reason: >-
      Transactional outbox reliably publishes events when a service changes its own state.
conflicts_with:
  - monolith
  - modular-monolith
alternatives:
  - modular-monolith
  - service-oriented-architecture
  - cell-based-architecture
languages:
  - language-agnostic
  - java
  - go
  - typescript
  - python
  - csharp
frameworks:
  - spring-boot
  - grpc
  - kafka
  - kubernetes
  - nestjs
project_types:
  - microservices
  - distributed-system
  - backend-service
  - high-throughput
tags:
  - distributed-systems
  - independent-deployment
  - bounded-contexts
  - team-autonomy
diagram: |-
  flowchart LR
    Client[Client] --> GW[Gateway]
    GW --> ORD[Order Svc]
    GW --> PAY[Pay Svc]
    GW --> INV[Stock Svc]
    ORD --> ODB[(Order DB)]
    PAY --> PDB[(Pay DB)]
    INV --> IDB[(Stock DB)]
    ORD -. events .-> BUS[Event Bus]
    PAY -. events .-> BUS
    INV -. events .-> BUS
examples:
  - language: typescript
    title: Avoid a shared database between services
    negative: |
      export async function reserveInventory(orderId: string) {
        const order = await sharedDb.orders.findUnique({ where: { id: orderId } });
        await sharedDb.inventory.update({
          where: { sku: order.sku },
          data: { reserved: { increment: order.quantity } },
        });
      }
    positive: |
      export class InventoryService {
        constructor(private readonly stock: StockRepository, private readonly outbox: Outbox) {}
      
        async handle(command: ReserveStock): Promise<void> {
          const item = await this.stock.get(command.sku);
          item.reserve(command.quantity, command.orderId);
          await this.stock.save(item);
          await this.outbox.publish(new StockReserved(command.orderId, command.sku));
        }
      }
      
      // Order service requests reservation by API or command message and consumes StockReserved.
    explanation: >-
      The positive version preserves service ownership: inventory owns stock data and publishes facts. Order no longer reaches through another service boundary to mutate its tables.
ratings:
  small:
    score: 1
    notes: >-
      Avoid for small projects; operational and consistency costs swamp the benefits.
  medium:
    score: 3
    notes: >-
      Situational when there are clear team and scaling boundaries, but a modular monolith is often safer.
  large:
    score: 5
    notes: >-
      Excellent for large organisations with mature delivery and observability practices and genuinely independent business capabilities.
references:
  - title: Microservices
    author: James Lewis and Martin Fowler
    year: 2014
    url: https://martinfowler.com/articles/microservices.html
