id: client-server
title: Client-Server
scale: architectural
category: architecture
altitude: high
maturity: time-tested
short_description: >-
  Split responsibilities between clients that initiate requests and servers that
  provide shared capabilities, data, policy, and coordination.
description: >-
  Client-Server is the foundational distributed architecture in which client
  processes request services from server processes over a network. Clients own
  presentation, interaction, or local workflow; servers own shared state,
  business capabilities, security policy, and resource coordination. The pattern
  can be as simple as a browser and web server or as rich as desktop clients
  synchronising with a backend API. Its clarity comes from asymmetric roles and a
  well-defined contract, but that same asymmetry creates server bottlenecks,
  offline limitations, and central availability requirements.
problem: >-
  Applications need to share data, enforce central policy, and coordinate work
  across many users or devices without installing all capabilities and data on
  every participant.
context: >-
  Use when centralised control, shared data consistency, and simple operational
  topology matter more than fully decentralised operation. Design explicit
  network contracts and account for latency, partial failure, and client version
  skew.
consequences:
  - Central servers make security, data integrity, and capability rollout easier to govern.
  - Clients can be simpler and tailored to user interaction while servers handle shared concerns.
  - The server is a capacity and availability dependency for clients.
  - Network latency, offline behaviour, and API compatibility become product concerns.
  - Over time a single server can grow into a monolith unless boundaries are maintained.
synergies:
  - pattern: api-gateway
    reason: A gateway is a common server-side edge for many clients calling multiple backing services.
  - pattern: backend-for-frontend
    reason: Client-server systems with several client types can add BFFs to tailor contracts per channel.
  - pattern: layered-architecture
    reason: Servers commonly use layers internally to separate presentation, application, domain, and persistence code.
  - pattern: circuit-breaker
    reason: Clients and servers need fast-failure controls around remote calls to avoid hanging user journeys.
alternatives:
  - peer-to-peer
  - serverless-architecture
  - microservices
conflicts_with:
  - peer-to-peer
languages:
  - language-agnostic
  - typescript
  - java
  - csharp
  - swift
  - kotlin
frameworks:
  - react
  - spring-boot
  - aspnet
  - django
  - nodejs
project_types:
  - web-api
  - web-frontend
  - mobile-app
  - desktop-app
tags:
  - distributed
  - centralised
  - request-response
  - shared-state
  - api
diagram: |-
  flowchart LR
    ClientA[Client A] --> Server[Server]
    ClientB[Client B] --> Server
    ClientC[Client C] --> Server
    Server --> Data[(Data)]
    Server --> Service[Service]
examples:
  - language: typescript
    title: Enforcing shared policy on the server
    negative: |
      export function canWithdraw(balance: number, amount: number) {
        return balance - amount >= 0;
      }

      // Each client checks locally, then writes directly to a shared file or database.
    positive: |
      export async function withdraw(accountId: string, amount: number, server: BankingApi) {
        const result = await server.post("/withdrawals", { accountId, amount });
        if (result.status === 409) throw new Error("insufficient funds");
        return result.body;
      }

      // The server performs the authoritative balance check in one transaction.
    explanation: >-
      The negative version trusts every client to enforce the same invariant. The
      positive version lets clients request an action while the server owns the
      authoritative policy and shared state transition.
ratings:
  small:
    score: 4
    notes: >-
      Strong default for small web and mobile applications that need shared data
      and central policy without distributed-system complexity.
  medium:
    score: 4
    notes: >-
      Still a good fit, especially when paired with clear API contracts and
      internal modularity on the server.
  large:
    score: 3
    notes: >-
      Remains foundational, but large estates often need gateways, BFFs,
      microservices, or cells to avoid one overloaded central server.
references:
  - title: Distributed Systems Concepts and Design
    author: George Coulouris et al.
    year: 2011
