id: peer-to-peer
title: Peer-to-Peer
aka:
  - P2P
scale: architectural
category: architecture
maturity: established
short_description: >-
  Let nodes act as both clients and servers, sharing resources directly without a
  permanently central coordinator for every interaction.
description: >-
  Peer-to-Peer Architecture distributes responsibilities across nodes that can
  both request and provide data, compute, or coordination. Peers discover each
  other through trackers, distributed hash tables, gossip, or known bootstrap
  nodes, then exchange work directly. The pattern reduces dependence on a central
  server and can scale aggregate bandwidth or resilience with the number of
  participants. It also makes trust, identity, consistency, NAT traversal,
  version skew, abuse prevention, and observability much harder than in
  client-server designs.
problem: >-
  A central server can limit scalability, autonomy, cost, or censorship
  resistance when participants could exchange resources directly.
context: >-
  Use when decentralisation, local autonomy, aggregate resource sharing, or
  resilience to central outages is a core requirement. Avoid it when central
  policy enforcement, simple auditing, or strong consistency is more important.
consequences:
  - Capacity can grow with the number of participating peers rather than only with central infrastructure.
  - The system can continue operating through some central service outages if discovery and trust are robust.
  - Security, moderation, identity, and data integrity are harder because peers are not inherently trusted.
  - Network variability, NAT traversal, and churn complicate protocols and testing.
  - Observability and incident response are weaker because behaviour occurs across user-controlled nodes.
synergies:
  - pattern: observer
    reason: Gossip and subscription mechanisms often use observer-like change propagation between peers.
  - pattern: proxy
    reason: Relay or super-peer nodes can proxy traffic when direct peer connections are impossible.
  - pattern: circuit-breaker
    reason: Peers need fast failure and peer eviction when remote nodes are slow, malicious, or unavailable.
  - pattern: broker-architecture
    reason: Hybrid P2P systems may use a broker for discovery while keeping data transfer peer-to-peer.
alternatives:
  - client-server
  - broker-architecture
  - api-gateway
conflicts_with:
  - api-gateway
  - backend-for-frontend
languages:
  - language-agnostic
  - go
  - rust
  - javascript
  - erlang
  - c
frameworks:
  - none
  - nodejs
  - tokio
  - grpc
project_types:
  - distributed-system
  - realtime-system
  - desktop-app
  - mobile-app
tags:
  - decentralised
  - discovery
  - gossip
  - resource-sharing
  - resilience
diagram: |-
  flowchart LR
    PeerA[Peer A] <--> PeerB[Peer B]
    PeerB <--> PeerC[Peer C]
    PeerC <--> PeerA
    PeerA <--> PeerD[Peer D]
    PeerD <--> PeerB
    Bootstrap[Bootstrap] --> PeerA
    Bootstrap --> PeerC
examples:
  - language: typescript
    title: Discovering peers instead of depending on one server path
    negative: |
      export async function downloadFile(id: string) {
        const response = await fetch(`https://files.example.com/files/${id}`);
        if (!response.ok) throw new Error("download failed");
        return response.arrayBuffer();
      }
    positive: |
      export async function downloadFile(id: string, network: PeerNetwork) {
        const peers = await network.findPeersWithBlock(id);
        for (const peer of peers) {
          const block = await network.requestBlock(peer, id);
          if (await verifyHash(id, block)) return block;
          network.penalise(peer, "bad block");
        }
        throw new Error("block unavailable");
      }
    explanation: >-
      The negative version depends on one central file server. The positive
      version discovers peers that advertise the content, verifies what they
      return, and can continue if an individual peer fails or misbehaves.
ratings:
  small:
    score: 1
    notes: >-
      Avoid unless decentralisation is the product itself; the protocol and trust
      costs are high for small applications.
  medium:
    score: 2
    notes: >-
      Rarely appropriate except for collaboration, sync, or media distribution
      products with a clear P2P requirement.
  large:
    score: 4
    notes: >-
      Strong for large decentralised networks or content distribution systems,
      but demands specialist protocol, security, and operations expertise.
references:
  - title: Peer-to-Peer Systems and Applications
    author: Ralf Steinmetz and Klaus Wehrle
    year: 2005
  - title: Designing Data-Intensive Applications
    author: Martin Kleppmann
    year: 2017
