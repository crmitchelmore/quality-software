id: serverless-architecture
title: Serverless / FaaS Architecture
aka:
  - Function as a Service
  - Event-driven serverless
scale: architectural
category: architecture
altitude: high
maturity: established
short_description: >-
  Compose managed functions, events, and cloud services so teams ship behaviour
  without managing servers, scaling infrastructure, or idle capacity directly.
description: >-
  Serverless Architecture decomposes application behaviour into small functions
  triggered by HTTP requests, queues, streams, schedules, object-store events, or
  workflow engines. The cloud provider owns capacity management, placement,
  scaling, patching, and much of the runtime operation; the team owns function
  code, permissions, event contracts, observability, and service configuration.
  The architecture works best when workloads are spiky, event-shaped, or
  integration-heavy and when boundaries are kept explicit. It performs poorly when
  long-running stateful processes, low cold-start latency, or provider portability
  are dominant requirements.
problem: >-
  Teams often over-provision and operate always-on services for intermittent,
  event-driven workloads, paying operational and capacity costs that do not match
  demand.
context: >-
  Use when workloads are naturally triggered by events, can run within provider
  execution limits, and can delegate storage, identity, messaging, and workflow to
  managed services. Apply strong infrastructure-as-code and least-privilege
  permissions because architecture is split across code and cloud configuration.
consequences:
  - Capacity scales rapidly with demand and can approach zero cost when idle.
  - Managed services reduce server maintenance but increase reliance on provider-specific contracts.
  - Distributed tracing, idempotency, retries, and dead-letter handling are mandatory for debuggability.
  - Cold starts, execution limits, and per-invocation pricing can surprise latency-sensitive or sustained workloads.
  - Local development and integration testing require realistic emulation or deployed test environments.
synergies:
  - pattern: api-gateway
    reason: API gateways provide HTTP routing, authentication, throttling, and request shaping in front of functions.
  - pattern: event-driven-architecture
    reason: Functions are commonly triggered by events and emit events to continue workflows without direct coupling.
  - pattern: circuit-breaker
    reason: Functions calling external APIs need bounded failure handling to avoid retry storms and cost amplification.
  - pattern: backend-for-frontend
    reason: A thin BFF can be implemented as serverless handlers tailored to a specific client experience.
alternatives:
  - microservices
  - client-server
  - broker-architecture
conflicts_with:
  - space-based-architecture
languages:
  - language-agnostic
  - typescript
  - python
  - java
  - go
  - csharp
frameworks:
  - aws-lambda
  - azure-functions
  - nodejs
  - fastapi
