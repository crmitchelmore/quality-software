  - cloud
  - scale-to-zero
diagram: |-
  flowchart LR
    Client[Client] --> Gateway[Gateway]
    Gateway --> FuncA[Function A]
    Event[Event Bus] --> FuncB[Function B]
    FuncA --> Queue[Queue]
    Queue --> FuncB
    FuncA --> Store[(Store)]
    FuncB --> Store
examples:
  - language: typescript
    title: Isolating stateless function work
    negative: |
      let currentBatch: string[] = [];

      export async function handler(event: UploadEvent) {
        currentBatch.push(event.key);
        if (currentBatch.length >= 100) {
          await writeReport(currentBatch);
          currentBatch = [];
        }
      }
    positive: |
      export async function handler(event: UploadEvent, deps: Deps) {
        const record = { id: event.id, key: event.key, receivedAt: Date.now() };
        const inserted = await deps.store.insertIfAbsent(record.id, record);
        if (!inserted) return;

        await deps.queue.send({ type: "BuildReport", key: event.key });
      }
    explanation: >-
      The negative version assumes warm in-memory state and loses data when the
      platform scales or recycles instances. The positive version treats the
      function as stateless, writes idempotently, and passes follow-up work to a
      durable queue.
ratings:
  small:
    score: 3
    notes: >-
      Useful for prototypes, scheduled jobs, and low-traffic APIs, but can become
      confusing if every trivial operation is split into separate functions.
  medium:
    score: 4
    notes: >-
      Good fit for event-heavy products where managed services reduce operations.
      Invest early in infrastructure-as-code, observability, and local workflows.
  large:
    score: 4
    notes: >-
      Excellent for selected domains at scale, but large estates need governance
      for permissions, cost, deployment topology, and provider coupling.
references:
  - title: Serverless Architectures
    author: Mike Roberts
    year: 2018
  - title: AWS Lambda Operator Guide
    author: Amazon Web Services
