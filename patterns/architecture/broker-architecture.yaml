id: broker-architecture
title: Broker Architecture
aka:
  - Hub-and-spoke broker
  - Message broker architecture
scale: architectural
category: architecture
maturity: time-tested
short_description: >-
  Decouple participants by routing requests, commands, or events through a broker
  that mediates discovery, delivery, protocol translation, and sometimes workflow.
description: >-
  Broker Architecture introduces an intermediary component between producers and
  consumers so participants do not need direct knowledge of each other's location,
  transport, availability, or protocol. Clients submit work to the broker; the
  broker routes it to suitable servers, workers, or subscribers and may handle
  correlation, retries, buffering, fan-out, and transformation. The pattern is
  architectural when the broker becomes a central communication backbone rather
  than a library detail. It is common in distributed systems where services evolve
  independently, traffic is bursty, or interactions need to cross process,
  language, and deployment boundaries.
problem: >-
  Direct service-to-service calls create tight coupling, brittle endpoint
  knowledge, duplicated routing logic, and cascading failures when one participant
  is unavailable or changes its interface.
context: >-
  Use when many independently deployed components must exchange work, events, or
  requests without each component knowing every other component. It fits systems
  with asynchronous workflows, protocol heterogeneity, or multiple consumers for
  the same message, provided the organisation can operate the broker as critical
  infrastructure.
consequences:
  - Producers and consumers can evolve independently because the broker owns discovery and routing.
  - Buffering smooths traffic spikes and allows consumers to recover after short outages.
  - The broker becomes a critical dependency and must be monitored, scaled, secured, and versioned carefully.
  - Message contracts, idempotency, ordering, and poison-message handling become first-class design concerns.
  - Latency and debugging complexity increase compared with a direct in-process or direct HTTP call.
synergies:
  - pattern: publish-subscribe
    reason: The broker can fan events out to many subscribers without producers knowing subscriber count or location.
  - pattern: event-driven-architecture
    reason: Brokers provide the durable event transport and routing backbone needed for event-driven collaboration.
  - pattern: circuit-breaker
    reason: Broker clients still need circuit breakers around synchronous broker calls or downstream request-reply paths.
  - pattern: anti-corruption-layer
    reason: Broker adapters can translate canonical message contracts to legacy or partner formats at the boundary.
  - pattern: microservices
    reason: Microservices often use a broker to avoid point-to-point integration meshes and to absorb traffic bursts.
conflicts_with:
  - client-server
alternatives:
  - api-gateway
  - service-mesh
  - mediator
languages:
  - language-agnostic
  - java
  - typescript
  - go
  - python
frameworks:
  - kafka
  - rabbitmq
  - nats
  - spring-boot
  - nodejs
project_types:
  - distributed-system
  - microservices
  - backend-service
  - high-throughput
tags:
  - messaging
  - decoupling
  - routing
  - asynchronous
  - integration
diagram: |-
  flowchart LR
    ClientA[Client A] --> Broker[Broker]
    ClientB[Client B] --> Broker
    Broker --> WorkerA[Worker A]
    Broker --> WorkerB[Worker B]
    Broker --> Store[(Queue)]
    WorkerA --> Broker
    WorkerB --> Broker
examples:
  - language: typescript
    title: Routing work through a broker
    negative: |
      type Job = { kind: "invoice" | "email"; payload: unknown };

      export async function submit(job: Job) {
        if (job.kind === "invoice") {
          await fetch("https://invoice.internal/jobs", {
            method: "POST",
            body: JSON.stringify(job.payload),
          });
        } else {
          await fetch("https://email.internal/jobs", {
            method: "POST",
            body: JSON.stringify(job.payload),
          });
        }
      }
    positive: |
      type Job = { kind: "invoice" | "email"; payload: unknown };

      export interface Broker {
        publish(topic: string, message: unknown): Promise<void>;
      }

      export async function submit(job: Job, broker: Broker) {
        await broker.publish(`jobs.${job.kind}`, {
          id: crypto.randomUUID(),
          payload: job.payload,
        });
      }

      export async function startInvoiceWorker(broker: Broker) {
        // Subscribe to jobs.invoice and process messages idempotently.
      }
    explanation: >-
      The negative version embeds endpoint knowledge and routing decisions in the
      producer. The positive version publishes a typed work item to a broker-owned
      route, allowing workers to scale, move, or be replaced without changing the
      submitter.
ratings:
  small:
    score: 2
    notes: >-
      Usually too much operational weight for a small application unless there is
      a clear asynchronous boundary or third-party integration need.
  medium:
    score: 4
    notes: >-
      Good fit once multiple services or workers need decoupled delivery, retries,
      and buffering. Keep contracts explicit and operational ownership clear.
  large:
    score: 5
    notes: >-
      Excellent for large distributed systems, but only with mature observability,
      schema governance, dead-letter handling, and broker capacity planning.
references:
  - title: Pattern-Oriented Software Architecture Volume 1
    author: Frank Buschmann et al.
    year: 1996
  - title: Enterprise Integration Patterns
    author: Gregor Hohpe and Bobby Woolf
    year: 2003
