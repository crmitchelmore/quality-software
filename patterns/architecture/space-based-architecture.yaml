tags:
  - in-memory-data-grid
  - partitioning
  - eventual-consistency
  - burst-tolerance
  - scaling
diagram: |-
  flowchart LR
    User[User] --> Router[Router]
    Router --> UnitA[Unit A]
    Router --> UnitB[Unit B]
    UnitA <--> Space[Data Space]
    UnitB <--> Space
    Space --> Sync[Async Sync]
    Sync --> Store[(Store)]
examples:
  - language: typescript
    title: Keeping hot state out of the request database path
    negative: |
      export async function reserveSeat(db: Db, showId: string, seatId: string) {
        await db.transaction(async tx => {
          const seat = await tx.query("select status from seats where id = ? for update", [seatId]);
          if (seat.status !== "free") throw new Error("seat unavailable");
          await tx.query("update seats set status = 'held' where id = ?", [seatId]);
        });
      }
    positive: |
      export interface Space {
        compareAndSet(key: string, expected: string, next: string): Promise<boolean>;
        publishChange(event: SeatHeld): Promise<void>;
      }

      export async function reserveSeat(space: Space, showId: string, seatId: string) {
        const key = `show:${showId}:seat:${seatId}`;
        const held = await space.compareAndSet(key, "free", "held");
        if (!held) throw new Error("seat unavailable");
        await space.publishChange({ showId, seatId, status: "held" });
      }
    explanation: >-
      The negative version serialises every reservation through the database. The
      positive version performs an atomic operation in the hot data space and emits
      a change for durable projection, reducing lock contention during peaks.
ratings:
  small:
    score: 1
    notes: >-
      Avoid for small systems; the consistency and operational complexity is far
      greater than the value gained.
  medium:
    score: 3
    notes: >-
      Situational for a specific hot path with clear partitioning and replay
      semantics. Most medium systems are better served by caching and queues.
  large:
    score: 4
    notes: >-
      Strong fit for very high-throughput platforms that can invest in data-grid
      operations, consistency testing, and failure-mode drills.
references:
  - title: Patterns of Enterprise Application Architecture
    author: Martin Fowler
    year: 2002
  - title: Space-Based Architecture
    author: Mark Richards
    year: 2015
