id: space-based-architecture
title: Space-Based Architecture
aka:
  - Tuple space architecture
  - Shared space architecture
scale: architectural
category: architecture
maturity: established
short_description: >-
  Scale high-volume workloads by colocating processing with an in-memory data
  grid, reducing database contention and coordinating state through a shared space.
description: >-
  Space-Based Architecture organises an application around processing units that
  hold both behaviour and hot state in a distributed in-memory space. Requests are
  routed to any available processing unit; each unit reads and writes to the space,
  while asynchronous replication or write-behind synchronises durable storage.
  The design targets extreme load and burst tolerance by removing the central
  relational database from the synchronous request path. It is most useful when
  the workload can tolerate eventual consistency for some data, when hot data can
  be partitioned or replicated safely, and when operational teams can manage data
  grid consistency, failover, and recovery semantics.
problem: >-
  A central database can become the bottleneck and single scaling limit for
  workloads with very high write rates, volatile demand, and many stateless
  application instances competing for the same rows.
context: >-
  Use for high-throughput, low-latency systems where hot state is read and written
  frequently, synchronous durability is not required for every interaction, and
  partitioning rules are well understood. It is unsuitable when strong global
  transactions and immediate consistency dominate the requirements.
consequences:
  - Throughput improves because hot reads and writes stay close to processing units.
  - The system can absorb bursts by adding processing units rather than scaling only the database.
  - Eventual consistency, split-brain protection, and recovery procedures become central design concerns.
  - Debugging is harder because the source of truth is distributed across memory, replication logs, and durable stores.
  - Data models must be designed for partitioning, affinity, and idempotent replay.
synergies:
  - pattern: bulkhead
    reason: Processing units can be partitioned by tenant or workload so a hot partition does not starve the entire grid.
  - pattern: event-driven-architecture
    reason: Durable events or change streams are often used to replicate from the space to downstream systems.
  - pattern: database-per-service
    reason: Each bounded service can own its durable store while using an in-memory space for hot operational state.
  - pattern: retry
    reason: Clients and write-behind consumers need bounded retries because partitions and replicas can move during rebalancing.
conflicts_with:
  - layered-architecture
alternatives:
  - client-server
  - microservices
  - broker-architecture
languages:
  - language-agnostic
  - java
  - csharp
  - go
  - python
frameworks:
  - redis
  - kafka
  - spring-boot
  - dotnet
  - kubernetes
project_types:
