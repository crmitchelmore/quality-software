id: api-gateway
title: API Gateway
scale: architectural
category: architecture
maturity: established
short_description: >-
  Provide a single managed edge for clients, centralising request routing,
  authentication, throttling, protocol translation, and coarse API composition.
description: >-
  An API Gateway is the entry point between external clients and internal
  services. It terminates public protocols, applies authentication and rate
  limits, routes requests to backing services, and may perform light aggregation
  or protocol translation. The gateway protects internal topology from clients
  and gives platform teams one place to manage edge concerns such as TLS,
  quotas, request logging, and versioned routes. It should remain thin: business
  decisions and domain workflows belong in services or BFFs, not in gateway
  configuration that is hard to test and version.
problem: >-
  Exposing every internal service directly forces clients to understand internal
  topology, duplicates authentication and throttling, and makes service changes
  externally visible.
context: >-
  Use when multiple clients need stable public APIs over a changing service
  landscape, or when edge security and traffic policy must be enforced uniformly.
  Keep the gateway stateless and avoid turning it into a hidden monolith.
consequences:
  - Clients receive a stable public surface while internal services can move or split.
  - Edge concerns such as TLS, auth, rate limits, and coarse routing are centralised.
  - The gateway can become a bottleneck or single point of failure if not scaled and observed.
  - Too much orchestration in the gateway creates hard-to-test business logic outside service ownership.
  - Versioning, route ownership, and backward compatibility require explicit governance.
synergies:
  - pattern: backend-for-frontend
    reason: A gateway can route from broad public edge concerns to client-specific BFF services.
  - pattern: microservices
    reason: It hides microservice topology and prevents clients from binding to many internal endpoints.
  - pattern: service-mesh
    reason: The gateway manages external north-south traffic while the mesh manages internal east-west traffic.
  - pattern: strangler-fig
    reason: Gateway routing can incrementally divert endpoints from a legacy system to replacement services.
  - pattern: circuit-breaker
    reason: Edge routes should fail fast or shed load when backing services are unavailable.
alternatives:
  - backend-for-frontend
  - client-server
  - broker-architecture
conflicts_with:
  - peer-to-peer
languages:
  - language-agnostic
  - typescript
  - java
  - go
  - csharp
frameworks:
  - kubernetes
  - spring-boot
  - nodejs
  - express
  - grpc
project_types:
  - web-api
  - microservices
  - distributed-system
  - backend-service
tags:
  - edge
  - routing
  - authentication
  - rate-limiting
  - api-management
diagram: |-
  flowchart LR
    Web[Web] --> Gateway[Gateway]
    Mobile[Mobile] --> Gateway
    Gateway --> Auth[Auth]
    Gateway --> Orders[Orders]
    Gateway --> Billing[Billing]
    Gateway --> Search[Search]
examples:
  - language: typescript
    title: Keeping clients away from internal topology
    negative: |
      export async function loadAccount(id: string) {
        const profile = await fetch(`https://profile.internal/users/${id}`).then(r => r.json());
        const orders = await fetch(`https://orders.internal/users/${id}/orders`).then(r => r.json());
        const balance = await fetch(`https://billing.internal/accounts/${id}`).then(r => r.json());
        return { profile, orders, balance };
      }
    positive: |
      export async function loadAccount(id: string) {
        const response = await fetch(`/api/accounts/${id}`, {
          headers: { Authorization: await currentToken() },
        });
        if (!response.ok) throw new Error("account unavailable");
        return response.json();
      }

      // The gateway authenticates, routes to owned services, and exposes a stable edge route.
    explanation: >-
      The negative client is coupled to internal service names and protocols. The
      positive client calls one stable public route while the gateway owns edge
      policy and internal routing.
ratings:
  small:
    score: 2
    notes: >-
      Rarely necessary for a small single-service app; framework routing and a
      reverse proxy are usually enough.
  medium:
    score: 4
    notes: >-
      Good fit for several services or client types, especially when consistent
      auth, throttling, and route versioning matter.
  large:
    score: 5
    notes: >-
      Essential in large service estates, provided ownership and limits keep it
      from accumulating domain orchestration.
references:
  - title: Microservices Patterns
    author: Chris Richardson
    year: 2018
  - title: Building Microservices
    author: Sam Newman
    year: 2021
