id: event-driven-architecture
title: Event-Driven Architecture
aka:
  - EDA
scale: architectural
category: architecture
altitude: medium
maturity: established
short_description: >-
  Let services publish immutable facts about state changes and have other components react asynchronously, reducing temporal coupling between producers and consumers.
description: >-
  Event-Driven Architecture models important business changes as events and distributes them through brokers, streams, or channels. Producers announce facts they own; consumers subscribe and react on their own timelines. The architecture improves decoupling and scalability for workflows, integrations, and projections, but it shifts complexity into event contracts, ordering, idempotency, observability, and eventual consistency.
problem: >-
  Synchronous point-to-point calls make producers know too much about consumers, create cascading failures, and force unrelated work into one request path.
context: >-
  Systems with many consumers of the same business facts, asynchronous workflows, integration needs, audit trails, or spikes that benefit from buffering.
consequences:
  - >-
    Decouples producers from consumers in time, availability, and deployment cadence.
  - >-
    Supports fan-out, auditability, projections, and reactive workflows.
  - >-
    Requires idempotent consumers, schema evolution, replay strategy, and clear event ownership.
  - >-
    Debugging becomes harder because causality spans logs, brokers, retries, and eventually consistent views.
synergies:
  - pattern: publish-subscribe
    reason: >-
      Publish-subscribe channels distribute events to many independent consumers.
  - pattern: outbox
    reason: >-
      Transactional outbox prevents losing events when state changes and publishes must be atomic.
  - pattern: idempotent-receiver
    reason: >-
      Idempotent receivers make at-least-once delivery safe.
  - pattern: domain-event
    reason: >-
      Domain events provide business-meaningful facts rather than technical notifications.
  - pattern: saga
    reason: >-
      Sagas use events to coordinate long-running cross-service workflows.
conflicts_with:
  - request-reply
alternatives:
  - service-oriented-architecture
  - microservices
  - pipes-and-filters
languages:
  - language-agnostic
  - java
  - go
  - typescript
  - python
  - csharp
frameworks:
  - kafka
  - rabbitmq
  - nats
  - spring-boot
  - nodejs
project_types:
  - distributed-system
  - microservices
  - backend-service
  - high-throughput
  - data-pipeline
tags:
  - events
  - async
  - pub-sub
  - eventual-consistency
diagram: |-
  flowchart LR
    Order[Order Svc] -->|event| Broker[Event Broker]
    Broker --> Billing[Billing Svc]
    Broker --> Stock[Stock Svc]
    Broker --> Email[Email Svc]
    Billing --> BDB[(Billing DB)]
    Stock --> SDB[(Stock DB)]
    Email --> Log[(Send Log)]
examples:
  - language: typescript
    title: Publish facts instead of calling every downstream concern inline
    negative: |
      export async function placeOrder(command: PlaceOrder) {
        const order = await orders.create(command);
        await billing.charge(order);
        await inventory.reserve(order);
        await email.sendConfirmation(order);
        return order.id;
      }
    positive: |
      export async function placeOrder(command: PlaceOrder) {
        const order = Order.place(command);
        await orders.save(order);
        await outbox.add(new OrderPlaced(order.id, order.customerId, order.lines));
        return order.id;
      }
      
      export async function reserveStock(event: OrderPlaced) {
        if (await processed.has(event.id)) return;
        await inventory.reserve(event.lines);
        await processed.record(event.id);
      }
    explanation: >-
      The positive version keeps order creation focused on the fact it owns. Other capabilities react asynchronously and make retries safe through idempotent consumption.
ratings:
  small:
    score: 2
    notes: >-
      Usually unnecessary for small apps unless asynchronous integration is the core requirement.
  medium:
    score: 4
    notes: >-
      Good fit when several workflows consume the same facts or request paths need decoupling.
  large:
    score: 5
    notes: >-
      Excellent for large distributed systems, provided event governance, observability, and replay practices are mature.
references:
  - title: What do you mean by Event-Driven?
    author: Martin Fowler
    year: 2017
    url: https://martinfowler.com/articles/201701-event-driven.html
