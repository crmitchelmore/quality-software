id: microkernel
title: Microkernel (Plugin) Architecture
aka:
  - Plugin Architecture
scale: architectural
category: architecture
altitude: high
maturity: time-tested
short_description: >-
  Keep a small stable core that owns lifecycle and shared abstractions, while optional or variable behaviour is supplied by independently developed plugins.
description: >-
  Microkernel Architecture divides a system into a minimal core and a set of plugins. The core provides extension points, shared services, configuration, loading, isolation, and lifecycle management. Plugins implement capabilities through stable contracts. This is common in IDEs, build tools, workflow engines, and product platforms where variability is the product.
problem: >-
  Products with many optional capabilities or customer-specific variations become brittle when every feature is compiled into the same core with conditional logic.
context: >-
  Extensible platforms, tools, workflow engines, developer products, and applications where third parties or separate teams add behaviour without changing core code.
consequences:
  - >-
    Keeps the core stable while allowing feature variation and independent plugin ownership.
  - >-
    Supports ecosystems and customer-specific extension without forking the product.
  - >-
    Requires careful API versioning, plugin isolation, compatibility checks, and failure containment.
  - >-
    Core abstractions can ossify if extension points are too narrow or too broad.
synergies:
  - pattern: strategy
    reason: >-
      Plugins often provide strategies selected at runtime by the core.
  - pattern: factory-method
    reason: >-
      Factories create plugin instances behind stable extension contracts.
  - pattern: adapter
    reason: >-
      Adapters let plugins integrate external systems while conforming to core interfaces.
  - pattern: registry
    reason: >-
      A registry discovers and stores plugin implementations for the kernel.
conflicts_with:
  - monolith
alternatives:
  - modular-monolith
  - service-oriented-architecture
  - layered-architecture
languages:
  - language-agnostic
  - java
  - csharp
  - typescript
  - python
  - go
frameworks:
  - none
  - nodejs
  - spring-boot
  - dotnet
project_types:
  - desktop-app
  - cli-tool
  - sdk
  - backend-service
tags:
  - plugins
  - extension-points
  - platform
  - runtime-composition
diagram: |-
  flowchart TB
    Host[Core Kernel] --> API[Plugin API]
    API --> Auth[Auth Plugin]
    API --> Pay[Pay Plugin]
    API --> Report[Report Plugin]
    Host --> Config[Config]
    Host --> Life[Lifecycle]
    Auth --> ExtA[Provider A]
    Pay --> ExtB[Provider B]
examples:
  - language: typescript
    title: Replace conditionals with plugin contracts
    negative: |
      export function exportReport(format: string, report: Report): Buffer {
        if (format === "pdf") return renderPdf(report);
        if (format === "csv") return renderCsv(report);
        if (format === "xlsx") return renderXlsx(report);
        throw new Error(`unsupported format ${format}`);
      }
    positive: |
      export interface ReportExporter {
        readonly format: string;
        export(report: Report): Buffer;
      }
      
      export class ExportKernel {
        private readonly exporters = new Map<string, ReportExporter>();
      
        register(exporter: ReportExporter) {
          this.exporters.set(exporter.format, exporter);
        }
      
        export(format: string, report: Report): Buffer {
          const exporter = this.exporters.get(format);
          if (!exporter) throw new Error(`unsupported format ${format}`);
          return exporter.export(report);
        }
      }
    explanation: >-
      The positive version makes new formats extensions of a stable kernel contract rather than edits to a growing conditional. The core owns discovery and error handling.
ratings:
  small:
    score: 2
    notes: >-
      Usually unnecessary unless extensibility is the primary feature.
  medium:
    score: 4
    notes: >-
      Good for tools and platforms with several independently owned extension types.
  large:
    score: 5
    notes: >-
      Excellent for mature product platforms where a stable core and plugin ecosystem reduce coordination cost.
references:
  - title: Pattern-Oriented Software Architecture Volume 1
    author: Buschmann et al.
    year: 1996
