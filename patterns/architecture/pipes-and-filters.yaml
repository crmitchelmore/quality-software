id: pipes-and-filters
title: Pipes and Filters
aka:
  - Pipeline Architecture
scale: architectural
category: architecture
altitude: medium
maturity: time-tested
short_description: >-
  Process data through a sequence of independent filters connected by pipes, where each filter transforms, enriches, validates, or routes the stream.
description: >-
  Pipes and Filters breaks processing into composable stages. Each filter has a narrow contract: consume input, produce output, and avoid hidden coupling to neighbouring stages. Pipes carry data between filters in memory, files, streams, queues, or processes. The pattern is especially strong for compilers, ETL, media processing, data pipelines, and message integration flows.
problem: >-
  Data transformation logic becomes hard to test and reuse when parsing, validation, enrichment, business rules, and output formatting are tangled in one long procedure.
context: >-
  Streaming or batch workflows where data moves through well-defined transformations and stages can be reordered, reused, scaled, or tested independently.
consequences:
  - >-
    Improves composability because each filter can be developed and tested independently.
  - >-
    Supports streaming, parallelism, backpressure, and reuse of common stages.
  - >-
    Shared mutable state across filters breaks the pattern and makes order-dependent bugs likely.
  - >-
    Error handling, schema evolution, and observability must be designed across stage boundaries.
synergies:
  - pattern: message-channel
    reason: >-
      Message channels are durable or asynchronous pipes between filters.
  - pattern: message-filter
    reason: >-
      Message Filter is a specialised filter that discards unwanted messages.
  - pattern: message-translator
    reason: >-
      Message Translator is a filter that changes representation between stages.
  - pattern: splitter
    reason: >-
      Splitter and Aggregator provide common pipeline stages for collection-shaped messages.
conflicts_with:
  - transaction-script
alternatives:
  - event-driven-architecture
  - chain-of-responsibility
  - message-router
languages:
  - language-agnostic
  - python
  - go
