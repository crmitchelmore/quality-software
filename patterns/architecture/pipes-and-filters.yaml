diagram: |-
  flowchart LR
    Source[Source] --> Parse[Parse]
    Parse --> Validate[Validate]
    Validate --> Enrich[Enrich]
    Enrich --> Route[Route]
    Route --> Sink[Sink]
    Validate -. rejects .-> DLQ[Rejects]
examples:
  - language: python
    title: Compose data stages instead of one mutable script
    negative: |
      def import_customers(rows):
          imported = []
          for row in rows:
              row["email"] = row["email"].strip().lower()
              if "@" not in row["email"]:
                  continue
              row["country"] = lookup_country(row["postcode"])
              db.insert("customers", row)
              imported.append(row)
          return imported
    positive: |
      def normalise(rows):
          for row in rows:
              yield {**row, "email": row["email"].strip().lower()}
      
      def valid(rows):
          for row in rows:
              if "@" in row["email"]:
                  yield row
      
      def enrich(rows, geo):
          for row in rows:
              yield {**row, "country": geo.country(row["postcode"])}
      
      def import_customers(rows, geo, sink):
          for row in enrich(valid(normalise(rows)), geo):
              sink.write(row)
    explanation: >-
      The positive version gives each filter one transformation contract. Stages can be tested with iterables, reused in other pipelines, and instrumented separately.
ratings:
  small:
    score: 3
    notes: >-
      Useful even in small scripts when transformations are naturally staged, though full pipeline infrastructure is unnecessary.
  medium:
    score: 4
    notes: >-
      Good for ETL, import, and message-processing systems where stages need reuse and testability.
  large:
    score: 5
    notes: >-
      Excellent for high-throughput data platforms that need independent scaling, backpressure, and observable processing stages.
references:
  - title: Pattern-Oriented Software Architecture Volume 1
    author: Buschmann et al.
    year: 1996
