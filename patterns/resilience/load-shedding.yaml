id: load-shedding
title: Load Shedding
scale: integration
category: resilience
altitude: medium
maturity: established
aka:
  - Controlled Rejection
  - Brownout
short_description: >-
  Deliberately reject or degrade lower-value work during overload so the system can
  continue serving its most important traffic within safe resource limits.
description: >-
  Load shedding is an overload protection pattern: when admission control detects that
  latency, concurrency, queue depth, CPU or error budgets are beyond safe limits, the
  system refuses selected work instead of accepting everything and failing globally.
  Shedding may return 429/503, skip optional features, reduce result quality, sample
  analytics, or reject low-priority tenants first. The key is intentionality: define
  priority classes, rejection signals and client retry guidance before overload, then
  emit metrics showing what was shed and why.
problem: >-
  Systems often keep accepting requests after they have no realistic capacity to
  complete them. Queues grow, latency explodes, clients retry, and eventually even
  high-value work fails because resources are consumed by work that will time out anyway.
context: >-
  Use at APIs, gateways, workers and queue consumers where overload is possible and
  some traffic is more valuable or more urgent than other traffic. It is most effective
  with measurable saturation signals and clients that respect retry-after guidance.
consequences:
  - Preserves capacity for critical work and keeps overload local rather than global.
  - Produces explicit, fast failure instead of hidden queueing and timeouts.
  - Requires product and operational decisions about priority and fairness.
  - Can harm users if shedding criteria are opaque, unfair or too aggressive.
synergies:
  - pattern: bulkhead
    reason: Bulkheads define which compartment is full; shedding rejects only that class instead of all work.
  - pattern: rate-limiting
    reason: Rate limits prevent predictable overload while shedding reacts to real-time saturation.
  - pattern: backpressure
    reason: Backpressure slows cooperative producers; shedding handles producers that cannot or will not slow down.
  - pattern: fallback
    reason: Optional features can be degraded or skipped instead of rejecting the whole request.
alternatives:
  - throttling
  - queue-based-load-leveling
  - fallback
languages:
  - language-agnostic
  - typescript
  - go
  - java
  - python
frameworks:
  - none
  - nodejs
  - spring-boot
  - kubernetes
  - istio
project_types:
  - web-api
  - backend-service
  - microservices
  - distributed-system
  - high-throughput
tags:
  - resilience
  - overload-protection
  - admission-control
  - graceful-degradation
examples:
  - language: typescript
    title: Rejecting low-priority traffic when saturated
    negative: |
      // Accepts every request even when the queue is already beyond useful latency.
      app.post("/reports", async (req, res) => {
        await reportQueue.add(req.body);
        res.status(202).json({ accepted: true });
      });
    positive: |
      app.post("/reports", async (req, res) => {
        const queueDepth = await reportQueue.depth();
        const priority = req.header("x-priority") ?? "normal";

        if (queueDepth > 10_000 && priority !== "critical") {
          res.setHeader("Retry-After", "60");
          res.status(503).json({ accepted: false, reason: "report service overloaded" });
          return;
        }

        await reportQueue.add(req.body, { priority });
        res.status(202).json({ accepted: true });
      });
    explanation: >-
      The positive version refuses lower-priority work when the queue is saturated,
      gives clients retry guidance, and preserves capacity for critical reports.
ratings:
  small:
    score: 2
    notes: Rarely needed unless the app has visible overload modes or expensive background work.
  medium:
    score: 4
    notes: Strong fit for APIs and worker systems with bursts, priorities or external clients.
  large:
    score: 5
    notes: Essential for internet-scale and multi-tenant systems where overload is routine.
references:
  - title: Site Reliability Engineering; Handling Overload
    author: Google
    url: https://sre.google/sre-book/handling-overload/
