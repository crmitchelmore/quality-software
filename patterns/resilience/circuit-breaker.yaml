id: circuit-breaker
title: Circuit Breaker
scale: integration
category: resilience
maturity: time-tested
short_description: >-
  Wrap calls to a failing remote dependency so that, after a failure threshold,
  calls are short-circuited for a cool-down period, protecting the caller and giving
  the dependency time to recover.
description: >-
  A circuit breaker monitors calls to a protected operation. In CLOSED state calls
  pass through and failures are counted; once failures exceed a threshold it trips to
  OPEN and fails fast without calling the dependency. After a timeout it moves to
  HALF-OPEN and allows a trial call: success closes the circuit, failure re-opens it.
  This prevents a struggling dependency from being hammered and stops failures from
  cascading and exhausting caller resources (threads, connections).
problem: >-
  When a remote dependency is slow or down, naive retrying piles on load, ties up
  caller threads/connections, and lets failures cascade through the system.
context: >-
  Synchronous calls across process/network boundaries to dependencies that can fail
  or become slow (HTTP APIs, databases, message brokers).
consequences:
  - Fails fast during outages, freeing caller resources and improving stability.
  - Gives the failing dependency room to recover (no thundering herd).
  - Requires tuning thresholds/timeouts; bad values cause flapping or sluggish recovery.
  - Needs a sensible fallback for the open state (cached value, default, error).
synergies:
  - pattern: retry
    reason: Retry handles transient blips; the breaker stops retries once failures are systemic.
  - pattern: bulkhead
    reason: Bulkheads isolate resources so a tripped dependency cannot exhaust shared pools.
  - pattern: timeout
    reason: Timeouts bound each call so the breaker can detect slowness, not just errors.
  - pattern: fallback
    reason: A fallback supplies a degraded response while the circuit is open.
languages:
  - language-agnostic
  - java
  - csharp
  - go
  - typescript
  - python
frameworks:
  - spring-boot
  - dotnet
  - nodejs
  - istio
  - grpc
project_types:
  - microservices
  - distributed-system
  - backend-service
  - web-api
tags:
  - resilience
  - fault-tolerance
  - stability
  - state-machine
diagram: |-
  stateDiagram-v2
    [*] --> Closed
    Closed --> Open: failures >= threshold
    Open --> HalfOpen: after cooldown timeout
    HalfOpen --> Closed: trial call succeeds
    HalfOpen --> Open: trial call fails
    note right of Closed
      calls pass through
      count failures
    end note
    note right of Open
      fail fast / fallback
      no calls to dependency
    end note
examples:
  - language: typescript
    title: Protecting an HTTP dependency
    negative: |
      // Every request hits the dead service; retries amplify load and exhaust the pool.
      async function getRate(): Promise<number> {
        for (let i = 0; i < 3; i++) {
          try {
            return (await http.get("https://fx.example/usd")).data.rate;
          } catch {
            /* retry immediately, even if the service is hard-down */
          }
        }
        throw new Error("fx unavailable");
      }
    positive: |
      const breaker = new CircuitBreaker(() => http.get("https://fx.example/usd"), {
        failureThreshold: 5,
        cooldownMs: 30_000,
        timeoutMs: 1_000,
      });

      async function getRate(): Promise<number> {
        try {
          return (await breaker.fire()).data.rate;   // fails fast while OPEN
        } catch {
          return lastKnownRate;                      // fallback: degraded but available
        }
      }
    explanation: >-
      The positive version stops calling a hard-down dependency after repeated
      failures and serves a fallback, protecting caller resources and the dependency.
ratings:
  small:
    score: 2
    notes: Rarely needed in small single-process apps/libraries with no remote calls.
  medium:
    score: 4
    notes: Valuable once you have a few critical remote dependencies; use a library, don't hand-roll.
  large:
    score: 5
    notes: Essential in distributed systems/microservices to prevent cascading failure.
references:
  - title: Release It! Design and Deploy Production-Ready Software
    author: Michael T. Nygard
    year: 2007
  - title: Microsoft Azure Architecture Center; Circuit Breaker pattern
    url: https://learn.microsoft.com/azure/architecture/patterns/circuit-breaker
