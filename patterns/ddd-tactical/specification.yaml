id: specification
title: Specification
scale: design
category: ddd-tactical
altitude: low
maturity: time-tested
short_description: >-
  Encapsulate a business rule as a composable predicate that can validate objects, select candidates, or explain eligibility decisions.
description: >-
  A Specification packages a domain predicate behind a name such as EligibleForUpgrade, CanShipInternationally, or OverCreditLimit. Specifications can be combined with and/or/not, reused by entities, domain services, and repositories, and tested independently. In DDD they are valuable when a rule is important enough to name, reused in multiple workflows, or must be translated into a query while retaining domain meaning.
problem: >-
  Eligibility and selection rules are often duplicated as inline if statements, SQL fragments, and UI filters. Over time the same business concept diverges across commands, reports, and validations.
context: >-
  Use specifications for reusable or composable predicates, particularly when the same rule needs to validate an aggregate and query a repository.
consequences:
  - Gives business rules names and makes them reusable across workflows.
  - Supports composition and unit testing of complex eligibility logic.
  - Can bridge domain predicates to persistence queries when carefully designed.
  - Overuse creates many tiny classes for one-off conditions; query translation can leak persistence concerns.
synergies:
  - pattern: repository
    reason: Repositories can accept specifications to express domain criteria without exposing SQL or ORM details.
  - pattern: value-object
    reason: Specifications are clearer when predicates use rich value-object behaviour instead of primitive comparisons.
  - pattern: domain-service
    reason: Domain services can delegate reusable eligibility rules to specifications.
  - pattern: composite
    reason: Composite structure naturally models and/or/not combinations of specifications.
alternatives:
  - query-object
  - strategy
  - guard-clause
conflicts_with:
  - transaction-script
languages:
  - language-agnostic
  - csharp
  - java
  - typescript
frameworks:
  - none
  - dotnet
  - spring-boot
  - entity-framework
  - hibernate
project_types:
  - backend-service
  - modular-monolith
  - microservices
  - web-api
tags:
  - ddd
  - rules
  - predicates
  - query
examples:
  - language: csharp
    title: Upgrade eligibility rule
    negative: |
      if (customer.Status == "Active" && customer.TotalSpend > 1000 && !customer.HasOpenDispute)
      {
          customer.UpgradeToGold();
      }

      var candidates = db.Customers.Where(c => c.Status == "Active" && c.TotalSpend > 1000 && !c.HasOpenDispute);
    positive: |
      public interface ISpecification<T>
      {
          bool IsSatisfiedBy(T candidate);
      }

      public sealed class EligibleForGoldUpgrade : ISpecification<Customer>
      {
          public bool IsSatisfiedBy(Customer customer) =>
              customer.IsActive && customer.TotalSpend().IsGreaterThan(Money.gbp(1000_00)) && !customer.HasOpenDispute;
      }

      if (new EligibleForGoldUpgrade().IsSatisfiedBy(customer))
      {
          customer.UpgradeToGold();
      }
    explanation: >-
      The positive version names the business rule once and makes it testable. A repository adapter can translate the same specification concept to an efficient query without duplicating the language.
ratings:
  small:
    score: 2
    notes: >-
      Too much structure for one-off conditions; use when the rule is named or reused.
  medium:
    score: 4
    notes: >-
      Good fit for eligibility, policy, and search criteria shared by application workflows.
  large:
    score: 4
    notes: >-
      Valuable in large domains, but enforce conventions to avoid a proliferation of trivial predicate classes.
references:
  - title: Specifications
    author: Martin Fowler and Eric Evans
    year: 2004
  - title: Domain-Driven Design
    author: Eric Evans
    year: 2003
