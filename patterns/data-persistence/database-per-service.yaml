id: database-per-service
title: Database per Service
scale: data
category: data-persistence
altitude: high
maturity: established
short_description: >-
  Each independently deployable service owns its durable store and exposes state through APIs or events, not shared tables.
description: >-
  Database per Service gives every service exclusive authority over its schema, migration cadence, transaction boundary, and operational controls. Other services integrate through contracts such as REST, events, CDC streams, or sagas rather than joining tables directly. The pattern makes service autonomy real while making eventual consistency an explicit design concern.
problem: >-
  A shared database couples services through tables, locks, migrations, and unofficial query dependencies, so one team cannot change a schema or scale a workload without coordinating with every consumer.
context: >-
  Use for microservices or bounded contexts that have separate ownership, release cadence, and availability needs. Avoid splitting data merely because code was split; the boundary must match a stable business capability.
consequences:
  - Strong ownership and least-privilege access are easier because each service grants access only to its own store.
  - Distributed transactions become rare or impossible; sagas, outbox events, and compensating actions are required.
  - Cross-service reporting needs read models, data products, or CDC pipelines rather than ad hoc joins.
  - Operational burden increases because backup, migration, pooling, and observability are repeated per service.
synergies:
  - pattern: microservices
    reason: >-
      A service-owned database is what makes independent deployment and scaling credible rather than cosmetic.
  - pattern: saga
    reason: >-
      Sagas coordinate workflows that previously relied on a single ACID transaction across shared tables.
  - pattern: cqrs
    reason: >-
      CQRS read models provide query-side joins and projections without violating service data ownership.
  - pattern: outbox
    reason: >-
      The outbox publishes durable state changes from each owned database without dual-write races.
alternatives:
  - modular-monolith
  - service-oriented-architecture
  - shared-kernel
conflicts_with:
  - active-record
languages:
  - language-agnostic
  - sql
  - java
  - typescript
  - go
frameworks:
  - spring-boot
  - dotnet
  - kafka
  - kubernetes
  - none
project_types:
  - microservices
  - backend-service
  - distributed-system
  - web-api
tags:
  - service-ownership
  - distributed-data
  - eventual-consistency
examples:
  - language: typescript
    title: Avoid joining across service schemas
    negative: |
      async function createInvoice(orderId: string) {
        const row = await db.query(`
          SELECT o.id, o.total, c.credit_limit
          FROM orders.orders o
          JOIN customers.customers c ON c.id = o.customer_id
          WHERE o.id = $1`, [orderId]);

        await db.query("INSERT INTO billing.invoices(order_id,total) VALUES($1,$2)",
          [row.rows[0].id, row.rows[0].total]);
      }
    positive: |
      async function createInvoice(command: CreateInvoice) {
        const order = await ordersClient.getOrder(command.orderId);
        const credit = await customersClient.reserveCredit({
          customerId: order.customerId,
          amount: order.total,
          idempotencyKey: command.requestId
        });

        if (!credit.accepted) throw new CreditDeclined(command.orderId);
        await invoices.save(Invoice.opened(order.id, order.total));
      }
    explanation: >-
      The positive version respects data ownership: Billing reads Orders and reserves Customer credit through contracts, so schema changes, grants, and transactions stay inside the owning services.
ratings:
  small:
    score: 2
    notes: >-
      Usually premature for tiny systems; it creates distributed-data work before there is enough team or domain pressure to justify it.
  medium:
    score: 4
    notes: >-
      Good fit once services have independent owners and release cadence, provided integration patterns are explicit.
  large:
    score: 5
    notes: >-
      Excellent for large organisations where autonomy, blast-radius control, and database-level least privilege matter more than simple joins.
