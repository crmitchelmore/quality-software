id: write-through-cache
title: Write-Through Cache
scale: data
category: data-persistence
maturity: established
short_description: >-
  Write every change to the cache and durable store in the request path so subsequent reads hit fresh cached data.
description: >-
  Write-through caching updates the cache synchronously whenever the system commits the backing store, or uses a cache service that performs both operations as one logical write. Reads can trust that cached values reflect committed writes, reducing miss storms and stale reads compared with cache-aside. The cost is higher write latency and a need to define what happens when either the database or cache write succeeds alone.
problem: >-
  Cache-aside systems often forget to invalidate or refresh keys after writes, causing clients to observe stale state until expiry.
context: >-
  Use for read-heavy entities with predictable keys and moderate write volume where fresh cache reads matter. Do not use when cache writes are best-effort or when write latency is extremely sensitive.
consequences:
  - Reads are simpler because hot keys are already populated after writes.
  - The write path depends on both the database and cache; partial failure handling must be explicit.
  - Write amplification can be expensive for high-cardinality or rarely read values.
  - Cache schema and versioning become part of the write contract.
synergies:
  - pattern: cache-aside
    reason: >-
      Write-through can be used for critical keys while cache-aside remains adequate for derived or low-value data.
  - pattern: write-behind-cache
    reason: >-
      Write-behind is the latency-oriented alternative; contrasting both clarifies whether durability or speed dominates.
  - pattern: connection-pool
    reason: >-
      Synchronous writes must not hold scarce database connections while waiting on slow cache operations.
  - pattern: retry
    reason: >-
      Retries need idempotent writes so transient cache failures do not duplicate side effects.
alternatives:
  - cache-aside
  - write-behind-cache
  - materialized-view
conflicts_with:
  - write-behind-cache
languages:
  - language-agnostic
  - typescript
  - java
  - python
frameworks:
  - redis
  - spring-boot
  - nodejs
  - django
  - none
project_types:
  - web-api
  - backend-service
  - high-throughput
tags:
  - cache-consistency
  - write-path
  - redis
examples:
  - language: typescript
    title: Populate cache as part of the write
    negative: |
      async function renameProduct(id: string, name: string) {
        await db.query("UPDATE products SET name=$1 WHERE id=$2", [name, id]);
        // Existing cache entry may stay stale until TTL expires.
      }
    positive: |
      async function renameProduct(id: string, name: string) {
        const product = await db.tx(async t => {
          await t.query("UPDATE products SET name=$1 WHERE id=$2", [name, id]);
          return t.one("SELECT id,name,price FROM products WHERE id=$1", [id]);
        });
        await cache.set(`product:${id}`, JSON.stringify(product), { ttl: 300 });
      }
    explanation: >-
      The positive version refreshes the cache with the committed representation, so later reads do not serve a stale pre-update value.
ratings:
  small:
    score: 3
    notes: >-
      Can be useful for a small hot catalogue, but often simpler invalidation is enough.
  medium:
    score: 4
    notes: >-
      Good when stale reads cause support issues and write volume is manageable.
  large:
    score: 4
    notes: >-
      Valuable for critical hot keys, though large systems must control write amplification and partial failures carefully.
