id: pure-function
title: Pure Function
aka:
  - Referentially Transparent Function
scale: implementation
category: functional
maturity: time-tested
short_description: >-
  Write functions whose result depends only on inputs and that produce no observable side effects.
description: >-
  A Pure Function can be replaced by its returned value without changing program behaviour. It does not read hidden mutable state, mutate arguments, perform I/O, inspect time, or use randomness unless those values are explicit inputs. Purity turns code into deterministic transformations that are easy to test, compose, cache, parallelise, and reason about.
problem: >-
  Business rules mixed with I/O, time, global state, or mutation are difficult to test and can behave differently between calls with the same visible inputs.
context: >-
  Use for domain calculations, validators, parsers, reducers, mappers, pricing rules, and any logic that can be separated from effects at the boundary.
consequences:
  - Deterministic tests require no mocks for the pure core.
  - Safe to compose, memoize, parallelise, and reorder when dependencies allow.
  - >-
    Requires effects to be pushed to the edges, which can add plumbing in effect-heavy workflows.
  - >-
    Absolute purity is impractical at system boundaries; isolate effects rather than pretending they do not exist.
synergies:
  - pattern: immutability
    reason: >-
      Immutable inputs and outputs prevent accidental mutation from breaking referential transparency.
  - pattern: memoization
    reason: >-
      Memoization is correct only when a function returns the same result for the same inputs.
  - pattern: property-based-testing
    reason: >-
      Pure functions are ideal targets for property tests because generators can exercise them without fixtures.
  - pattern: hexagonal-architecture
    reason: >-
      Ports keep I/O at the edge so the application core can be mostly pure.
alternatives:
  - transaction-script
  - active-record
languages:
  - language-agnostic
  - haskell
  - scala
  - clojure
  - typescript
  - rust
frameworks:
  - none
  - redux
project_types:
  - library
  - backend-service
  - web-api
  - web-frontend
  - safety-critical
tags:
  - determinism
  - testability
  - referential-transparency
examples:
  - language: typescript
    title: Separating a discount calculation from time and I/O
    negative: |
      let currentCampaign = "WINTER";
      
      function discount(customer: Customer): number {
        analytics.track("discount_checked", { id: customer.id });
        if (Date.now() > customer.memberUntil.getTime() && currentCampaign === "WINTER") {
          return 0.15;
        }
        return 0;
      }
    positive: |
      type DiscountInput = {
        memberUntil: Date;
        now: Date;
        campaign: string;
      };
      
      function discount(input: DiscountInput): number {
        const expired = input.now > input.memberUntil;
        return expired && input.campaign === "WINTER" ? 0.15 : 0;
      }
      
      analytics.track("discount_checked", { id: customer.id });
      const value = discount({ memberUntil: customer.memberUntil, now, campaign });
    explanation: >-
      The positive version makes time and campaign explicit inputs and moves analytics outside, so the rule is deterministic and can be tested with plain values.
ratings:
  small:
    score: 5
    notes: Immediate clarity and testability benefits, even in tiny modules.
  medium:
    score: 5
    notes: A default for domain logic; greatly reduces fixture and mock burden.
  large:
    score: 4
    notes: >-
      Highly valuable, but large systems still need disciplined effect boundaries and observability.
references:
  - title: Why Functional Programming Matters
    author: John Hughes
    year: 1989
