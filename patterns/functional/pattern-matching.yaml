id: pattern-matching
title: Pattern Matching
aka:
  - Destructuring Match
  - Algebraic Matching
scale: implementation
category: functional
altitude: low
maturity: time-tested
short_description: >-
  Branch by matching data shape and variants, often with exhaustive compiler checking.
description: >-
  Pattern Matching selects behaviour by the structure of data: union variants, tuples, lists, records, literals, and guards. Unlike ad hoc if/else chains, a match can destructure values and require every variant to be handled. It is especially valuable with algebraic data types such as Option, Result, and domain events.
problem: >-
  Conditionals that inspect tags and then manually cast or dereference fields are verbose, unsafe, and easy to leave non-exhaustive when variants change.
context: >-
  Use with sealed unions, enums, algebraic data types, command variants, parser ASTs, domain events, and typed error models.
consequences:
  - Makes branching over variants explicit and often exhaustively checked.
  - Destructures data close to the branch that uses it.
  - >-
    Can become unwieldy if each branch contains large business workflows; delegate after matching.
  - >-
    In languages without exhaustiveness checking, it may be mostly syntactic convenience.
synergies:
  - pattern: option-maybe
    reason: Matching Some/None forces callers to handle missing values.
  - pattern: either-result
    reason: Matching Ok/Err makes recoverable failures explicit at the use site.
  - pattern: visitor
    reason: >-
      Visitor is the object-oriented alternative for exhaustive operations over variants.
  - pattern: type-state
    reason: >-
      Pattern matching over states keeps allowed transitions visible and typed.
alternatives:
  - visitor
  - strategy
  - state
languages:
  - rust
  - scala
  - haskell
  - elixir
  - scala
  - typescript
frameworks:
  - none
project_types:
  - library
  - backend-service
  - web-api
  - cli-tool
tags:
  - control-flow
  - algebraic-data-types
  - exhaustiveness
examples:
  - language: rust
    title: Handling payment results
    negative: |
      enum PaymentResult {
          Paid { receipt: String },
          Declined { reason: String },
          Pending,
      }
      
      fn message(result: PaymentResult) -> String {
          // imagine this was encoded as strings and nullable fields
          "payment status changed".to_string()
      }
    positive: |
      enum PaymentResult {
          Paid { receipt: String },
          Declined { reason: String },
          Pending,
      }
      
      fn message(result: PaymentResult) -> String {
          match result {
              PaymentResult::Paid { receipt } => format!("paid: {}", receipt),
              PaymentResult::Declined { reason } => format!("declined: {}", reason),
              PaymentResult::Pending => "pending".to_string(),
          }
      }
    explanation: >-
      The positive version binds only fields valid for each variant and the compiler requires every PaymentResult case to be handled.
ratings:
  small:
    score: 4
    notes: >-
      Very clear for small unions and errors where language support exists.
  medium:
    score: 5
    notes: >-
      Excellent for domain events, command handling, typed errors, and parsers.
  large:
    score: 5
    notes: >-
      Essential in large typed functional systems because variant additions become compiler-guided changes.
references:
  - title: ML for the Working Programmer
    author: Lawrence C. Paulson
    year: 1991
