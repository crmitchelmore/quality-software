id: lens
title: Lens
aka:
  - Functional Optic
scale: design
category: functional
maturity: established
short_description: >-
  Focus on a nested part of immutable data with composable get and set/update operations.
description: >-
  A Lens packages two operations for a field or nested path: get the focused value and set or modify it, returning a new outer structure. Lenses compose, so complex immutable updates can be expressed once and reused without hand-written spread/copy code at every call site. They are powerful but introduce abstraction that must be justified by repeated nested updates.
problem: >-
  Updating deeply nested immutable structures by hand creates noisy, error-prone copy code that obscures the actual field being changed.
context: >-
  Use in functional domains, reducers, AST transformations, configuration editors, and immutable document models with repeated nested reads and updates.
consequences:
  - Centralises nested access rules and keeps immutable updates concise.
  - Composes small field lenses into reusable paths.
  - Can be cryptic without library support and team familiarity.
  - >-
    May hide expensive whole-structure copies unless backed by persistent data structures.
synergies:
  - pattern: immutability
    reason: >-
      Lenses make immutable nested updates practical without abandoning value semantics.
  - pattern: persistent-data-structure
    reason: >-
      Structural sharing keeps lens updates efficient for large immutable trees.
  - pattern: function-composition
    reason: Lenses compose to focus through multiple layers of data.
  - pattern: value-object
    reason: >-
      Lenses preserve value-object replacement semantics instead of mutating internals.
alternatives:
  - builder
  - copy-on-write
  - data-transfer-object
languages:
  - haskell
  - scala
  - clojure
  - typescript
  - rust
frameworks:
  - none
  - redux
project_types:
  - library
  - web-frontend
  - data-pipeline
  - backend-service
tags:
  - optics
  - nested-data
  - immutable-update
examples:
  - language: typescript
    title: Updating nested account settings
    negative: |
      type Account = { profile: { address: { city: string; postcode: string } } };
      
      function move(account: Account, city: string): Account {
        return {
          ...account,
          profile: {
            ...account.profile,
            address: {
              ...account.profile.address,
              city,
            },
          },
        };
      }
    positive: |
      type Lens<S, A> = {
        get(source: S): A;
        set(value: A, source: S): S;
      };
      
      const over = <S, A>(lens: Lens<S, A>, f: (value: A) => A, source: S): S =>
        lens.set(f(lens.get(source)), source);
      
      const cityLens: Lens<Account, string> = {
        get: (account) => account.profile.address.city,
        set: (city, account) => ({
          ...account,
          profile: { ...account.profile, address: { ...account.profile.address, city } },
        }),
      };
      
      const moved = over(cityLens, () => "Leeds", account);
    explanation: >-
      The positive version gives the nested path a reusable name; callers update the city without repeating copy mechanics throughout the codebase.
ratings:
  small:
    score: 2
    notes: >-
      Usually overkill unless building a library or reducer with repeated nested edits.
  medium:
    score: 3
    notes: >-
      Helpful for immutable document/state models, but introduce only with conventions and tests.
  large:
    score: 4
    notes: >-
      Valuable in large functional codebases with deep immutable structures and standard optic libraries.
references:
  - title: The Essence of the Iterator Pattern
    author: Jeremy Gibbons and Bruno Oliveira
    year: 2009
