id: partial-application
title: Partial Application
aka:
  - Argument Binding
scale: implementation
category: functional
maturity: time-tested
short_description: >-
  Create a new function by fixing some arguments of an existing function, leaving the remaining arguments to be supplied later.
description: >-
  Partial Application specialises a general function without changing its implementation. By binding stable inputs such as dependencies, configuration, or a predicate threshold, callers receive a smaller function with a more useful shape. Unlike currying, partial application does not require the original function to be unary at every step.
problem: >-
  General functions often require contextual arguments that are constant at a call site, causing repetition and making the real varying input hard to see.
context: >-
  Use when adapting a reusable function to a narrower interface: event handlers, collection callbacks, validators, logging helpers, or dependency-bound domain operations.
consequences:
  - Removes repeated arguments and clarifies what varies at the call site.
  - Adapts existing APIs without wrappers full of boilerplate.
  - >-
    Can hide important configuration if the specialised function is poorly named.
  - >-
    Binding mutable objects can create surprising behaviour if the captured value changes later.
synergies:
  - pattern: currying
    reason: Curried APIs make partial application natural and type-directed.
  - pattern: function-composition
    reason: >-
      Partially applied functions often have the unary shape needed for composition.
  - pattern: dependency-injection
    reason: >-
      Dependencies can be supplied once at the composition root, producing pure use-case functions.
  - pattern: higher-order-function
    reason: >-
      Partial application produces functions that are passed around as values.
alternatives:
  - options-object
  - parameter-object
  - factory-method
languages:
  - language-agnostic
  - typescript
  - javascript
  - python
  - scala
  - haskell
frameworks:
  - none
  - react
  - nodejs
project_types:
  - library
  - web-frontend
  - backend-service
  - cli-tool
tags:
  - specialisation
  - closures
  - configuration
examples:
  - language: typescript
    title: Binding a logger to an audit helper
    negative: |
      type Logger = { info(message: string, fields: Record<string, string>): void };
      
      function audit(logger: Logger, actor: string, action: string): void {
        logger.info("audit", { actor, action });
      }
      
      audit(logger, user.id, "profile.updated");
      audit(logger, user.id, "password.changed");
    positive: |
      type Logger = { info(message: string, fields: Record<string, string>): void };
      
      function audit(logger: Logger, actor: string, action: string): void {
        logger.info("audit", { actor, action });
      }
      
      const auditFor = (logger: Logger, actor: string) =>
        (action: string) => audit(logger, actor, action);
      
      const auditUser = auditFor(logger, user.id);
      auditUser("profile.updated");
      auditUser("password.changed");
    explanation: >-
      The positive version binds the stable logger and actor once, leaving a small, intention-revealing function for each audited action.
ratings:
  small:
    score: 4
    notes: Low ceremony and often clearer than small adapter classes.
  medium:
    score: 4
    notes: >-
      Strong fit for callbacks, dependency-bound functions, and functional service modules.
  large:
    score: 3
    notes: >-
      Useful internally, but public APIs should avoid excessive implicit binding that obscures dependencies.
references:
  - title: Functional Programming in Scala
    author: Paul Chiusano and Rúnar Bjarnason
    year: 2014
