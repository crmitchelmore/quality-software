id: facade
title: Facade
scale: design
category: gof-structural
maturity: time-tested
short_description: >-
  Provide a small, intention-revealing interface over a complex subsystem so clients use common workflows without knowing internal collaborators.
description: >-
  Facade defines a simpler entry point to a subsystem that would otherwise require callers to coordinate many classes, order-sensitive operations, or low-level APIs. It does not hide the subsystem from advanced use; it packages the common path behind a stable interface. A good facade expresses business or workflow intent, delegates to specialised collaborators, and keeps policy at the right layer rather than becoming a god object.
problem: >-
  Clients repeatedly orchestrate the same subsystem steps, creating duplication, incorrect call order, and tight coupling to internal classes.
context: >-
  Use when a subsystem has many moving parts but most clients need a small set of high-level workflows.
consequences:
  - Reduces coupling between clients and subsystem internals.
  - Centralises common orchestration and default choices.
  - Can become an anemic pass-through if it adds no cohesive workflow.
  - Can become a god object if unrelated operations accumulate behind one facade.
synergies:
  - pattern: adapter
    reason: A facade may expose a clean subsystem API while adapters translate individual external dependencies underneath.
  - pattern: mediator
    reason: Mediator coordinates peer objects, while Facade gives clients a simple entry point to coordinated subsystem behaviour.
  - pattern: service-layer
    reason: Service Layer is often an application-level facade over domain, repository, and integration collaborators.
  - pattern: api-gateway
    reason: API Gateway is an architectural facade over several backend services for external clients.
alternatives:
  - adapter
  - mediator
  - service-layer
languages:
  - language-agnostic
  - java
  - csharp
  - typescript
  - python
frameworks:
  - none
  - spring-boot
  - dotnet
  - nestjs
project_types:
  - backend-service
  - web-api
  - modular-monolith
  - library
tags:
  - simplification
  - orchestration
  - subsystem
examples:
  - language: typescript
    title: Account onboarding subsystem
    negative: |
      class SignupController {
        async post(req: Request): Promise<Response> {
          const user = await users.create(req.body.email);
          await preferences.createDefaults(user.id);
          await billing.createTrialAccount(user.id);
          await mailer.sendWelcome(user.email);
          await audit.record("user.signup", user.id);
          return json({ id: user.id }, 201);
        }
      }
    positive: |
      class OnboardingFacade {
        constructor(
          private readonly users: UserDirectory,
          private readonly preferences: PreferenceService,
          private readonly billing: BillingService,
          private readonly mailer: Mailer,
          private readonly audit: AuditLog,
        ) {}

        async onboard(email: string): Promise<UserId> {
          const user = await this.users.create(email);
          await this.preferences.createDefaults(user.id);
          await this.billing.createTrialAccount(user.id);
          await this.mailer.sendWelcome(user.email);
          await this.audit.record("user.signup", user.id);
          return user.id;
        }
      }

      class SignupController {
        constructor(private readonly onboarding: OnboardingFacade) {}
        async post(req: Request): Promise<Response> {
          return json({ id: await this.onboarding.onboard(req.body.email) }, 201);
        }
      }
    explanation: >-
      The positive version gives controllers one cohesive onboarding operation and keeps subsystem ordering in one place. The underlying services remain separate and testable.
ratings:
  small:
    score: 3
    notes: >-
      Useful for simplifying awkward libraries, but can be unnecessary if there are only one or two calls.
  medium:
    score: 4
    notes: >-
      Good for repeated workflows and module boundaries in services and modular monoliths.
  large:
    score: 5
    notes: >-
      Excellent for stabilising subsystem APIs across teams, provided ownership prevents facade bloat.
references:
  - title: "Design Patterns: Elements of Reusable Object-Oriented Software"
    author: Gamma, Helm, Johnson, Vlissides
    year: 1994
