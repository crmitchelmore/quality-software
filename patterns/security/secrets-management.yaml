id: secrets-management
title: Secrets Management
aka:
  - Secret vaulting
  - Credential hygiene
scale: design
category: security
maturity: established
short_description: >-
  Store, distribute, rotate, and audit credentials through dedicated mechanisms instead of source code, images, logs, or ad-hoc environment sprawl.
description: >-
  Secrets Management treats passwords, API keys, signing keys, certificates, and refresh tokens as lifecycle-managed assets. Secrets should be generated with sufficient entropy, stored in a vault or platform secret store, injected at runtime with least privilege, rotated regularly and on exposure, and never logged or committed. Mature designs prefer short-lived credentials and workload identity over static secrets, reducing both leak probability and blast radius.
problem: >-
  Hard-coded or casually shared secrets leak through repositories, build logs, images, tickets, and developer machines, often granting broad persistent access.
context: >-
  Use for every application that talks to databases, third-party APIs, cloud resources, signing systems, or identity providers.
consequences:
  - >-
    Reduces accidental leakage and enables revocation/rotation when exposure happens.
  - >-
    Improves auditability of who or what accessed a secret.
  - >-
    Adds operational dependency on secret stores and startup wiring; plan for local development and outages.
synergies:
  - pattern: least-privilege
    reason: >-
      Each secret should grant only the permissions the workload needs.
  - pattern: federated-identity
    reason: >-
      Workload identity can replace many static secrets with short-lived credentials.
  - pattern: token-based-auth
    reason: >-
      Token signing keys, client secrets, and refresh tokens need rotation and controlled access.
  - pattern: audit-logging
    reason: >-
      Secret access and rotation events should be auditable without exposing values.
alternatives:
  - secure-by-default
languages:
  - language-agnostic
  - javascript
  - typescript
  - python
  - java
frameworks:
  - none
  - nodejs
  - spring-boot
  - kubernetes
  - terraform
  - fastapi
project_types:
  - web-api
  - backend-service
  - microservices
  - serverless
  - distributed-system
tags:
  - secrets
  - rotation
  - credentials
examples:
  - language: python
    title: Runtime secret retrieval
    negative: |-
      STRIPE_KEY = "replace-me-in-source"
      
      def charge(customer_id, amount):
          return stripe.Charge.create(api_key=STRIPE_KEY, customer=customer_id, amount=amount)
    positive: |-
      def stripe_client(secret_store, workload_identity):
          api_key = secret_store.read("payments/stripe/api-key", identity=workload_identity)
          return StripeClient(api_key=api_key)
      
      def charge(customer_id, amount, client):
          return client.charge(customer=customer_id, amount=amount)
    explanation: >-
      The positive code retrieves the secret at runtime through an authorised identity and keeps the value out of source. Rotation can happen in the secret store without changing application code.
ratings:
  small:
    score: 4
    notes: >-
      Important even for small apps; use the platform secret store rather than inventing one.
  medium:
    score: 5
    notes: >-
      Excellent fit as soon as CI, cloud resources, and multiple services share credentials.
  large:
    score: 5
    notes: >-
      Critical at scale; automate rotation, access review, and incident response for leaked secrets.
