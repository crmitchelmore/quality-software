id: token-based-auth
title: Token-Based Authentication
aka:
  - Bearer token auth
  - JWT auth
scale: integration
category: security
altitude: medium
maturity: established
short_description: >-
  Authenticate requests with signed, time-bound tokens carrying identity, audience, issuer, and scope claims verified at each resource boundary.
description: >-
  Token-Based Authentication replaces server-local session lookups with verifiable credentials presented on each request, commonly OAuth access tokens or JWTs. Correct use requires validating signature, issuer, audience, expiry, not-before time, and scopes; tokens should be short-lived, transmitted only over TLS, and stored carefully by clients. The pattern supports distributed systems because services can authenticate callers consistently, but it is dangerous when tokens are treated as trusted just because they decode.
problem: >-
  Distributed clients and services need portable identity proof, but naive bearer strings or unchecked JWTs enable impersonation and privilege escalation.
context: >-
  Use for APIs, mobile clients, SPAs with backends, service-to-service calls, and federated identity integrations where requests cross process boundaries.
consequences:
  - >-
    Scales authentication across services without central session state on every request.
  - >-
    Enables scoped, audience-bound access decisions.
  - >-
    Bearer tokens are high-value secrets; validation, storage, rotation, and revocation strategy must be designed.
synergies:
  - pattern: federated-identity
    reason: >-
      Federated identity providers issue standards-based tokens from centralised trust relationships.
  - pattern: least-privilege
    reason: >-
      Scopes and audiences encode least privilege for each token.
  - pattern: secrets-management
    reason: >-
      Signing keys, client secrets, and refresh tokens require managed storage and rotation.
  - pattern: audit-logging
    reason: >-
      Token subject, issuer, and client identifiers are core fields for security audit trails.
alternatives:
  - secure-by-default
languages:
  - language-agnostic
  - javascript
  - typescript
  - python
  - java
frameworks:
  - nodejs
  - express
  - spring-boot
  - fastapi
  - django
  - grpc
project_types:
  - web-api
  - backend-service
  - microservices
  - mobile-app
  - distributed-system
tags:
  - authentication
  - oauth
  - jwt
examples:
  - language: typescript
    title: JWT validation in an API
    negative: |-
      app.get("/me", (req, res) => {
        const token = String(req.headers.authorization).replace("Bearer ", "");
        const claims = JSON.parse(Buffer.from(token.split(".")[1], "base64url").toString());
        res.json({ subject: claims.sub, scopes: claims.scope });
      });
    positive: |-
      const verifier = createJwtVerifier({
        issuer: "https://issuer.example.com/",
        audience: "orders-api",
        jwksUri: "https://issuer.example.com/.well-known/jwks.json"
      });
      
      app.get("/me", async (req, res) => {
        const claims = await verifier.verifyBearer(req.headers.authorization);
        requireScope(claims, "profile:read");
        res.json({ subject: claims.sub });
      });
    explanation: >-
      The positive code verifies signature, issuer, audience, expiry, and required scope before trusting claims. The negative code merely decodes attacker-controlled JSON.
ratings:
  small:
    score: 3
    notes: >-
      Useful for small APIs with external clients, but session cookies may be simpler for one web app.
  medium:
    score: 5
    notes: >-
      Strong fit for service APIs and mobile/SPAs when implemented with a proven provider/library.
  large:
    score: 5
    notes: >-
      Essential for large distributed systems, with key rotation, scopes, and revocation processes.
