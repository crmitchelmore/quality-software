examples:
  - language: java
    title: Bounded handoff between request threads and workers
    negative: |
      import java.util.*;

      class UnsafeJobs {
        private final List<Runnable> jobs = new ArrayList<>();

        void submit(Runnable job) {
          jobs.add(job);              // races with worker iteration; ArrayList is not safe
        }

        void workerLoop() {
          while (true) {
            if (!jobs.isEmpty()) {     // check-then-act race
              Runnable job = jobs.remove(0);
              job.run();
            }
          }
        }
      }
    positive: |
      import java.util.concurrent.*;

      class JobQueue implements AutoCloseable {
        private final BlockingQueue<Runnable> queue = new ArrayBlockingQueue<>(1_000);
        private final ExecutorService workers = Executors.newFixedThreadPool(8);
        private volatile boolean accepting = true;

        JobQueue() {
          for (int i = 0; i < 8; i++) {
            workers.submit(() -> {
              while (!Thread.currentThread().isInterrupted()) {
                queue.take().run();     // atomic wait + remove with visibility guarantees
              }
              return null;
            });
          }
        }

        boolean submit(Runnable job) throws InterruptedException {
          if (!accepting) return false;
          return queue.offer(job, 200, TimeUnit.MILLISECONDS); // bounded backpressure
        }

        public void close() {
          accepting = false;
          workers.shutdownNow();
        }
      }
    explanation: >-
      The positive version uses a bounded BlockingQueue as the only handoff point. It removes the data race, avoids busy waiting, caps memory, and makes overload visible through a timed offer result.
ratings:
  small:
    score: 3
    notes: >-
      Useful for small tools with background work, but often unnecessary if direct synchronous execution is simpler and latency is acceptable.
  medium:
    score: 5
    notes: >-
      Excellent for services and pipelines with bursty ingress; it gives a clear concurrency boundary and pairs naturally with metrics.
  large:
    score: 4
    notes: >-
      Still valuable, but large systems often need distributed queues, partitioning, and explicit backpressure policies beyond an in-process queue.
references:
  - title: Java Concurrency in Practice
    author: Brian Goetz et al.
    year: 2006
  - title: Pattern-Oriented Software Architecture Volume 2
    author: Schmidt, Stal, Rohnert, Buschmann
    year: 2000
