id: double-checked-locking
title: Double-Checked Locking
aka:
  - DCL
scale: concurrency
category: concurrency
altitude: low
maturity: established
short_description: >-
  Lazily initialise a shared object by checking before and after acquiring a lock, using the language's safe-publication rules to avoid partially constructed reads.
description: >-
  Double-Checked Locking avoids taking a lock on every access to a lazily-created singleton or expensive value. A fast path reads the shared reference; only when it is absent does the caller acquire a lock and check again before constructing. The second check prevents duplicate creation after another thread wins the race. The pattern is correct only when the reference is safely published: for example Java volatile, C# volatile/lock memory barriers, C++ atomics, or language-provided lazy initialisation. Without those memory-ordering guarantees, another thread may observe a non-null reference to a partially constructed object.
problem: >-
  Lazy initialisation needs to be thread-safe without paying lock overhead on every read, but naive check-then-create races and can publish broken objects.
context: >-
  Use sparingly for expensive, shared, lazily-created values on hot paths when simpler static initialisation or Lazy<T>-style facilities cannot be used.
consequences:
  - Avoids lock overhead after initialisation while preserving single creation when implemented with safe publication.
  - Easy to get subtly wrong in languages with weak memory models; prefer library lazy primitives when available.
  - Couples callers to global lifetime and complicates testing if used for service location.
  - The object should be immutable or internally thread-safe once published.
synergies:
  - pattern: singleton
    reason: DCL is often used to lazily create a Singleton while keeping subsequent access lock-free.
  - pattern: immutable-object
    reason: Publishing an immutable object avoids later races after the safely-published reference becomes visible.
  - pattern: factory-method
    reason: The locked slow path can delegate construction to a factory while preserving lazy access.
  - pattern: monitor-object
    reason: The slow path relies on monitor-style mutual exclusion for the second check and construction.
alternatives:
  - singleton
  - immutable-object
  - factory-method
conflicts_with:
  - registry
languages:
  - java
  - csharp
  - cpp
frameworks:
  - none
  - spring
  - dotnet
project_types:
  - library
  - backend-service
  - desktop-app
tags:
  - lazy-initialisation
  - safe-publication
  - memory-model
examples:
  - language: java
    title: Safe lazy singleton publication
    negative: |
      class Config {
        private static Config instance; // not volatile: unsafe publication
        private final Map<String, String> values;

        private Config() { values = loadValues(); }

        static Config get() {
          if (instance == null) {
            synchronized (Config.class) {
              if (instance == null) instance = new Config();
            }
          }
          return instance; // another thread may observe a partially constructed Config
        }
      }
    positive: |
      class Config {
        private static volatile Config instance;
        private final Map<String, String> values;

        private Config() { values = loadValues(); }

        static Config get() {
          Config local = instance;
          if (local == null) {
            synchronized (Config.class) {
              local = instance;
              if (local == null) {
                local = new Config();
                instance = local; // volatile write safely publishes final state
              }
            }
          }
          return local;
        }
      }
    explanation: >-
      The positive version uses volatile and a local fast-path read, so construction is safely published and only one thread performs initialisation. Without volatile, the reference write can become visible before construction effects are visible.
ratings:
  small:
    score: 2
    notes: >-
      Usually avoid; static initialisers or simple synchronisation are clearer and fast enough.
  medium:
    score: 3
    notes: >-
      Situational for hot lazy values when language memory semantics are well understood; prefer built-in lazy primitives.
  large:
    score: 2
    notes: >-
      Risky as a catalogue-wide habit; large systems should prefer dependency injection, explicit lifecycle, or proven Lazy abstractions.
references:
  - title: The Double-Checked Locking is Broken Declaration
    year: 2004
    url: https://www.cs.umd.edu/~pugh/java/memoryModel/DoubleCheckedLocking.html
