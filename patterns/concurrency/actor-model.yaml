id: actor-model
title: Actor Model
aka:
  - Actors
  - Share-nothing message passing
scale: concurrency
category: concurrency
altitude: medium
maturity: time-tested
short_description: >-
  Encapsulate mutable state inside independently scheduled actors that communicate only by asynchronous messages.
description: >-
  The Actor Model represents concurrent components as actors with private state, a mailbox, and behaviour for handling one message at a time. An actor may update its own state, send messages to other actors, create new actors, or change its behaviour for the next message, but it never exposes its state for direct shared-memory access. This turns many locking problems into message-routing, supervision, and protocol-design problems. It is especially strong where workloads are naturally partitioned by entity, session, device, room, or aggregate.
problem: >-
  Shared mutable state protected by ad-hoc locks becomes fragile as the number of concurrent operations grows, producing races, deadlocks, and unclear ownership.
context: >-
  Use when state can be partitioned into independent owners that process commands/events sequentially, and when asynchronous messaging is acceptable for coordination.
consequences:
  - Eliminates data races inside each actor because only that actor mutates its private state.
  - Aligns well with supervision, location transparency, and failure isolation in Erlang/Elixir/Akka-style systems.
  - Requires explicit message protocols, mailbox sizing, and monitoring for stuck or overloaded actors.
  - Cross-actor invariants are harder than in shared-memory transactions; they need sagas, choreography, or careful orchestration.
synergies:
  - pattern: communicating-sequential-processes
    reason: Both use message passing; actors emphasise identity and mailboxes, while CSP emphasises channel topology and rendezvous.
  - pattern: message-channel
    reason: Actor mailboxes are specialised message channels with ownership, ordering, and delivery semantics that must be designed deliberately.
  - pattern: saga
    reason: Long-running workflows across actors often need sagas to coordinate state changes without shared transactions.
  - pattern: bulkhead
    reason: Actor systems can isolate risky tenants or subsystems behind separate dispatchers, supervisors, or mailbox limits.
alternatives:
  - communicating-sequential-processes
  - monitor-object
  - active-object
