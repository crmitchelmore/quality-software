id: "fuzzing"
title: "Fuzzing"
aka:
  - "Fuzz Testing"
  - "Coverage-Guided Fuzzing"
  - "API Fuzzing"
scale: "integration"
category: "testing"
altitude: "medium"
maturity: "established"
short_description: "Generate random, malformed, or coverage-guided inputs to find crashes, panics, memory errors, and unhandled exceptions."
description: "Fuzzing bombards a component, parser, protocol handler, or API with generated inputs. Classic fuzzing seeks crashes and undefined behaviour; coverage-guided fuzzers use instrumentation to explore new paths. It complements property-based testing: a property test asserts invariants, while a fuzzer often starts with the simpler oracle that invalid input must not crash the system."
problem: "Hand-written examples miss adversarial boundary cases that can crash parsers, APIs, or security-sensitive components."
context: "Use for parsers, codecs, validators, file formats, protocol handlers, public APIs, and unsafe or memory-sensitive code."
consequences:
  - "Finds edge cases humans did not think to write down."
  - "Coverage-guided tools can explore deep parser and protocol paths."
  - "Failures must record seeds or corpus entries so they are reproducible and become regression tests."
synergies:
  - pattern: "property-based-testing"
    reason: "Both generate inputs; properties add stronger semantic oracles to fuzz-discovered cases."
  - pattern: "parameterised-test"
    reason: "Interesting fuzz discoveries should be promoted into explicit regression rows."
  - pattern: "mutation-testing"
    reason: "Mutation score and fuzz findings both reveal gaps in fault detection."
conflicts_with:
  - "golden-master"
alternatives:
  - "property-based-testing"
  - "mutation-testing"
  - "parameterised-test"
languages:
  - "language-agnostic"
  - "go"
  - "rust"
  - "cpp"
  - "c"
  - "python"
  - "java"
frameworks:
  - "none"
  - "fastapi"
  - "nodejs"
  - "actix"
  - "tokio"
  - "spring-boot"
project_types:
  - "library"
  - "web-api"
  - "backend-service"
  - "embedded"
  - "safety-critical"
  - "distributed-system"
tags:
  - "random-inputs"
  - "security"
  - "crash-testing"
  - "coverage-guided"
examples:
  - language: "go"
    title: "Parser must not panic"
    negative: |-
      func TestParseDate(t *testing.T) {
        _, err := ParseDate("not-a-date")
        assert.Error(t, err)
      }
    positive: |-
      func FuzzParseDate(f *testing.F) {
        f.Add("2024-01-01")
        f.Fuzz(func(t *testing.T, s string) {
          _, _ = ParseDate(s) // errors are fine; panics are not
        })
      }
    explanation: "The fuzzer explores many malformed inputs beyond the examples the test author remembered."
ratings:
  small:
    score: 3
    notes: "Valuable for parsers and public inputs, less useful for ordinary CRUD."
  medium:
    score: 4
    notes: "Strong fit for APIs, codecs, validators, and security-sensitive components."
  large:
    score: 5
    notes: "High leverage when continuously run with corpus management and crash triage."
