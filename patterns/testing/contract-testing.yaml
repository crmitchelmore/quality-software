id: contract-testing
title: Consumer-Driven Contract Testing
aka:
  - CDC testing
  - Pact testing
scale: integration
category: testing
altitude: medium
maturity: established
short_description: >-
  Let API consumers define executable expectations that providers verify, catching integration breakage before services are deployed together.
description: >-
  Consumer-Driven Contract Testing records the requests a consumer relies on and the responses it can handle, then has the provider verify those contracts in its own build. It is narrower than full end-to-end testing: contracts cover message shape, status codes, required fields, and compatibility rules rather than entire journeys. It works best with clear ownership, versioned publication of contracts, and provider states that make verification deterministic.
problem: >-
  Independent services break each other when provider changes look safe locally but violate assumptions held by real consumers.
context: >-
  Use for microservices, SDKs, and externally consumed APIs where teams deploy independently and end-to-end environments are slow or unreliable.
consequences:
  - >-
    Finds incompatible API changes before deployment.
  - >-
    Documents real consumer expectations instead of hypothetical schemas only.
  - >-
    Requires disciplined contract ownership and should not replace provider behaviour tests or broader integration checks.
synergies:
  - pattern: contract-first-api
    reason: >-
      OpenAPI gives the broad provider contract; consumer contracts prove the parts real clients depend on.
  - pattern: microservices
    reason: >-
      Independent service deployment needs executable compatibility checks between teams.
  - pattern: test-double
    reason: >-
      Consumer tests often use provider doubles generated from contracts.
alternatives:
  - golden-master
  - given-when-then
languages:
  - language-agnostic
  - javascript
  - typescript
  - python
  - java
  - go
frameworks:
  - nodejs
  - spring-boot
  - fastapi
  - grpc
  - graphql
project_types:
  - microservices
  - web-api
  - backend-service
  - sdk
  - distributed-system
tags:
  - api-compatibility
  - microservices
  - integration-testing
examples:
  - language: javascript
    title: Consumer expectation for account API
    negative: |-
      test("loads account", async () => {
        const response = await fetch("https://accounts.dev/users/u1");
        expect((await response.json()).displayName).toBe("Ada");
      });
    positive: |-
      pact
        .given("user u1 exists")
        .uponReceiving("a request for a user profile")
        .withRequest({ method: "GET", path: "/users/u1" })
        .willRespondWith({
          status: 200,
          headers: { "content-type": "application/json" },
          body: { id: "u1", displayName: like("Ada") }
        });
      
      test("loads account", async () => {
        const client = new AccountsClient(pact.mockService.baseUrl);
        await expect(client.user("u1")).resolves.toMatchObject({ displayName: "Ada" });
      });
    explanation: >-
      The positive test records the consumer contract against a mock provider. The accounts provider must later verify the same interaction, catching incompatible response changes before release.
ratings:
  small:
    score: 2
    notes: >-
      Usually too much process for a single small app or library.
  medium:
    score: 4
    notes: >-
      Strong fit once APIs have multiple consumers or independent deployments.
  large:
    score: 5
    notes: >-
      Excellent for large microservice estates where full end-to-end coverage is slow and incomplete.
