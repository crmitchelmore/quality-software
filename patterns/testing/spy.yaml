id: "spy"
title: "Spy"
aka:
  - "Test Spy"
  - "Recording Stub"
scale: "implementation"
category: "testing"
altitude: "low"
maturity: "time-tested"
short_description: "Use a test double that records calls and arguments so the test can verify meaningful interactions after exercising the subject."
description: "A Spy is a test double that usually supplies simple stub behaviour while recording how it was used. The test performs normal Arrange-Act-Assert flow, then inspects recorded calls, arguments, or counts. It is lighter than a strict mock because expectations are not pre-programmed before the action, but it still risks coupling tests to implementation if used for incidental collaborator calls."
problem: "A behaviour is observable only through a command sent to a collaborator, but strict mock expectations would make the test brittle."
context: "Use for command-style collaborators such as notifications, audit publishers, or gateways where the call itself is part of the contract."
consequences:
  - "Makes interaction evidence explicit without pre-programming every expectation."
  - "Works well for hand-written doubles when a mocking framework would obscure intent."
  - "Can over-specify implementation details if used for query collaborators or incidental calls."
synergies:
  - pattern: "test-double"
    reason: "Spy is one member of the Meszaros/Fowler test double taxonomy."
  - pattern: "mock-object"
    reason: "Both verify interactions; spies inspect recorded calls after the act while mocks set expectations before it."
  - pattern: "arrange-act-assert"
    reason: "Recorded calls keep verification in the Assert phase rather than mixing expectations into setup."
conflicts_with:
  - "stub"
alternatives:
  - "mock-object"
  - "stub"
  - "fake-object"
languages:
  - "language-agnostic"
  - "javascript"
  - "typescript"
  - "python"
  - "java"
frameworks:
  - "none"
  - "nodejs"
  - "spring-boot"
  - "django"
  - "fastapi"
project_types:
  - "library"
  - "web-api"
  - "backend-service"
  - "microservices"
  - "modular-monolith"
tags:
  - "test-double"
  - "interaction-testing"
  - "recording-calls"
examples:
  - language: "python"
    title: "Recording sent email"
    negative: |-
      mailer = Mock()
      mailer.expect_send("ada@example.com", "Welcome")
      service = RegisterUser(mailer)
      service.register("ada@example.com")
      mailer.verify()
    positive: |-
      mailer = SpyMailer()
      service = RegisterUser(mailer)
      
      service.register("ada@example.com")
      
      assert mailer.sent == [("ada@example.com", "Welcome")]
    explanation: "The spy records the meaningful command and keeps the assertion after the act, avoiding a strict expectation script for the whole collaboration."
ratings:
  small:
    score: 3
    notes: "Useful for a few outbound command checks without introducing a mocking framework."
  medium:
    score: 4
    notes: "Good fit when teams need readable interaction tests but want to avoid brittle mock scripts."
  large:
    score: 3
    notes: "Still valuable, but needs conventions so spies do not become broad implementation probes."
