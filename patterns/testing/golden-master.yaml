id: golden-master
title: Golden Master (Approval)
aka:
  - Approval testing
  - Snapshot testing
scale: implementation
category: testing
maturity: established
short_description: >-
  Capture the current output of complex behaviour as an approved reference, then fail future tests when output changes unexpectedly.
description: >-
  Golden Master testing records representative outputs from a system and compares later runs to those approved artefacts. It is valuable for legacy refactoring, rendering, report generation, compilers, and transformations where specifying every assertion by hand is expensive. The pattern must be used deliberately: approvals should be reviewed like code, inputs should be stable and meaningful, and volatile fields must be normalised to avoid noisy failures.
problem: >-
  Complex existing behaviour needs regression protection before it can be safely refactored, but precise assertions are too costly or incomplete.
context: >-
  Use for deterministic output-heavy code such as generated documents, serialisation, render trees, search rankings, or legacy calculations.
consequences:
  - >-
    Provides broad regression coverage quickly for legacy or complex outputs.
  - >-
    Makes intentional output changes explicit through approval review.
  - >-
    Can bless bugs and create noisy diffs if inputs are poor or volatile data is not normalised.
synergies:
  - pattern: object-mother
    reason: >-
      Stable named fixtures make approved outputs reproducible and meaningful.
  - pattern: test-data-builder
    reason: >-
      Builders generate focused input variations for approval cases.
  - pattern: pure-function
    reason: >-
      Pure deterministic functions are ideal targets because identical inputs produce identical approvals.
alternatives:
  - property-based-testing
  - arrange-act-assert
languages:
  - language-agnostic
  - javascript
  - typescript
  - python
  - java
frameworks:
  - none
  - nodejs
  - spring-boot
  - django
  - fastapi
project_types:
  - library
  - web-api
  - backend-service
  - data-pipeline
  - cli-tool
tags:
  - approval-testing
  - legacy-code
  - snapshots
examples:
  - language: javascript
    title: Invoice approval
    negative: |-
      test("renders invoice", () => {
        const html = renderInvoice(invoice);
        expect(html).toContain("Total: £42.00");
        expect(html).toContain("Ada Lovelace");
        // dozens of layout and tax details are unprotected
      });
    positive: |-
      test("renders invoice", () => {
        const invoice = anInvoice().withVatRate(0.2).build();
        const html = normaliseDynamicIds(renderInvoice(invoice));
      
        expect(html).toMatchApprovedSnapshot("invoice-with-vat.html");
      });
    explanation: >-
      The positive approval protects the whole rendered artefact, while normalisation removes volatile values. Reviewers can inspect the output diff when rendering changes intentionally.
ratings:
  small:
    score: 3
    notes: >-
      Situational: excellent for output-heavy code, unnecessary for straightforward functions.
  medium:
    score: 4
    notes: >-
      Strong for legacy refactors and generated artefacts if approvals are reviewed carefully.
  large:
    score: 4
    notes: >-
      Very useful for large legacy systems, but needs governance to avoid mass-approving meaningless snapshots.
