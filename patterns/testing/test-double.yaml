id: test-double
title: Test Double
aka:
  - Dummy
  - Spy
  - Mock
  - Stub
  - Fake
scale: implementation
category: testing
maturity: time-tested
short_description: >-
  Replace a real collaborator in a test with a controlled substitute so behaviour can be exercised without slow, unavailable, or nondeterministic dependencies.
description: >-
  A test double is the umbrella pattern for controlled stand-ins used during tests: dummies satisfy signatures, stubs return canned values, spies record calls, mocks verify expected interactions, and fakes provide lightweight working implementations. The important design choice is the seam: tests should replace external or unstable collaborators, not mask the behaviour being tested. Good doubles make tests faster and more deterministic while preserving the contract the real collaborator must honour.
problem: >-
  Tests coupled to real databases, networks, clocks, queues, or payment systems are slow, flaky, and hard to run locally.
context: >-
  Use at hard boundaries or when isolating a unit/component gives faster feedback than exercising the full stack.
consequences:
  - >-
    Improves speed and determinism by removing external variability.
  - >-
    Creates explicit seams that often improve production design.
  - >-
    Can over-isolate code and miss contract drift unless complemented by integration or contract tests.
synergies:
  - pattern: mock-object
    reason: >-
      Mock Object is the interaction-verifying specialised form of a test double.
  - pattern: stub
    reason: >-
      Stub is the simplest double for deterministic query responses.
  - pattern: fake-object
    reason: >-
      Fake Object preserves more behaviour when pure canned responses are too weak.
  - pattern: contract-testing
    reason: >-
      Contract tests keep doubles honest when they stand in for remote services.
alternatives:
  - contract-testing
languages:
  - language-agnostic
  - javascript
  - typescript
  - python
  - java
frameworks:
  - none
  - nodejs
  - spring-boot
  - django
  - fastapi
project_types:
  - library
  - web-api
  - backend-service
  - microservices
  - modular-monolith
tags:
  - testability
  - isolation
  - determinism
examples:
  - language: python
    title: Pytest mail boundary
    negative: |-
      def test_signup_sends_email():
          user_id = signup("a@example.com", smtp=RealSmtp("smtp.example.com"))
          assert database.user(user_id).status == "pending"
    positive: |-
      class RecordingMailer:
          def __init__(self):
              self.sent = []
          def send_welcome(self, email):
              self.sent.append(email)
      
      def test_signup_sends_email():
          mailer = RecordingMailer()
          user_id = signup("a@example.com", mailer=mailer)
      
          assert database.user(user_id).status == "pending"
          assert mailer.sent == ["a@example.com"]
    explanation: >-
      The positive test replaces SMTP with a recording double, making the test local and deterministic while still checking the externally relevant effect: a welcome message was requested.
ratings:
  small:
    score: 4
    notes: >-
      Useful whenever a small project touches I/O; avoid doubling pure in-process code unnecessarily.
  medium:
    score: 5
    notes: >-
      Excellent fit for keeping service tests fast while integration tests cover real adapters.
  large:
    score: 4
    notes: >-
      Necessary but risky if overused; pair with contract and end-to-end coverage to detect drift.
