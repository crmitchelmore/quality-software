id: metadata-mapping
title: Metadata Mapping
scale: data
category: enterprise-application
maturity: time-tested
short_description: >-
  Describe object-relational mapping rules as metadata so generic mapper code can read columns, associations, inheritance, and conversions consistently.
description: >-
  Metadata Mapping moves mapping knowledge out of hand-coded SQL fragments and into declarative metadata: annotations, XML, YAML, fluent configuration, or schema descriptors. Runtime or generated mapper code uses that metadata to load, save, validate, and construct objects. It is the foundation of many ORMs and persistence frameworks, but it should remain explicit enough that developers understand the SQL and lifecycle implications.
problem: >-
  Hand-written mappers duplicate column names, joins, conversions, and discriminator rules, leading to inconsistent persistence behaviour and costly schema changes.
context: >-
  Use when many domain types share persistence conventions or when mapping definitions need to be inspected, generated, or changed centrally. Avoid hiding complex queries behind opaque metadata.
consequences:
  - Centralises table, column, association, and inheritance mapping definitions.
  - Enables generic tooling for migrations, validation, schema generation, and mapper construction.
  - Can make performance and query behaviour opaque if metadata is too magical.
  - Metadata drift can break runtime behaviour unless mappings are validated by tests and tooling.
synergies:
  - pattern: data-mapper
    reason: Data Mapper often uses metadata to avoid bespoke load/save code for every entity.
  - pattern: single-table-inheritance
    reason: Discriminators and subtype columns can be declared as metadata rather than repeated in query code.
  - pattern: class-table-inheritance
    reason: Metadata can describe superclass/subclass joins and shared primary keys.
  - pattern: registry
    reason: A mapping registry can load and expose metadata descriptors at application startup.
alternatives:
  - active-record
  - table-data-gateway
  - row-data-gateway
conflicts_with:
  - active-record
languages:
  - language-agnostic
  - java
  - csharp
  - python
  - typescript
frameworks:
  - hibernate
  - entity-framework
  - sqlalchemy
  - typeorm
  - django
project_types:
  - backend-service
  - web-api
  - modular-monolith
  - monolith
tags:
  - orm
  - mapping
  - metadata
examples:
  - language: java
    title: Declarative entity mapping
    negative: |
      final class CustomerMapper {
          Customer load(ResultSet rs) throws SQLException {
              return new Customer(
                  new CustomerId(rs.getLong("customer_id")),
                  new Email(rs.getString("email_address")),
                  rs.getLong("version_no"));
          }

          String updateSql() {
              return "UPDATE customers SET email_address=?, version_no=version_no+1 WHERE customer_id=?";
          }
      }
    positive: |
      @Table(name = "customers")
      final class Customer {
          @Id(name = "customer_id") CustomerId id;
          @Column(name = "email_address") Email email;
          @Version(name = "version_no") long version;
      }

      final class MetadataMapper {
          Customer load(Class<Customer> type, ResultSet row) {
              Mapping metadata = mappings.forType(type);
              return metadata.constructFrom(row);
          }
      }
    explanation: >-
      The positive version records mapping facts once and lets generic mapper infrastructure apply them consistently across loads, saves, and version checks.
ratings:
  small:
    score: 2
    notes: Usually unnecessary unless a framework already provides it cheaply.
  medium:
    score: 4
    notes: Valuable when many entities share conventions and schema changes are frequent.
  large:
    score: 5
    notes: Essential for large ORM-backed systems, provided metadata is validated and performance remains observable.
references:
  - title: Patterns of Enterprise Application Architecture
    author: Martin Fowler
    year: 2002
