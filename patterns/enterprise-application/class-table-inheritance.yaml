id: class-table-inheritance
title: Class Table Inheritance
scale: data
category: enterprise-application
maturity: time-tested
short_description: >-
  Store each class in an inheritance hierarchy in its own table, joining subclass rows to superclass rows by the same primary key.
description: >-
  Class Table Inheritance maps common superclass data to a base table and subtype-specific fields to subtype tables. It preserves relational structure and subtype constraints better than a single sparse table, but polymorphic reads require joins or unions. It fits hierarchies with meaningful subtype data, strong database constraints, and less frequent cross-hierarchy listing.
problem: >-
  A single inheritance table becomes sparse and weakly constrained when subtypes have many distinct fields, yet the object model still needs shared superclass identity and behaviour.
context: >-
  Use when subtype data is substantial and relational integrity matters. Avoid for hot polymorphic reads where join cost and query complexity dominate.
consequences:
  - Keeps subtype columns non-null and constrained in subtype-specific tables.
  - Reflects the object hierarchy clearly in the database schema.
  - Polymorphic loads require joins or multiple queries, increasing latency and mapper complexity.
  - Refactoring the hierarchy can be expensive because it touches several tables and migrations.
synergies:
  - pattern: data-mapper
    reason: Data Mapper coordinates the multi-table load and assembles the right domain subtype.
  - pattern: unit-of-work
    reason: Unit of Work can write superclass and subclass rows atomically.
  - pattern: metadata-mapping
    reason: Metadata centralises table joins, primary-key sharing, and subtype mappings.
  - pattern: identity-map
    reason: Identity Map prevents duplicate objects when superclass and subclass rows are loaded through different paths.
alternatives:
  - single-table-inheritance
  - active-record
conflicts_with:
  - single-table-inheritance
languages:
  - language-agnostic
  - java
  - csharp
  - sql
frameworks:
  - hibernate
  - entity-framework
  - sqlalchemy
  - django
project_types:
  - backend-service
  - web-api
  - monolith
  - modular-monolith
tags:
  - inheritance-mapping
  - relational-integrity
  - persistence
examples:
  - language: sql
    title: Insurance policy hierarchy
    negative: |
      CREATE TABLE policies (
        id BIGINT PRIMARY KEY,
        kind VARCHAR(20) NOT NULL,
        premium_cents INTEGER NOT NULL,
        vehicle_vin VARCHAR(17),
        property_address TEXT,
        flood_zone VARCHAR(10),
        driver_count INTEGER
      );
      -- Many columns are meaningless for each policy kind and hard to constrain.
    positive: |
      CREATE TABLE policies (
        id BIGINT PRIMARY KEY,
        kind VARCHAR(20) NOT NULL,
        premium_cents INTEGER NOT NULL
      );

      CREATE TABLE vehicle_policies (
        id BIGINT PRIMARY KEY REFERENCES policies(id),
        vehicle_vin VARCHAR(17) NOT NULL,
        driver_count INTEGER NOT NULL
      );

      CREATE TABLE property_policies (
        id BIGINT PRIMARY KEY REFERENCES policies(id),
        property_address TEXT NOT NULL,
        flood_zone VARCHAR(10) NOT NULL
      );
    explanation: >-
      The positive version keeps subtype fields in constrained tables, trading simpler integrity for join-heavy polymorphic reads.
ratings:
  small:
    score: 2
    notes: Usually too much schema and mapper complexity for small systems.
  medium:
    score: 3
    notes: Situational when subtype constraints matter more than read simplicity.
  large:
    score: 4
    notes: Strong for stable, regulated data models with rich subtype-specific fields and integrity requirements.
references:
  - title: Patterns of Enterprise Application Architecture
    author: Martin Fowler
    year: 2002
