id: domain-model
title: Domain Model
scale: design
category: enterprise-application
altitude: medium
maturity: time-tested
aka:
  - Rich domain model
  - Object model
short_description: >-
  Represent business concepts as objects with behaviour, invariants, and relationships rather than as passive records.
description: >-
  Domain Model organises application behaviour around domain objects that encode rules and meaningful operations. Entities, value objects, aggregates, and domain services collaborate so business policy lives in the model rather than in procedural scripts or controllers. It is most valuable when the domain has non-trivial rules, vocabulary, and lifecycle transitions.
problem: >-
  When business rules are spread across controllers, SQL, and services, the same invariant is implemented inconsistently and changes require hunting through procedural code. Passive data structures make invalid states easy to construct.
context: >-
  Use when business complexity is high enough to justify modelling language, invariants, and object collaboration explicitly. Pair it with persistence ignorance and application services rather than letting UI or database concerns dominate the model.
consequences:
  - >-
    Concentrates business rules in intention-revealing objects that can be tested without infrastructure.
  - >-
    Makes complex invariants and lifecycle transitions explicit through methods and types.
  - >-
    Requires more design effort than Transaction Script and can be overbuilt for simple CRUD.
  - >-
    Needs supporting persistence patterns such as Data Mapper or Repository to avoid database coupling.
synergies:
  - pattern: data-mapper
    reason: >-
      Data Mapper preserves persistence ignorance so domain objects do not grow save/find methods.
  - pattern: repository
    reason: >-
      Repositories provide aggregate-oriented access without leaking SQL or ORM queries into the model.
  - pattern: service-layer
    reason: >-
      Service Layer coordinates use cases and transactions while delegating business decisions to the Domain Model.
  - pattern: value-object
    reason: >-
      Value Objects make invalid primitive states harder to represent inside the model.
  - pattern: aggregate
    reason: >-
      Aggregates define consistency boundaries for related domain objects.
alternatives:
  - transaction-script
  - table-module
  - active-record
conflicts_with:
  - transaction-script
  - active-record
languages:
  - language-agnostic
  - java
  - csharp
  - typescript
  - python
  - ruby
frameworks:
  - none
  - spring-boot
  - dotnet
  - hibernate
  - entity-framework
  - rails
project_types:
  - backend-service
  - modular-monolith
  - monolith
  - web-api
  - microservices
tags:
  - business-rules
  - ddd
  - invariants
  - persistence-ignorance
examples:
  - language: csharp
    title: Capturing order invariants
    negative: |
      public void ApplyDiscount(OrderDto order, decimal percent) {
          if (percent > 50 && !order.CustomerIsVip) throw new Exception("too much");
          order.DiscountPercent = percent;
          order.Total = order.Lines.Sum(l => l.Price) * (1 - percent / 100);
      }
    positive: |
      public sealed class Order {
          private readonly List<OrderLine> lines = new();
          public Money Total { get; private set; }
      
          public void ApplyDiscount(Discount discount, Customer customer) {
              if (discount.Percent > 50 && !customer.IsVip)
                  throw new DiscountNotAllowed();
      
              Total = Money.Sum(lines.Select(l => l.Price)).Apply(discount);
          }
      }
    explanation: >-
      The positive version names the domain concepts and keeps the discount invariant with the Order behaviour. Callers cannot update totals independently of the rule.
ratings:
  small:
    score: 2
    notes: >-
      Usually unnecessary for simple CRUD; start with transaction scripts until rules justify a model.
  medium:
    score: 4
    notes: >-
      Good fit once business rules and lifecycle transitions appear across several use cases.
  large:
    score: 5
    notes: >-
      Excellent for large enterprise systems where consistent policy, testing, and ubiquitous language matter more than initial ceremony.
references:
  - title: Patterns of Enterprise Application Architecture
    author: Martin Fowler
    year: 2002
