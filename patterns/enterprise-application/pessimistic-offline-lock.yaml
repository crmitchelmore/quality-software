id: pessimistic-offline-lock
title: Pessimistic Offline Lock
scale: data
category: enterprise-application
maturity: time-tested
short_description: >-
  Prevent conflicting business transactions by acquiring an application-level lock before a user starts a long-running edit.
description: >-
  Pessimistic Offline Lock reserves a business object or resource for a user, session, or process before work begins, preventing others from making conflicting changes until the lock is released or expires. Unlike database row locks, these locks survive across requests and user think time, so they need ownership, expiry, recovery, and administrative override. The pattern is justified when conflicts are common or the cost of resolving them after the fact is unacceptable.
problem: >-
  Some business edits cannot be safely merged or retried. If two users concurrently modify the same scarce resource, one must be stopped before investing time in work that cannot commit.
context: >-
  Use for high-conflict workflows, scarce resources, regulated approvals, or edits where conflict resolution is expensive. Avoid it for ordinary CRUD where lock management is more costly than occasional optimistic retries.
consequences:
  - Prevents lost work and unmergeable conflicts by blocking conflicting edits early.
  - Makes ownership and queueing visible to users before they start a task.
  - Introduces stale locks, expiry races, abandoned sessions, and operational support needs.
  - Reduces concurrency and can frustrate users if locks are coarse or long-lived.
synergies:
  - pattern: registry
    reason: A lock manager is often registered as an application service shared by controllers and jobs.
  - pattern: service-layer
    reason: Service Layer operations can acquire and release locks around business transactions consistently.
  - pattern: unit-of-work
    reason: Unit of Work can verify the lock owner during commit and release locks after success or rollback.
  - pattern: timeout
    reason: Lock acquisition and renewal need timeouts so abandoned sessions do not block work forever.
alternatives:
  - optimistic-offline-lock
  - optimistic-concurrency-control
conflicts_with:
  - optimistic-offline-lock
languages:
  - language-agnostic
  - java
  - csharp
  - typescript
  - sql
frameworks:
  - spring-boot
  - dotnet
  - redis
  - hibernate
project_types:
  - backend-service
  - web-api
  - modular-monolith
  - distributed-system
tags:
  - concurrency
  - locking
  - workflow
examples:
  - language: typescript
    title: Application-level edit lock
    negative: |
      async function openClaimForEdit(user: User, claimId: string) {
        return claims.load(claimId); // both Alice and Bob can edit for an hour
      }

      async function saveClaim(user: User, claim: Claim) {
        await claims.save(claim); // one user's work may be rejected or overwritten late
      }
    positive: |
      async function openClaimForEdit(user: User, claimId: string) {
        const acquired = await lockStore.acquire({
          resource: 'claim:' + claimId,
          owner: user.id,
          expiresInMinutes: 30
        });
        if (!acquired) throw new ClaimAlreadyBeingEdited(claimId);
        return claims.load(claimId);
      }

      async function saveClaim(user: User, claim: Claim) {
        await lockStore.assertOwner('claim:' + claim.id, user.id);
        await claims.save(claim);
        await lockStore.release('claim:' + claim.id, user.id);
      }
    explanation: >-
      The positive version prevents conflicting edits before users invest effort and verifies lock ownership again at save time.
ratings:
  small:
    score: 2
    notes: Rarely worth the operational complexity unless the domain has scarce resources.
  medium:
    score: 3
    notes: Situational for high-conflict workflows; expiry and recovery must be designed.
  large:
    score: 4
    notes: Strong for regulated or high-value edits, but can reduce throughput and needs operational tooling.
references:
  - title: Patterns of Enterprise Application Architecture
    author: Martin Fowler
    year: 2002
