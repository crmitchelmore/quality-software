id: lazy-load
title: Lazy Load
scale: data
category: enterprise-application
altitude: low
maturity: time-tested
aka:
  - Lazy loading
  - Virtual proxy
  - Ghost object
short_description: >-
  Defer loading related data until a caller actually needs it, while preserving the object interface.
description: >-
  Lazy Load replaces immediate graph hydration with a placeholder, proxy, or deferred collection that knows how to fetch its data on first use. It can make common paths cheaper and keep aggregate loading focused, but it moves database access into object navigation and must therefore be bounded, observable, and understood by callers.
problem: >-
  Loading every relationship eagerly wastes memory and database time for use cases that need only part of the graph. Loading nothing up front can push callers into ad hoc query code or repeated manual fetches.
context: >-
  Use when object graphs have optional or expensive relationships, read paths vary substantially, and the persistence layer can prevent accidental N+1 queries through fetch plans, batching, or explicit repository methods.
consequences:
  - >-
    Improves performance for paths that rarely touch expensive relationships.
  - >-
    Keeps object APIs convenient by hiding deferred retrieval behind fields or collections.
  - >-
    Can create N+1 queries and surprising database access during rendering or serialisation.
  - >-
    Requires a live session or explicit loader; detached objects with lazy fields often fail at awkward boundaries.
synergies:
  - pattern: identity-map
    reason: >-
      Lazy loaders should resolve through Identity Map so the same related row is not materialised twice.
  - pattern: data-mapper
    reason: >-
      Data Mapper can install proxies or loaders while keeping domain classes free of SQL.
  - pattern: query-object
    reason: >-
      Query Objects or fetch specifications make eager-versus-lazy choices explicit for read-heavy use cases.
  - pattern: repository
    reason: >-
      Repositories can expose intention-revealing methods that pre-load relationships when the use case really needs them.
alternatives:
  - query-object
  - data-transfer-object
  - materialized-view
conflicts_with:
  - transaction-script
languages:
  - language-agnostic
  - java
  - csharp
  - typescript
  - python
  - ruby
frameworks:
  - hibernate
  - entity-framework
  - typeorm
  - sqlalchemy
  - rails
project_types:
  - backend-service
  - web-api
  - modular-monolith
  - monolith
  - web-frontend
tags:
  - deferred-loading
  - orm
  - performance
  - n-plus-one
examples:
  - language: typescript
    title: Deferred order lines with an explicit loader
    negative: |
      async function showOrderSummary(id: string) {
        const order = await db.order.findUnique({
          where: { id },
          include: { lines: true, payments: true, shipments: true }
        });
        return `${order!.number}: ${order!.lines.length} lines`;
      }
    positive: |
      class Order {
        constructor(
          readonly id: string,
          readonly number: string,
          private readonly loadLines: () => Promise<OrderLine[]>
        ) {}
      
        private linesCache?: Promise<OrderLine[]>;
        lines(): Promise<OrderLine[]> {
          return this.linesCache ??= this.loadLines();
        }
      }
      
      async function showOrderSummary(id: string) {
        const order = await orders.get(id);
        return `${order.number}: ${(await order.lines()).length} lines`;
      }
    explanation: >-
      The positive version loads the common order fields first and fetches lines only when needed. The loader is explicit and cache-backed, so repeated access in the same object does not repeatedly hit the database.
ratings:
  small:
    score: 2
    notes: >-
      Often more complexity than value; explicit queries are easier to reason about.
  medium:
    score: 3
    notes: >-
      Situational: useful with mature ORM support, but needs N+1 tests and query logging.
  large:
    score: 3
    notes: >-
      Still useful, but large systems often prefer explicit fetch plans, read models, and DTO projections to avoid surprise database access.
references:
  - title: Patterns of Enterprise Application Architecture
    author: Martin Fowler
    year: 2002
