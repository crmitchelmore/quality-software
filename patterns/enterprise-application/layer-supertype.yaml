id: layer-supertype
title: Layer Supertype
scale: design
category: enterprise-application
maturity: time-tested
short_description: >-
  Provide a common superclass or base abstraction for all objects in a layer so shared layer responsibilities have one consistent home.
description: >-
  Layer Supertype collects behaviour that is genuinely common to every object in a layer: identity semantics for domain entities, audit metadata for persistence records, validation hooks for view models, or domain event recording for aggregate roots. It is a narrow layer-specific contract, not a dumping ground for utilities. The value comes from expressing a layer invariant once and preventing each object from re-implementing it slightly differently.
problem: >-
  Objects in the same layer often repeat small but important mechanisms such as version fields, audit timestamps, equality, validation, or event queues. Copy-paste makes those mechanisms inconsistent and hard to evolve.
context: >-
  Use when a layer has a stable, universal responsibility that applies to nearly every type in that layer. Prefer interfaces or composition when only some objects need the behaviour.
consequences:
  - Centralises layer-wide invariants and makes them discoverable.
  - Reduces duplicated boilerplate in domain, persistence, DTO, or presentation model classes.
  - Can create brittle inheritance hierarchies if used for optional behaviour.
  - Framework base classes may leak infrastructure concepts into the domain model.
synergies:
  - pattern: domain-model
    reason: Domain entities can share identity and domain-event support without every entity reimplementing it.
  - pattern: optimistic-offline-lock
    reason: A persistent layer supertype can expose a version field consistently across mapped records.
  - pattern: metadata-mapping
    reason: Mapping metadata can recognise common base fields such as id, version, createdAt, and updatedAt.
  - pattern: template-method
    reason: Shared algorithms in the supertype can call layer-specific hooks without duplicating orchestration.
alternatives:
  - composition-over-inheritance
  - separated-interface
conflicts_with:
  - composition-over-inheritance
languages:
  - language-agnostic
  - java
  - csharp
  - typescript
frameworks:
  - spring-boot
  - dotnet
  - hibernate
  - entity-framework
project_types:
  - backend-service
  - modular-monolith
  - monolith
tags:
  - inheritance
  - layer-invariant
  - boilerplate
examples:
  - language: java
    title: Domain entity identity
    negative: |
      final class Customer {
          private UUID id;
          private long version;
          public boolean sameIdentityAs(Customer other) {
              return other != null && id.equals(other.id);
          }
      }

      final class Invoice {
          private UUID id;
          private long version;
          public boolean sameAs(Invoice other) {
              return other != null && id.equals(other.id);
          }
      }
    positive: |
      abstract class DomainEntity {
          private UUID id;
          private long version;

          protected DomainEntity(UUID id, long version) {
              this.id = Objects.requireNonNull(id);
              this.version = version;
          }

          public UUID id() { return id; }
          public long version() { return version; }

          public final boolean sameIdentityAs(DomainEntity other) {
              return other != null && getClass().equals(other.getClass()) && id.equals(other.id);
          }
      }

      final class Customer extends DomainEntity {
          Customer(UUID id, long version) { super(id, version); }
      }
    explanation: >-
      The positive version puts identity and version semantics in one layer-specific abstraction, making entity equality and locking consistent across the domain layer.
ratings:
  small:
    score: 2
    notes: Often too much ceremony; duplication may be cheaper than inheritance for a handful of classes.
  medium:
    score: 3
    notes: Useful for stable common fields and methods, but keep the supertype narrow.
  large:
    score: 4
    notes: Strong fit when hundreds of layer objects must share audit, identity, version, or validation conventions.
references:
  - title: Patterns of Enterprise Application Architecture
    author: Martin Fowler
    year: 2002
