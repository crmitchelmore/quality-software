id: islands-architecture
title: Islands Architecture
aka:
  - Partial Hydration
  - Component Islands
scale: architectural
category: frontend
maturity: emerging
short_description: >-
  Serve mostly static or server-rendered HTML and hydrate only isolated interactive components, leaving the rest of the page inert.
description: >-
  Islands Architecture treats a page as a static or server-rendered document with discrete interactive islands embedded inside it. Each island owns its client JavaScript and hydration boundary, while the surrounding content remains plain HTML. The pattern improves load performance for content-heavy sites that need pockets of interactivity, but it requires careful contracts for data flow between server-rendered content and hydrated components.
problem: >-
  Full-page hydration ships and executes JavaScript for content that does not need client-side behaviour, slowing down pages and increasing failure modes.
context: >-
  Use for content sites, commerce landing pages, documentation, dashboards with isolated widgets, and applications where most of the screen is read-only but selected regions are interactive.
consequences:
  - Reduces JavaScript cost by hydrating only interactive regions.
  - Preserves SSR benefits for content, SEO and resilience.
  - Cross-island communication can become awkward without a deliberate event or state boundary.
  - Not ideal for highly interactive apps where most of the page shares live client state.
synergies:
  - pattern: server-side-rendering
    reason: Islands usually start from server-rendered HTML and selectively hydrate interactive components.
  - pattern: component-based-ui
    reason: Each island is a component boundary with its own client runtime contract.
  - pattern: lazy-load
    reason: Islands can defer loading JavaScript until visible, idle or interacted with.
  - pattern: observer
    reason: Islands that need coordination can observe browser events or shared stores without hydrating the whole page.
alternatives:
  - server-side-rendering
  - micro-frontends
  - client-server
languages:
  - typescript
  - javascript
frameworks:
  - react
  - vue
  - svelte
  - solidjs
  - nextjs
project_types:
  - web-frontend
  - web-api
  - serverless
tags:
  - partial-hydration
  - performance
  - progressive-enhancement
diagram: |-
  flowchart TB
    Request[HTTP Request]
    Server[Server Render]
    Html[HTML Document]
    subgraph Page[Page]
      Header[Static Header]
      Article[Static Content]
      Cart[Cart Island]
      Comments[Comments Island]
      Footer[Static Footer]
    end
    CartJs[Cart JS]
    CommentsJs[Comments JS]
    Request --> Server --> Html --> Page
    CartJs --> Cart
    CommentsJs --> Comments
examples:
  - language: typescript
    title: Hydrating only the interactive cart widget
    negative: |
      import { hydrateRoot } from "react-dom/client";
      import { Page } from "./Page";

      hydrateRoot(document, <Page />);
    positive: |
      import { hydrateRoot } from "react-dom/client";
      import { CartWidget } from "./CartWidget";

      const cart = document.querySelector("[data-island='cart']");
      if (cart) {
        hydrateRoot(cart, <CartWidget initialCount={Number(cart.getAttribute("data-count"))} />);
      }
    explanation: >-
      The positive version leaves server-rendered article, header and footer as plain HTML while shipping client JavaScript only for the cart island that needs interaction.
ratings:
  small:
    score: 3
    notes: >-
      Good for small content-heavy sites if the framework makes islands simple; otherwise static HTML plus small scripts may suffice.
  medium:
    score: 4
    notes: >-
      Strong fit for marketing, docs and commerce pages with isolated interactive widgets.
  large:
    score: 3
    notes: >-
      Useful for performance-sensitive surfaces, but less suitable for large app-like screens with dense shared client state.
references:
  - title: Islands Architecture
    author: Jason Miller
    year: 2020
    url: https://jasonformat.com/islands-architecture/
