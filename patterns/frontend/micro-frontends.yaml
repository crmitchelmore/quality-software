id: micro-frontends
title: Micro-Frontends
aka:
  - Frontend Microservices
scale: architectural
category: frontend
maturity: established
short_description: >-
  Split a frontend into independently owned, built and deployed slices that compose into one user experience at runtime or build time.
description: >-
  Micro-Frontends apply the microservice ownership model to the browser-facing application. Each slice owns a bounded product area, its UI code, tests and release cadence; a shell or composition layer integrates the slices through routing, module federation, server-side includes or web components. The pattern is justified by organisational scale and independent delivery needs, not by a desire to make frontend code smaller.
problem: >-
  A single frontend monolith can become a coordination bottleneck where unrelated teams queue behind one build, one deploy pipeline and one shared dependency graph.
context: >-
  Use when multiple autonomous teams own distinct journeys, need independent releases, and can invest in platform contracts for routing, design system, authentication, observability and shared runtime policy.
consequences:
  - Enables independent team delivery and incremental migration of legacy frontends.
  - Aligns UI ownership with bounded contexts or product domains.
  - Adds runtime integration, versioning, performance and consistency challenges.
  - Requires strong platform governance; otherwise users experience a stitched-together product.
synergies:
  - pattern: bounded-context
    reason: Product-aligned boundaries prevent micro-frontends from slicing by technical layer.
  - pattern: api-gateway
    reason: A gateway or BFF can provide stable backend contracts for independently deployed UI slices.
  - pattern: backend-for-frontend
    reason: Team-owned BFFs avoid forcing all slices through one generic API shape.
  - pattern: component-based-ui
    reason: Shared component contracts keep independently delivered slices visually coherent.
alternatives:
  - modular-monolith
  - monolith
  - component-based-ui
conflicts_with:
  - shared-kernel
languages:
  - typescript
  - javascript
frameworks:
  - react
  - vue
  - angular
  - svelte
  - nextjs
project_types:
  - web-frontend
  - distributed-system
  - microservices
tags:
  - independent-deployment
  - frontend-architecture
  - team-boundaries
diagram: |-
  flowchart LR
    Browser[Browser]
    Shell[App Shell]
    Auth[Shared Auth]
    Design[Design System]
    subgraph Teams[Independently Deployed Slices]
      Checkout[Checkout MFE]
      Account[Account MFE]
      Search[Search MFE]
    end
    subgraph Backends[Team APIs]
      CheckoutApi[Checkout BFF]
      AccountApi[Account BFF]
      SearchApi[Search BFF]
    end
    Browser --> Shell
    Shell --> Checkout
    Shell --> Account
    Shell --> Search
    Shell --> Auth
    Checkout --> Design
    Account --> Design
    Search --> Design
    Checkout --> CheckoutApi
    Account --> AccountApi
    Search --> SearchApi
examples:
  - language: typescript
    title: Routing by product boundary instead of importing every feature
    negative: |
      import { CheckoutApp } from "../checkout/App";
      import { AccountApp } from "../account/App";
      import { SearchApp } from "../search/App";

      export function App() {
        return <Routes>
          <Route path="/checkout/*" element={<CheckoutApp />} />
          <Route path="/account/*" element={<AccountApp />} />
          <Route path="/search/*" element={<SearchApp />} />
        </Routes>;
      }
    positive: |
      const remotes = {
        checkout: () => import("checkout/App"),
        account: () => import("account/App"),
        search: () => import("search/App"),
      };

      export function AppShell() {
        return <Routes>
          <Route path="/checkout/*" element={<RemoteApp load={remotes.checkout} />} />
          <Route path="/account/*" element={<RemoteApp load={remotes.account} />} />
          <Route path="/search/*" element={<RemoteApp load={remotes.search} />} />
        </Routes>;
      }
    explanation: >-
      The positive shell depends on stable remote contracts, allowing each product slice to build and deploy independently while still composing under shared routing.
ratings:
  small:
    score: 1
    notes: >-
      Avoid for small products; it adds distributed-system problems without enough organisational payoff.
  medium:
    score: 2
    notes: >-
      Rarely justified unless teams already have independent release constraints or a migration need.
  large:
    score: 4
    notes: >-
      Good fit for large organisations with autonomous product teams, provided platform contracts and performance budgets are enforced.
references:
  - title: Micro Frontends
    author: Cam Jackson
    year: 2019
    url: https://martinfowler.com/articles/micro-frontends.html
