id: container-presentational
title: Container / Presentational
aka:
  - Smart and Dumb Components
  - Connected and Pure Components
scale: frontend
category: frontend
altitude: low
maturity: established
short_description: >-
  Split UI components that fetch, subscribe or mutate state from components that only render a view from explicit inputs and callbacks.
description: >-
  Container / Presentational separates a feature into data-aware orchestration components and pure rendering components. Containers talk to stores, routers, services and effects; presentational components receive already-shaped props and emit user intent through callbacks. The split is a boundary, not a folder rule: it is valuable when it removes knowledge of transport, state shape or framework subscriptions from reusable UI.
problem: >-
  UI components often mix data fetching, global subscriptions, formatting and markup, making them hard to test, reuse or reason about when state sources change.
context: >-
  Apply when multiple views share a visual component, when screens depend on stores or remote data, or when teams need stable display components independent from application plumbing.
consequences:
  - Presentational components become easy to storybook, test and reuse.
  - Containers centralise effects and adaptation from domain data to view models.
  - Too much splitting can produce pass-through wrappers and prop drilling.
  - Modern hooks reduce the need for rigid container hierarchies, but not for separating effects from presentation.
synergies:
  - pattern: component-based-ui
    reason: Component boundaries make it natural to keep rendering components free of infrastructure knowledge.
  - pattern: redux-pattern
    reason: Redux containers can select state and dispatch commands while leaf components remain pure.
  - pattern: model-view-viewmodel
    reason: Containers often construct the view model consumed by a presentational view.
  - pattern: hooks
    reason: Hooks can hold container logic when a separate wrapper component would only add noise.
alternatives:
  - hooks
  - render-props
  - model-view-presenter
languages:
  - typescript
  - javascript
frameworks:
  - react
  - vue
  - angular
  - svelte
  - redux
project_types:
  - web-frontend
  - mobile-app
tags:
  - separation-of-concerns
  - testability
  - state-boundaries
examples:
  - language: typescript
    title: Keeping store access out of the reusable view
    negative: |
      function UserMenu() {
        const user = useSelector((state: RootState) => state.session.user);
        const dispatch = useDispatch();
        return <button onClick={() => dispatch(logOut())}>
          Signed in as {user.displayName}
        </button>;
      }
    positive: |
      type UserMenuViewProps = {
        displayName: string;
        onLogOut(): void;
      };

      function UserMenuView({ displayName, onLogOut }: UserMenuViewProps) {
        return <button onClick={onLogOut}>Signed in as {displayName}</button>;
      }

      function UserMenuContainer() {
        const displayName = useSelector((state: RootState) => state.session.user.displayName);
        const dispatch = useDispatch();
        return <UserMenuView displayName={displayName} onLogOut={() => dispatch(logOut())} />;
      }
    explanation: >-
      The view can now be rendered in tests, documentation and other shells without a Redux provider, while the container owns the state-specific wiring.
ratings:
  small:
    score: 3
    notes: >-
      Useful when a component is already reused; otherwise the split can be ceremony in a small screen.
  medium:
    score: 4
    notes: >-
      Strong fit for feature teams because state, routing and display can evolve independently.
  large:
    score: 4
    notes: >-
      Valuable at scale, but prefer local hooks or typed view-model builders where wrapper stacks become hard to trace.
references:
  - title: Presentational and Container Components
    author: Dan Abramov
    year: 2015
