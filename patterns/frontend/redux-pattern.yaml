id: redux-pattern
title: Redux (Unidirectional Store)
aka:
  - Redux
  - Reducer Store
scale: frontend
category: frontend
maturity: established
short_description: >-
  Keep shared client state in a single predictable store updated by pure reducers in response to explicit actions.
description: >-
  Redux refines Flux into a small set of constraints: state is read from a store, changes are described by actions, and reducers compute the next immutable state. Side effects live at the edge in thunks, sagas, observables or query layers. The pattern is valuable when many components need shared state and when replayable action history, time-travel debugging or strict update discipline outweigh the boilerplate.
problem: >-
  Complex client state becomes hard to trace when components mutate shared objects, trigger side effects directly and derive data inconsistently.
context: >-
  Use for substantial React, Angular or Vue applications with shared state, collaborative teams, offline queues, or workflows where predictable transitions and debugging tools are worth explicit structure.
consequences:
  - Reducers make state transitions deterministic and testable.
  - DevTools, action logs and typed selectors improve operability.
  - Boilerplate and indirection are poor fits for local form or purely server-cache state.
  - Requires immutability discipline and careful separation of effects from reducers.
synergies:
  - pattern: flux
    reason: Redux keeps Flux's unidirectional flow but replaces mutable stores with reducer-driven immutable state.
  - pattern: immutability
    reason: Immutable updates make reducer outputs predictable and change detection cheap.
  - pattern: command
    reason: Actions act as serialisable commands that describe user or system intent.
  - pattern: container-presentational
    reason: Containers select from the store and dispatch actions while presentational components stay pure.
alternatives:
  - flux
  - state-machine-ui
  - model-view-viewmodel
languages:
  - typescript
  - javascript
frameworks:
  - redux
  - react
  - angular
  - vue
  - rxjs
project_types:
  - web-frontend
  - mobile-app
  - desktop-app
tags:
  - reducers
  - immutable-state
  - devtools
examples:
  - language: typescript
    title: Moving implicit mutations into a reducer
    negative: |
      const cart: CartState = { lines: [] };

      export function addSku(sku: string) {
        const line = cart.lines.find(item => item.sku === sku);
        if (line) line.quantity += 1;
        else cart.lines.push({ sku, quantity: 1 });
      }
    positive: |
      type CartAction = { type: "cart/itemAdded"; sku: string };
      type CartState = { lines: Array<{ sku: string; quantity: number }> };

      function cartReducer(state: CartState = { lines: [] }, action: CartAction): CartState {
        if (action.type !== "cart/itemAdded") return state;
        const existing = state.lines.find(line => line.sku === action.sku);
        if (!existing) return { lines: [...state.lines, { sku: action.sku, quantity: 1 }] };
        return {
          lines: state.lines.map(line => line.sku === action.sku ? { ...line, quantity: line.quantity + 1 } : line),
        };
      }
    explanation: >-
      The reducer version makes the state transition pure, serialisable and testable, so UI components dispatch intent instead of mutating a shared module variable.
ratings:
  small:
    score: 2
    notes: >-
      Often overkill for small apps where local state and server cache solve the problem with less ceremony.
  medium:
    score: 4
    notes: >-
      A good fit when state is shared across routes and debugging predictable transitions pays back the boilerplate.
  large:
    score: 4
    notes: >-
      Strong for complex workflows and team scale, though large apps should avoid making Redux a dumping ground for all data.
references:
  - title: Redux Essentials
    url: https://redux.js.org/tutorials/essentials/part-1-overview-concepts
