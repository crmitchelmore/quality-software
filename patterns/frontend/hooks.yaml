id: hooks
title: Hooks
aka:
  - Composable Hooks
  - Custom Hooks
scale: frontend
category: frontend
maturity: established
short_description: >-
  Encapsulate reusable stateful behaviour in functions that compose directly inside components without wrapper components or inheritance.
description: >-
  Hooks are framework-supported functions for declaring state, effects, subscriptions and derived behaviour inside component execution. Custom hooks package a coherent behaviour behind an intention-revealing API, such as useBasket or useDebouncedValue. Good hooks hide effect lifecycles and cleanup, return domain-shaped values, and avoid becoming global service locators. They are a composition tool, not a licence to scatter side effects across every view.
problem: >-
  Stateful UI behaviour is duplicated or forced through HOCs, mixins and render props, producing wrapper trees and unclear ownership of effects.
context: >-
  Use in modern React and similar reactive frameworks when behaviour belongs to a component lifecycle but should be reused across views or tested separately.
consequences:
  - Removes wrapper layers and colocates stateful behaviour with the component that needs it.
  - Custom hooks create small, testable units for subscriptions, forms, media queries and async workflows.
  - Dependency arrays and stale closures can cause subtle bugs without linting and disciplined APIs.
  - Overuse can hide data dependencies and make components perform too many effects.
synergies:
  - pattern: component-based-ui
    reason: Hooks keep reusable behaviour out of component markup while preserving component composition.
  - pattern: higher-order-component
    reason: Hooks often replace HOCs; legacy HOCs can delegate to hooks internally.
  - pattern: render-props
    reason: Render-prop components can expose hook-powered behaviour to consumers that need rendering inversion.
  - pattern: observer
    reason: Subscription hooks are a lightweight observer boundary between external stores and components.
alternatives:
  - higher-order-component
  - render-props
  - container-presentational
languages:
  - typescript
  - javascript
frameworks:
  - react
  - vue
  - solidjs
  - svelte
project_types:
  - web-frontend
  - mobile-app
  - library
tags:
  - composition
  - stateful-behaviour
  - effects
examples:
  - language: typescript
    title: Extracting debounced search state
    negative: |
      function ProductSearch() {
        const [query, setQuery] = useState("");
        const [debounced, setDebounced] = useState("");
        useEffect(() => {
          const id = window.setTimeout(() => setDebounced(query), 250);
          return () => window.clearTimeout(id);
        }, [query]);
        const results = useProducts(debounced);
        return <SearchBox value={query} onChange={setQuery} results={results} />;
      }
    positive: |
      function useDebouncedValue<T>(value: T, delayMs: number): T {
        const [debounced, setDebounced] = useState(value);
        useEffect(() => {
          const id = window.setTimeout(() => setDebounced(value), delayMs);
          return () => window.clearTimeout(id);
        }, [value, delayMs]);
        return debounced;
      }

      function ProductSearch() {
        const [query, setQuery] = useState("");
        const results = useProducts(useDebouncedValue(query, 250));
        return <SearchBox value={query} onChange={setQuery} results={results} />;
      }
    explanation: >-
      The hook gives debouncing one lifecycle-correct implementation while ProductSearch stays focused on product search, not timer cleanup.
ratings:
  small:
    score: 4
    notes: >-
      Excellent for avoiding duplicated effects, though tiny components should not extract hooks prematurely.
  medium:
    score: 5
    notes: >-
      Strong default for shared behaviour across features when paired with linting and clear naming.
  large:
    score: 4
    notes: >-
      Very valuable, but large systems need conventions to prevent hooks from becoming hidden global orchestration layers.
references:
  - title: Reusing Logic with Custom Hooks
    url: https://react.dev/learn/reusing-logic-with-custom-hooks
