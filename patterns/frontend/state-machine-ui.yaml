id: state-machine-ui
title: State Machine UI
scale: frontend
category: frontend
altitude: medium
maturity: established
short_description: >-
  Model UI behaviour as explicit states, events and transitions so only valid screens and interactions are representable.
description: >-
  State Machine UI replaces scattered booleans with a finite set of named states and allowed transitions. Loading, editing, submitting, success and failure become mutually exclusive states rather than combinations of flags. Libraries such as XState add hierarchy, guards and effects, but the core pattern is independent: make the UI workflow explicit and drive rendering from the current state.
problem: >-
  Complex screens accumulate boolean flags such as loading, saving, error and disabled that combine into invalid or untested states.
context: >-
  Use for wizards, checkout, authentication, uploads, optimistic interactions and any UI workflow where valid transitions matter more than ad hoc state updates.
consequences:
  - Invalid UI states become harder or impossible to represent.
  - Transition diagrams improve shared understanding between design, product and engineering.
  - Adds modelling overhead for simple screens.
  - Effects must be attached carefully so the machine remains understandable and testable.
synergies:
  - pattern: state
    reason: The GoF State pattern supplies the underlying idea of behaviour depending on explicit state.
  - pattern: optimistic-ui
    reason: Optimistic, confirming, failed and reverted transitions are clearer as a machine than as booleans.
  - pattern: model-view-viewmodel
    reason: A view model can expose the current machine state and commands to a bound view.
  - pattern: redux-pattern
    reason: Reducers and action logs pair well with explicit event-driven transitions.
alternatives:
  - redux-pattern
  - model-view-viewmodel
  - state
languages:
  - typescript
  - javascript
frameworks:
  - xstate
  - react
  - vue
  - angular
  - svelte
project_types:
  - web-frontend
  - mobile-app
  - realtime-system
tags:
  - finite-state-machine
  - workflows
  - invalid-states
examples:
  - language: typescript
    title: Replacing boolean soup with a discriminated state
    negative: |
      type UploadState = {
        uploading: boolean;
        complete: boolean;
        error?: string;
      };

      if (state.uploading && state.complete) {
        // Which screen should render?
      }
    positive: |
      type UploadState =
        | { status: "idle" }
        | { status: "uploading"; progress: number }
        | { status: "failed"; message: string }
        | { status: "complete"; fileUrl: string };

      function uploadReducer(state: UploadState, event: UploadEvent): UploadState {
        if (state.status === "idle" && event.type === "started") return { status: "uploading", progress: 0 };
        if (state.status === "uploading" && event.type === "failed") return { status: "failed", message: event.message };
        if (state.status === "uploading" && event.type === "completed") return { status: "complete", fileUrl: event.fileUrl };
        return state;
      }
    explanation: >-
      The discriminated union encodes mutually exclusive states, and the reducer documents which events can move the UI between them.
ratings:
  small:
    score: 3
    notes: >-
      Situational for tricky workflows; avoid modelling every button as a machine.
  medium:
    score: 4
    notes: >-
      Strong fit for forms, wizards and async flows where invalid states have real UX cost.
  large:
    score: 5
    notes: >-
      Excellent for large, regulated or collaborative frontends where explicit transition models support testing and product discussion.
references:
  - title: XState Docs
    url: https://stately.ai/docs
