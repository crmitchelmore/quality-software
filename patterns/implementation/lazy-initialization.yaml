id: lazy-initialization
title: Lazy Initialization
aka:
  - Lazy Loading
  - Deferred Initialization
scale: implementation
category: implementation
altitude: low
maturity: time-tested
short_description: >-
  Delay creating an expensive value until the first time it is actually needed, then
  reuse the result for later calls.
description: >-
  Lazy Initialization replaces eager construction with a demand-driven boundary. The
  object starts with a missing cached value; the first access computes or loads it,
  stores it, and subsequent access returns the cached instance. The idiom is useful
  for expensive optional work, but it must define error, concurrency, and invalidation
  behaviour explicitly.
problem: >-
  Eager setup can slow startup or allocate resources that a process may never use.
context: >-
  Use when construction is expensive, the value may not be needed, and delayed failure
  is acceptable to callers.
consequences:
  - Improves startup time and avoids unused work.
  - Keeps expensive creation close to the access path that needs it.
  - Can move failures from startup to runtime, surprising operators.
  - Thread safety and cache invalidation must be designed deliberately.
synergies:
  - pattern: proxy
    reason: Proxies often hide lazy creation behind the same interface as the real object.
  - pattern: memoization
    reason: Memoization is the functional cousin that caches computed results by input.
  - pattern: object-pool
    reason: Lazy pools can create resources on first demand instead of at process startup.
  - pattern: fail-fast
    reason: Fail Fast is the alternative when misconfiguration should be detected during startup.
alternatives:
  - fail-fast
  - memoization
  - proxy
conflicts_with:
  - fail-fast
languages:
  - language-agnostic
  - typescript
  - java
  - csharp
  - python
frameworks:
  - none
  - spring
  - dotnet
  - nodejs
project_types:
  - cli-tool
  - web-api
  - backend-service
  - desktop-app
tags:
  - performance
  - startup
  - caching
examples:
  - language: typescript
    title: Delayed client creation
    negative: |
      class ReportService {
        private readonly client = new AnalyticsClient(process.env.ANALYTICS_URL!);

        async renderSummary() {
          return this.client.query('summary');
        }
      }
    positive: |
      class ReportService {
        private client?: AnalyticsClient;

        private analytics(): AnalyticsClient {
          if (!this.client) {
            this.client = new AnalyticsClient(process.env.ANALYTICS_URL!);
          }
          return this.client;
        }

        async renderSummary() {
          return this.analytics().query('summary');
        }
      }
    explanation: >-
      The positive version avoids creating the analytics client until reports are
      requested, while still reusing the same client after the first access.
ratings:
  small:
    score: 3
    notes: Useful for CLI startup and optional integrations; avoid premature use.
  medium:
    score: 4
    notes: Good for expensive optional collaborators if delayed errors are documented.
  large:
    score: 3
    notes: Valuable but risky; startup validation and concurrency semantics matter more.
references:
  - title: Patterns of Enterprise Application Architecture
    author: Martin Fowler
    year: 2002
