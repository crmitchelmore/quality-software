id: object-pool
title: Object Pool
aka:
  - Resource Pool
scale: design
category: implementation
maturity: established
short_description: >-
  Reuse a bounded set of expensive objects instead of creating and destroying them
  for every operation.
description: >-
  Object Pool manages a lifecycle for reusable objects such as database connections,
  buffers, parser instances, or worker contexts. Clients borrow an item, use it for a
  short period, reset any mutable state, and return it to the pool. The pattern is a
  performance and capacity-control tool, not a general allocation strategy.
problem: >-
  Creating expensive objects per request wastes latency and resources, while
  unbounded creation can exhaust external systems.
context: >-
  Use when object creation is measurably expensive, reuse is safe after reset, and a
  bounded concurrency limit is desirable.
consequences:
  - Reduces allocation or connection setup cost on hot paths.
  - Provides backpressure by bounding concurrent resource usage.
  - Requires rigorous reset and return discipline to avoid state leaks.
  - Can make performance worse for cheap objects due to contention and complexity.
synergies:
  - pattern: connection-pool
    reason: Connection Pool is the data-access specialisation of Object Pool.
  - pattern: flyweight
    reason: Both reduce allocation pressure, but Flyweight shares immutable intrinsic state rather than leasing mutable objects.
  - pattern: backpressure
    reason: A bounded pool naturally forces callers to wait, fail, or shed load.
  - pattern: raii
    reason: RAII-style leases ensure borrowed objects are returned even on error paths.
alternatives:
  - flyweight
  - lazy-initialization
  - connection-pool
languages:
  - language-agnostic
  - java
  - csharp
  - go
  - rust
frameworks:
  - none
  - dotnet
  - spring
  - tokio
project_types:
  - backend-service
  - high-throughput
  - low-latency
  - game
  - data-pipeline
tags:
  - performance
  - resources
  - reuse
examples:
  - language: java
    title: Reusing buffers safely
    negative: |
      byte[] encode(Event event) {
          byte[] buffer = new byte[1024 * 1024];
          return encoder.write(event, buffer);
      }
    positive: |
      byte[] encode(Event event, BlockingQueue<byte[]> pool) throws InterruptedException {
          byte[] buffer = pool.take();
          try {
              Arrays.fill(buffer, (byte) 0);
              return encoder.write(event, buffer);
          } finally {
              pool.offer(buffer);
          }
      }
    explanation: >-
      The positive version reuses a bounded number of large buffers and guarantees
      return in a finally block, avoiding unbounded allocation on the hot path.
ratings:
  small:
    score: 2
    notes: Rarely worth it unless profiling identifies an expensive resource.
  medium:
    score: 3
    notes: Useful for connections or large buffers, but only with clear ownership rules.
  large:
    score: 4
    notes: Important in high-throughput services; pool sizing and observability are critical.
references:
  - title: Design Patterns
    author: Erich Gamma, Richard Helm, Ralph Johnson, John Vlissides
    year: 1994
