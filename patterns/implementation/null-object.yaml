id: null-object
title: Null Object
aka:
  - Null Object Pattern
  - Do-Nothing Object
scale: design
category: implementation
maturity: time-tested
short_description: >-
  Replace absent collaborators with an object that implements the same interface and
  performs safe default behaviour, removing repetitive null checks from clients.
description: >-
  Null Object supplies a real implementation for the "nothing to do" case. Instead
  of returning null and forcing every caller to branch before using a dependency,
  the provider returns an object with neutral, explicit behaviour: a logger that
  discards messages, a discount policy that returns zero, or a notifier that records
  nothing. The important design work is choosing a default that is honest and safe,
  not merely hiding absence.
problem: >-
  Optional collaborators spread defensive checks through the codebase, so callers
  duplicate absence handling and often forget one branch.
context: >-
  Use when a dependency is optional but the client protocol is still meaningful with
  a safe no-op or neutral result.
consequences:
  - Removes noisy null checks and keeps the main flow focused on behaviour.
  - Makes the default behaviour explicit and testable behind the same interface.
  - Can hide configuration mistakes if the no-op object is used where work was required.
  - Works poorly when absence must be reported to the user or audited.
synergies:
  - pattern: guard-clause
    reason: Guard clauses reject invalid input while null objects handle valid-but-absent collaborators without extra branches.
  - pattern: special-case
    reason: Null Object is a small-scale form of Special Case where the special value obeys the normal interface.
  - pattern: option-maybe
    reason: Option/Maybe is a better fit when absence is semantically important and callers must make an explicit choice.
alternatives:
  - option-maybe
  - special-case
conflicts_with:
  - fail-fast
languages:
  - language-agnostic
  - typescript
  - java
  - csharp
  - python
frameworks:
  - none
  - spring
  - dotnet
project_types:
  - library
  - web-api
  - backend-service
  - modular-monolith
tags:
  - polymorphism
  - absence
  - readability
examples:
  - language: typescript
    title: Optional audit sink
    negative: |
      interface AuditSink {
        record(event: string): void;
      }

      function approve(orderId: string, audit?: AuditSink) {
        // business work
        if (audit) {
          audit.record(`approved:${orderId}`);
        }
      }
    positive: |
      interface AuditSink {
        record(event: string): void;
      }

      class NullAuditSink implements AuditSink {
        record(_event: string): void {}
      }

      function approve(orderId: string, audit: AuditSink = new NullAuditSink()) {
        // business work
        audit.record(`approved:${orderId}`);
      }
    explanation: >-
      The positive version preserves one protocol for real and absent audit sinks,
      making callers simpler while keeping the neutral behaviour named and testable.
ratings:
  small:
    score: 4
    notes: Useful for optional collaborators, though plain conditionals are often enough.
  medium:
    score: 5
    notes: Strong fit once the same null check appears across several services or handlers.
  large:
    score: 4
    notes: Valuable, but must be monitored so no-op defaults do not mask wiring defects.
references:
  - title: Pattern Languages of Program Design 3
    author: Bobby Woolf
    year: 1997
