id: scatter-gather
title: Scatter-Gather
scale: integration
category: enterprise-integration
altitude: medium
maturity: time-tested
short_description: >-
  Send a request to multiple recipients in parallel, collect the responses, and continue with a combined, best, quorum, or first-success result.
description: >-
  Scatter-Gather fans a message out to multiple recipients and gathers their replies according to a completion policy. It is useful for quoting, search federation, inventory checks, fraud signals, or capability discovery where several providers can answer the same request. The pattern must define recipient selection, correlation ids, response timeout, quorum or completeness rule, duplicate handling, and how partial results are represented. It is not a substitute for a clear owning service when one system should make the decision.
problem: >-
  Sequentially calling several providers increases latency and hard-codes provider knowledge in the requester. Fire-and-forget fan-out loses the ability to make a decision from the responses.
context: >-
  Use when independent recipients can process the same request concurrently and the caller needs a combined or selected response within a bounded time.
consequences:
  - Reduces latency by parallelising independent provider calls.
  - Allows best-response, quorum, or partial-result policies rather than all-or-nothing behaviour.
  - Requires correlation, aggregation state, timeouts, and provider-level resilience.
  - Fan-out can amplify load; apply rate limits and circuit breakers to providers.
synergies:
  - pattern: aggregator
    reason: Aggregator implements the gather phase by collecting correlated responses.
  - pattern: message-router
    reason: A router can select which recipients receive each scatter request.
  - pattern: correlation-identifier
    reason: Every request and response needs a shared id so the gather phase is safe.
  - pattern: circuit-breaker
    reason: Circuit breakers prevent failing recipients from dominating gather latency and error rates.
alternatives:
  - gateway-aggregation
  - request-reply
  - process-manager
conflicts_with:
  - choreography
languages:
  - language-agnostic
  - java
  - typescript
frameworks:
  - spring-boot
  - kafka
  - rabbitmq
  - nodejs
project_types:
  - microservices
  - distributed-system
  - backend-service
  - low-latency
tags:
  - eip
  - fan-out
  - fan-in
  - parallelism
diagram: |-
  flowchart LR
    Req[Quote request] --> Scatter{Scatter}
    Scatter --> A[Provider A]
    Scatter --> B[Provider B]
    Scatter --> C[Provider C]
    A --> Gather[(Gather)]
    B --> Gather
    C --> Gather
    Gather --> Best[Best quote]
examples:
  - language: java
    title: Parallel quote collection with bounded gather time
    negative: |
      Quote getBestQuote(QuoteRequest request) {
        List<Quote> quotes = new ArrayList<>();
        quotes.add(providerA.quote(request));
        quotes.add(providerB.quote(request));
        quotes.add(providerC.quote(request));
        return bestOf(quotes);
      }
    positive: |
      from("direct:quote-request")
        .routeId("quote-scatter-gather")
        .setHeader("quoteRequestId", simple("${exchangeId}"))
        .multicast().parallelProcessing()
          .to("direct:provider-a", "direct:provider-b", "direct:provider-c")
        .end()
        .aggregate(header("quoteRequestId"), new BestQuoteAggregationStrategy())
          .completionTimeout(1500)
        .to("kafka:quotes.best");
    explanation: >-
      The positive route runs providers concurrently and bounds the gather phase. It can return the best available quote instead of blocking on the slowest provider.
ratings:
  small:
    score: 2
    notes: Rarely justified unless latency across multiple providers is a clear problem.
  medium:
    score: 4
    notes: Good fit for federated search, quote, and signal collection flows.
  large:
    score: 5
    notes: Excellent for large provider ecosystems, but load amplification and partial-result semantics must be designed carefully.
references:
  - title: Enterprise Integration Patterns
    author: Gregor Hohpe and Bobby Woolf
    year: 2003
    url: https://www.enterpriseintegrationpatterns.com/patterns/messaging/BroadcastAggregate.html
