id: correlation-identifier
title: Correlation Identifier
scale: integration
category: enterprise-integration
altitude: low
maturity: time-tested
aka:
  - Correlation ID
  - Conversation ID
short_description: >-
  Carry a stable identifier through related messages so receivers, logs and requesters can reconstruct which messages belong together.
description: >-
  A Correlation Identifier is metadata attached to messages in a conversation, workflow or distributed trace. It lets a requester match a reply to a request, an aggregator group fragments, and operators follow a business transaction through services and queues. It should be generated at the boundary where the conversation starts, propagated unchanged where appropriate, and distinct from per-message ids used for deduplication. Good correlation ids are non-secret, globally unique enough, logged consistently and included in error and dead-letter metadata.
problem: >-
  Once messages cross asynchronous boundaries, replies, retries, logs and fragments no longer have call-stack context to show which business operation they belong to.
context: >-
  Use for request-reply messaging, sagas, aggregators, distributed logging, tracing and any asynchronous workflow with multiple related messages.
consequences:
  - Enables matching replies, grouping related messages and debugging distributed flows.
  - Improves observability when propagated into logs, metrics and traces.
  - Must not be overloaded as an idempotency key, authentication token or sensitive business identifier.
  - Requires consistent propagation conventions across transports and teams.
synergies:
  - pattern: request-reply
    reason: Replies need the request's correlation id so the requester can resolve the right pending call.
  - pattern: aggregator
    reason: Aggregators use correlation ids to group fragments that belong to the same logical result.
  - pattern: saga
    reason: Saga steps and compensations need a shared conversation id for audit and recovery.
  - pattern: dead-letter-channel
    reason: Dead-letter metadata with correlation ids makes failed flows diagnosable and replayable.
alternatives:
  - request-reply
  - idempotency
languages:
  - language-agnostic
  - java
  - typescript
  - csharp
frameworks:
  - kafka
  - rabbitmq
  - nats
  - grpc
project_types:
  - backend-service
  - microservices
  - distributed-system
  - web-api
tags:
  - messaging
  - observability
  - tracing
examples:
  - language: typescript
    title: Propagating a correlation id through NATS messages
    negative: |
      await nc.publish("shipment.book", JSON.stringify({ orderId }));
      logger.info("shipment requested");
    positive: |
      const correlationId = incoming.headers?.get("x-correlation-id") ?? crypto.randomUUID();
      const headers = nats.headers();
      headers.set("correlation-id", correlationId);

      await nc.publish(
        "shipment.book",
        JSON.stringify({ orderId, requestedAt: new Date().toISOString() }),
        { headers }
      );
      logger.info({ correlationId, orderId }, "shipment requested");
    explanation: >-
      The positive version creates or propagates a non-secret correlation id in both the message and logs, making asynchronous work traceable.
ratings:
  small:
    score: 4
    notes: Cheap and helpful even for small systems with background jobs or webhooks.
  medium:
    score: 5
    notes: Essential for debugging and request-reply flows across services.
  large:
    score: 5
    notes: Foundational for operations, audit and distributed traceability at enterprise scale.
references:
  - title: Enterprise Integration Patterns
    author: Gregor Hohpe and Bobby Woolf
    year: 2003
