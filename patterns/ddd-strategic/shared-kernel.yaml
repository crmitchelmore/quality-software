id: shared-kernel
title: Shared Kernel
scale: organisational
category: ddd-strategic
maturity: time-tested
short_description: >-
  Share a deliberately small, jointly owned subset of model or code between bounded contexts when divergence would be more costly than coordination.
description: >-
  A Shared Kernel is a context-map relationship where two or more teams agree to share a narrow part of the domain model: common value objects, identifiers, calculation rules, or schemas. It is not a casual utilities package. Changes require joint ownership, shared tests, and coordinated release discipline because the shared model affects multiple contexts. Used well, it prevents wasteful duplication for truly common concepts; used broadly, it becomes the enterprise model that bounded contexts were meant to avoid.
problem: >-
  Some concepts must stay identical across contexts, but copying them creates divergent rules and incompatible data. Conversely, broad shared libraries freeze teams together and smuggle one context's assumptions into another.
context: >-
  Use shared kernel only for stable, genuinely shared concepts where teams can collaborate closely and the shared surface can remain small.
consequences:
  - Reduces duplication for critical shared concepts and calculations.
  - Creates a strong compatibility contract backed by shared tests.
  - Couples release cadence and governance across participating teams.
  - Expands dangerously unless actively pruned and owned.
synergies:
  - pattern: context-map
    reason: Shared kernel is a relationship type that should be explicit on a context map.
  - pattern: bounded-context
    reason: It is an exception at the boundary between bounded contexts, not permission to merge their models.
  - pattern: value-object
    reason: Stable value objects such as ProductCode or Currency are often suitable shared-kernel candidates.
  - pattern: contract-testing
    reason: Contract tests help protect shared behaviour and compatibility across teams.
alternatives:
  - published-language
  - anti-corruption-layer
  - conformist
conflicts_with:
  - canonical-data-model
languages:
  - language-agnostic
  - csharp
  - java
  - typescript
frameworks:
  - none
  - dotnet
  - spring-boot
  - nodejs
project_types:
  - modular-monolith
  - microservices
  - backend-service
  - distributed-system
tags:
  - ddd
  - strategic-design
  - shared-model
  - governance
examples:
  - language: csharp
    title: Small shared product code kernel
    negative: |
      // Sales
      public sealed record ProductCode(string Value);

      // Billing
      public sealed record Sku(string Value);

      // Each team validates the same code format differently and incidents follow.
    positive: |
      // Shared kernel package: Company.ProductIdentity
      public sealed record ProductCode
      {
          public string Value { get; }

          private ProductCode(string value) => Value = value;

          public static ProductCode Parse(string value)
          {
              if (!Regex.IsMatch(value, "^[A-Z]{3}-[0-9]{5}$")) throw new DomainException("Invalid product code");
              return new ProductCode(value);
          }
      }

      // Sales and Billing both depend on this tiny package and jointly approve changes.
    explanation: >-
      The positive version shares only the stable identity concept and its validation. It avoids duplicating a critical rule without forcing Sales and Billing to share their entire models.
ratings:
  small:
    score: 1
    notes: >-
      Avoid in tiny apps; a single module or local type is simpler.
  medium:
    score: 3
    notes: >-
      Situational for a few teams with stable shared concepts and disciplined ownership.
  large:
    score: 4
    notes: >-
      Valuable but risky at scale: governance must keep the kernel small and prevent accidental enterprise-model growth.
references:
  - title: Domain-Driven Design
    author: Eric Evans
    year: 2003
