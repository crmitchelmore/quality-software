id: memento
title: Memento
aka:
  - Snapshot
  - Restore Point
scale: design
category: gof-behavioural
altitude: low
maturity: time-tested
short_description: >-
  Capture an object's internal state as an opaque snapshot so it can be restored
  later without exposing its representation.
description: >-
  Memento separates state capture from state ownership. The originator creates an
  opaque value that contains enough internal state to restore itself later; a
  caretaker stores those values for undo, checkpoints, optimistic editing, or
  rollback, but cannot inspect or mutate their internals. The pattern is strongest
  when snapshots are small, immutable, and versioned enough to survive reasonable
  changes in the originator's representation.
problem: >-
  Clients need undo or rollback behaviour, but exposing mutable internal fields so
  they can save and restore state breaks encapsulation and corrupts invariants.
context: >-
  Use for editors, wizards, simulations, games, transactional UI flows, and other
  stateful objects that need local restore points. Prefer event sourcing or audit
  logs when a durable historical record is the primary requirement.
consequences:
  - Preserves encapsulation because only the originator understands the snapshot contents.
  - Enables undo, redo, checkpoints, and speculative changes without leaking internal representation.
  - Snapshots can be memory-heavy; use deltas or bounded history for large state.
  - Long-lived persisted mementos need versioning and migration, otherwise internal refactors break restore.
synergies:
  - pattern: command
    reason: Undoable commands commonly store a memento before executing and restore it during undo.
  - pattern: immutable-object
    reason: Immutable snapshots are safer to store and share without defensive copying.
  - pattern: prototype
    reason: Prototype-style cloning can produce mementos for objects with copyable state.
  - pattern: event-sourcing
    reason: Event sourcing is an alternative for durable history; memento snapshots can speed aggregate rehydration.
alternatives:
  - event-sourcing
  - copy-on-write
  - prototype
conflicts_with:
  - active-record
languages:
  - language-agnostic
  - typescript
  - java
  - csharp
  - python
frameworks:
  - none
  - react
  - dotnet
project_types:
  - desktop-app
  - web-frontend
  - game
  - backend-service
tags:
  - undo
  - snapshot
  - encapsulation
  - rollback
examples:
  - language: typescript
    title: Restoring document edits
    negative: |
      class Document {
        public text = "";
        public cursor = 0;
        public selection: [number, number] | null = null;
      }

      const doc = new Document();
      const history: Array<{ text: string; cursor: number; selection: [number, number] | null }> = [];

      function save(): void {
        history.push({ text: doc.text, cursor: doc.cursor, selection: doc.selection });
      }

      function undo(): void {
        const previous = history.pop();
        if (previous) Object.assign(doc, previous);
      }
    positive: |
      type DocumentMemento = Readonly<{
        text: string;
        cursor: number;
        selection: [number, number] | null;
      }>;

      class Document {
        private text = "";
        private cursor = 0;
        private selection: [number, number] | null = null;

        insert(value: string): void {
          this.text = this.text.slice(0, this.cursor) + value + this.text.slice(this.cursor);
          this.cursor += value.length;
        }

        createMemento(): DocumentMemento {
          return { text: this.text, cursor: this.cursor, selection: this.selection };
        }

        restore(memento: DocumentMemento): void {
          this.text = memento.text;
          this.cursor = memento.cursor;
          this.selection = memento.selection;
        }
      }

      class History {
        private readonly snapshots: DocumentMemento[] = [];
        save(document: Document): void { this.snapshots.push(document.createMemento()); }
        undo(document: Document): void {
          const previous = this.snapshots.pop();
          if (previous) document.restore(previous);
        }
      }
    explanation: >-
      The positive version keeps document fields private and lets the document own
      snapshot creation and restoration. History stores opaque immutable values
      instead of manipulating representation directly.
ratings:
  small:
    score: 3
    notes: >-
      Good for small editors or wizards, but avoid snapshots when simple local
      variables or form reset logic are enough.
  medium:
    score: 4
    notes: >-
      Strong fit for undoable domain interactions and UI flows with bounded state
      and clear snapshot ownership.
  large:
    score: 3
    notes: >-
      Useful as a local mechanism, but large durable systems usually need event
      logs, audit trails, versioned snapshots, and storage controls.
references:
  - title: "Design Patterns: Elements of Reusable Object-Oriented Software"
    author: Gamma, Helm, Johnson, Vlissides
    year: 1994
