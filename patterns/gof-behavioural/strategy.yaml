id: strategy
title: Strategy
aka:
  - Policy
scale: design
category: gof-behavioural
altitude: low
maturity: time-tested
short_description: >-
  Define a family of interchangeable algorithms behind a common interface and let
  the client select one at runtime, decoupling the algorithm from the code that uses it.
description: >-
  Strategy encapsulates each variant of an algorithm in its own type implementing a
  shared interface. The context holds a reference to a strategy and delegates the
  varying behaviour to it, so new variants can be added without modifying the context
  (open/closed). It replaces sprawling conditional logic that switches on a "kind"
  with polymorphic dispatch.
problem: >-
  A class needs different variants of a behaviour, and encoding them as branching
  conditionals makes the class large, rigid, and hard to extend.
context: >-
  When you have multiple ways to perform a task (pricing, routing, compression,
  validation) chosen at runtime or by configuration.
consequences:
  - New algorithms are added without touching existing code (open/closed).
  - Eliminates conditionals and isolates each algorithm for testing.
  - Clients must understand the available strategies to choose one.
  - Overhead of extra objects/interfaces for trivial variation.
synergies:
  - pattern: dependency-injection
    reason: The chosen strategy is typically injected into the context.
  - pattern: factory-method
    reason: A factory can select and create the appropriate strategy.
  - pattern: null-object
    reason: A no-op strategy provides a safe default with no conditionals.
alternatives:
  - template-method
  - state
languages:
  - language-agnostic
  - java
  - csharp
  - typescript
  - python
  - go
frameworks:
  - none
project_types:
  - library
  - backend-service
  - web-api
  - cli-tool
tags:
  - polymorphism
  - open-closed
  - composition
examples:
  - language: typescript
    title: Shipping cost calculation
    negative: |
      class Checkout {
        shipping(method: string, weight: number): number {
          if (method === "standard") return weight * 1.5;
          else if (method === "express") return weight * 1.5 + 10;
          else if (method === "drone") return weight * 4 + 25;
          throw new Error("unknown method");
        }
      }
    positive: |
      interface ShippingStrategy {
        cost(weightKg: number): number;
      }
      const standard: ShippingStrategy = { cost: (w) => w * 1.5 };
      const express: ShippingStrategy = { cost: (w) => w * 1.5 + 10 };
      const drone: ShippingStrategy = { cost: (w) => w * 4 + 25 };

      class Checkout {
        constructor(private readonly shipping: ShippingStrategy) {}
        total(weightKg: number): number {
          return this.shipping.cost(weightKg);
        }
      }
      // adding "courier" is a new object, not an edit to Checkout
    explanation: >-
      The positive version isolates each algorithm and lets new shipping methods be
      added without editing Checkout, removing the growing conditional.
ratings:
  small:
    score: 4
    notes: Cheap and valuable even in small code once you have 2+ real variants; avoid for single-use logic.
  medium:
    score: 5
    notes: A workhorse for taming conditionals and enabling configuration-driven behaviour.
  large:
    score: 5
    notes: Essential for extensibility; pairs with DI to keep large systems open for extension.
references:
  - title: "Design Patterns: Elements of Reusable Object-Oriented Software"
    author: Gamma, Helm, Johnson, Vlissides
    year: 1994
