id: chain-of-responsibility
title: Chain of Responsibility
aka:
  - Chain of Command
scale: design
category: gof-behavioural
maturity: time-tested
short_description: >-
  Pass a request along an ordered chain of handlers until one handles it or all
  have declined, decoupling the sender from the concrete receiver.
description: >-
  Chain of Responsibility turns a sequence of conditional checks into a linked or
  iterable set of handler objects with a shared interface. Each handler decides
  whether it can satisfy the request, whether it should enrich or reject it, and
  whether processing should continue to the next handler. The sender knows only
  the first link or pipeline entry, so adding authentication, validation,
  enrichment, throttling, or fallback behaviour is a matter of inserting a
  handler rather than editing a central dispatcher.
problem: >-
  A request may be handled by one of several behaviours, or must pass through a
  sequence of optional behaviours, and hard-coding that sequence creates a large,
  order-sensitive conditional block.
context: >-
  Use when processing is naturally ordered, each step can make an independent
  decision, and the client should not know which concrete handler will act.
  Typical examples include middleware stacks, support-ticket escalation,
  validation chains, and command routing.
consequences:
  - Decouples request senders from concrete handlers and makes insertion/removal of steps local.
  - Makes ordering explicit, which is powerful but can hide bugs when handlers depend on previous side effects.
  - Can obscure control flow if handlers both mutate and short-circuit without a clear contract.
  - Needs observability or tracing in production pipelines so skipped and terminal handlers are visible.
synergies:
  - pattern: middleware-pipeline
    reason: Middleware pipelines are a practical chain with standard next-callback semantics for HTTP and message processing.
  - pattern: command
    reason: Commands provide the request object that flows through the chain without exposing sender internals.
  - pattern: decorator
    reason: Decorators wrap one operation while a chain composes many optional handlers with similar local responsibilities.
  - pattern: composite
    reason: A composite can group several handlers into one chain segment while preserving the same handler interface.
alternatives:
  - strategy
  - message-router
  - content-based-router
conflicts_with:
  - transaction-script
languages:
  - language-agnostic
  - typescript
  - java
  - csharp
  - python
frameworks:
  - express
  - nestjs
  - spring-boot
  - aspnet
  - none
project_types:
  - web-api
  - backend-service
  - modular-monolith
  - microservices
tags:
  - request-processing
  - extensibility
  - pipeline
  - decoupling
examples:
  - language: typescript
    title: Expense approval routing
    negative: |
      type Expense = { amount: number; department: string };

      function approve(expense: Expense): string {
        if (expense.amount <= 100) {
          return "approved by team lead";
        }
        if (expense.amount <= 1000 && expense.department !== "security") {
          return "approved by department manager";
        }
        if (expense.amount <= 10000) {
          return "approved by finance";
        }
        throw new Error("board approval required");
      }
    positive: |
      type Expense = { amount: number; department: string };

      interface Approver {
        approve(expense: Expense): string | null;
      }

      class TeamLead implements Approver {
        approve(expense: Expense): string | null {
          return expense.amount <= 100 ? "approved by team lead" : null;
        }
      }

      class DepartmentManager implements Approver {
        approve(expense: Expense): string | null {
          if (expense.amount <= 1000 && expense.department !== "security") {
            return "approved by department manager";
          }
          return null;
        }
      }

      class Finance implements Approver {
        approve(expense: Expense): string | null {
          return expense.amount <= 10000 ? "approved by finance" : null;
        }
      }

      class ApprovalChain {
        constructor(private readonly approvers: Approver[]) {}

        approve(expense: Expense): string {
          for (const approver of this.approvers) {
            const decision = approver.approve(expense);
            if (decision) return decision;
          }
          throw new Error("board approval required");
        }
      }
    explanation: >-
      The positive version makes each approval rule a named handler and keeps the
      chain order explicit. Adding legal review for one department is an insertion
      into the configured approvers, not another branch in a growing function.
ratings:
  small:
    score: 3
    notes: >-
      Useful for small HTTP middleware or validation chains, but avoid it for a
      two-branch decision where a direct conditional is clearer.
  medium:
    score: 4
    notes: >-
      A strong fit once processing steps are owned by different modules and need
      to be reordered, replaced, or tested independently.
  large:
    score: 4
    notes: >-
      Valuable in large systems with explicit tracing and conventions; without
      those, long chains become difficult to reason about during incidents.
references:
  - title: "Design Patterns: Elements of Reusable Object-Oriented Software"
    author: Gamma, Helm, Johnson, Vlissides
    year: 1994
