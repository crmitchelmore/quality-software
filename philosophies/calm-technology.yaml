id: calm-technology
title: Calm Technology
discipline: ux
aka:
  - Calm Design
originators:
  - Mark Weiser
  - John Seely Brown
  - Amber Case
origin:
  type: essay
  title: "Designing Calm Technology"
  year: 1995
short_description: >-
  Design technology that informs without overwhelming, moving between the periphery and centre of attention only when needed.
description: >-
  Calm Technology comes from Weiser and Brown's vision of ubiquitous computing that recedes into the background of everyday life. Rather than demanding constant attention, calm systems make information available at the periphery and move to the centre only when action is useful. Amber Case later translated the idea into practical design principles for connected products and notifications. The philosophy is especially important where software competes for attention: good technology amplifies human capacity without creating noise, anxiety or interruption.
core_tenets:
  - Require the smallest amount of attention needed for the situation.
  - Move smoothly between peripheral awareness and focused interaction.
  - Inform without overburdening, interrupting only when the user can or must act.
  - Respect human rhythms, social context and environmental limits.
  - Make system state legible through subtle, timely cues rather than constant demands.
key_ideas:
  - name: Centre and periphery
    explanation: >-
      Information should sit at the edge of attention until it becomes important enough to focus on.
  - name: Ubiquitous computing
    explanation: >-
      As computing spreads into everyday environments, interaction design must manage attention rather than maximise engagement.
  - name: Attention as a scarce resource
    explanation: >-
      Interruptions have real cognitive and social cost, so notifications and feedback need restraint.
in_practice: >-
  Use quiet defaults, progressive status cues, digestible notifications, skeleton states that reduce anxiety, clear escalation rules and user controls for frequency, urgency and channel. Test whether users feel informed and in control rather than merely more engaged.
complements:
  - design-of-everyday-things
tensions_with:
  - philosophy: product-led-growth
    reason: >-
      Growth tactics can reward frequent prompts and engagement loops, while calm technology deliberately reduces unnecessary attention capture.
associated_practice_patterns:
  - pattern: toast-notification
    reason: >-
      Toasts should be reserved for lightweight, non-blocking feedback that does not steal more attention than needed.
  - pattern: skeleton-loading
    reason: >-
      Skeleton loading can calmly communicate progress and layout without interruptive spinners or modal waits.
  - pattern: system-status-visibility
    reason: >-
      Calm systems still make state visible, but in proportion to the user's need to act.
successfully_applied:
  - where: Xerox PARC ubiquitous computing research
    what: >-
      Weiser and Brown articulated calm technology as the desired interaction quality for ubiquitous computing environments.
    evidence_strength: primary-source
    source:
      title: "Designing Calm Technology"
      year: 1995
  - where: Connected product and notification design practice
    what: >-
      Amber Case popularised calm technology principles for IoT, mobile and notification-heavy products.
    evidence_strength: primary-source
    source:
      title: Calm Technology
      year: 2015
best_for:
  - notification-heavy products
  - ambient and IoT interfaces
  - safety or focus-sensitive workflows
criticisms:
  - Calmness is context-dependent; an alert that is too subtle can be unsafe in critical systems.
  - Business metrics often reward attention capture, making calm design difficult to defend.
  - Minimal feedback can become ambiguity if users cannot tell what the system is doing.
references:
  - title: "Designing Calm Technology"
    author: Mark Weiser and John Seely Brown
    year: 1995
  - title: "The Coming Age of Calm Technology"
    author: Mark Weiser and John Seely Brown
    year: 1996
  - title: Calm Technology
    author: Amber Case
    year: 2015
