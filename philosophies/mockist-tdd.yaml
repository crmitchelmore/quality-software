id: mockist-tdd
title: Mockist Test-Driven Development
discipline: testing
aka:
  - London school TDD
  - Outside-in TDD
  - Need-driven development
originators:
  - Steve Freeman
  - Nat Pryce
origin:
  type: book
  title: Growing Object-Oriented Software, Guided by Tests
  year: 2009
short_description: >-
  Drive design outside-in with mocked collaborators, interaction expectations and role-focused
  interfaces that specify how objects should talk to each other.
description: >-
  Mockist TDD is the London school of test-driven development associated with outside-in design. It
  begins from user-facing behaviour, then uses mocks to describe the roles and messages required of
  not-yet-written collaborators. The test verifies interactions as part of the contract, encouraging
  tell-don't-ask object design and letting collaborator interfaces emerge from client needs before
  their implementations exist.
core_tenets:
  - Start with an outside acceptance or user-facing behaviour and work inward one collaborator at a time.
  - Mock collaborators with interesting behaviour so tests specify the messages the design requires.
  - Prefer interaction verification where the behaviour is a command or collaboration contract.
  - Mock roles, not concrete objects; expectations should describe responsibilities and protocols.
  - Let interfaces emerge from what their clients need, rather than designing every layer up front.
key_ideas:
  - name: Outside-in development
    explanation: >-
      The first tests describe externally visible behaviour, then each new mock expectation becomes a
      design demand for the next object inward.
  - name: Behaviour verification
    explanation: >-
      Correctness is partly defined by the right messages being sent to collaborators, especially for
      command-style dependencies.
in_practice: >-
  Begin from a failing acceptance-level behaviour, introduce mocks for not-yet-built collaborators,
  name their roles in domain terms, implement each role from its client's expectations, and add
  contract or integration checks where mock drift would be dangerous.
complements:
  - behaviour-driven-development
  - extreme-programming-tdd
tensions_with:
  - philosophy: classicist-tdd
    reason: >-
      Mockist TDD treats interactions as a primary design contract, while classicist TDD usually
      prefers real collaborators and state-based assertions.
associated_patterns:
  - pattern: mock-object
    reason: >-
      Mock objects are the central mechanism for expressing collaborator expectations and verifying
      command interactions.
  - pattern: test-double
    reason: >-
      The broader double taxonomy helps distinguish mocks from stubs and fakes when designing
      outside-in tests.
  - pattern: contract-testing
    reason: >-
      Contract tests counter mock drift by checking that real providers honour the interactions mocked
      by consumers.
  - pattern: given-when-then
    reason: >-
      Outside-in work often begins from behaviour scenarios expressed in a shared Given-When-Then form.
  - pattern: arrange-act-assert
    reason: >-
      Keeps interaction tests legible even when the arrange phase includes mock expectations.
successfully_applied:
  - where: London-school object-oriented TDD practice
    what: >-
      Freeman and Pryce present a full outside-in workflow in which tests, mocks and acceptance
      scenarios guide the growth of object-oriented software.
    evidence_strength: primary-source
    source:
      title: Growing Object-Oriented Software, Guided by Tests
      year: 2009
  - where: Mock object literature and Fowler's comparison
    what: >-
      Fowler's classical versus mockist discussion documents the interaction-based style and its
      trade-offs, grounding it in the earlier mock object work by Mackinnon, Freeman and Craig.
    evidence_strength: secondary-source
    source:
      title: Mocks Aren't Stubs
      url: https://martinfowler.com/articles/mocksArentStubs.html
      year: 2007
references:
  - title: Growing Object-Oriented Software, Guided by Tests
    author: Steve Freeman and Nat Pryce
    year: 2009
  - title: Mock Roles, not Objects
    author: Tim Mackinnon, Steve Freeman and Philip Craig
    year: 2004
  - title: Mocks Aren't Stubs
    author: Martin Fowler
    year: 2007
    url: https://martinfowler.com/articles/mocksArentStubs.html
