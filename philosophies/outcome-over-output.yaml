id: outcome-over-output
title: Outcome Over Output
discipline: product
aka:
  - Outcomes Over Output
  - Outcome-Based Product Management
originators:
  - Josh Seiden
  - Marty Cagan
origin:
  type: book
  title: "Outcomes Over Output"
  year: 2019
short_description: >-
  Manage product work by the customer and business behaviour changes it creates, not by the volume of features,
  tickets or roadmap items delivered.
description: >-
  Outcome Over Output argues that teams should be accountable for meaningful changes in behaviour and business
  results rather than for shipping pre-specified features. Josh Seiden frames outcomes as changes in human behaviour
  that drive business impact, while Marty Cagan's outcome-based team model gives empowered teams problems to solve
  instead of feature lists to implement. The philosophy does not reject delivery; it insists that delivery is a means
  to an end and that roadmaps, discovery and experiments should connect work to measurable customer or business
  outcomes.
core_tenets:
  - Shipping features is not success unless it changes behaviour or improves a meaningful result.
  - Product teams should receive problems and outcome goals, not merely feature mandates.
  - Outcomes should be observable, measurable and connected to strategy.
  - Roadmaps are better expressed as bets and outcome themes than fixed output commitments.
  - Discovery and delivery should continually test whether outputs are actually producing the intended outcome.
key_ideas:
  - name: Outcome
    explanation: >-
      A measurable change in customer, user or stakeholder behaviour that contributes to a business result.
  - name: Output
    explanation: >-
      The artefact delivered — a feature, document, campaign or release — which has value only if it helps produce
      the outcome.
  - name: Outcome-based roadmap
    explanation: >-
      A roadmap organised around desired results and strategic bets rather than a calendar of committed features.
in_practice: >-
  Translate strategy into product outcomes; define leading indicators of changed behaviour; create roadmap themes
  around opportunities; run discovery to find solutions; ship iteratively; and review whether shipped work moved the
  outcome instead of celebrating release completion alone.
complements:
  - empowered-product-teams
  - continuous-discovery
  - north-star-framework
tensions_with:
  - philosophy: working-backwards
    reason: >-
      Working Backwards can be used as a fixed launch commitment if misapplied, while outcome thinking keeps the
      solution negotiable until evidence supports it.
associated_practice_patterns:
  - pattern: outcome-based-roadmap
    reason: >-
      This is the direct planning practice for replacing output commitments with outcome themes and measurable bets.
  - pattern: leading-vs-lagging-indicators
    reason: >-
      Outcome management depends on choosing leading indicators that reveal behaviour change before lagging business
      results arrive.
  - pattern: opportunity-solution-tree
    reason: >-
      The tree links a desired outcome to opportunities, solutions and experiments, preserving the outcome thread.
successfully_applied:
  - where: Product management and agile product organisations
    what: >-
      Seiden's outcome framing is widely adopted in product coaching, OKR practice and agile product management to
      move teams away from feature-factory roadmaps.
    evidence_strength: primary-source
    source:
      title: "Outcomes Over Output"
      year: 2019
  - where: Modern product operating models
    what: >-
      Cagan describes strong product companies assigning empowered teams customer and business problems rather than
      feature backlogs.
    evidence_strength: secondary-source
    source:
      title: "Inspired"
      year: 2017
best_for:
  - product-roadmapping
  - product-team-alignment
  - feature-factory-recovery
criticisms:
  - Outcome goals can become vague slogans if teams do not define observable behaviour and leading indicators.
  - Some outputs are mandatory for legal, platform or operational reasons even when their behavioural outcome is indirect.
  - Senior stakeholders may still demand date and scope certainty, creating tension with outcome-based planning.
references:
  - title: "Outcomes Over Output"
    author: Josh Seiden
    year: 2019
  - title: "Inspired"
    author: Marty Cagan
    year: 2017
