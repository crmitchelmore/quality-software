id: zen-of-python
title: The Zen of Python
aka:
  - PEP 20
  - import this
originators:
  - Tim Peters
origin:
  type: manifesto
  title: PEP 20 -- The Zen of Python
  year: 2004
short_description: >-
  Guide design toward explicit, readable and unsurprising Python: simple beats complex, errors
  should not pass silently, and there should be one obvious way to do it.
description: >-
  The Zen of Python is Tim Peters' compact set of aphorisms that captures the design taste of the
  Python language and its community. Published as PEP 20 and famously available through
  "import this", it is not a formal methodology; it is a set of preferences for resolving everyday
  design tension. Explicit is better than implicit. Simple is better than complex. Readability
  counts. Special cases are not special enough to break the rules. Errors should never pass silently
  unless explicitly silenced. The result is a philosophy of humane, legible software: APIs should
  reveal their intent, code should be easy to read later, and cleverness should give way to the one
  obvious, maintainable path.
core_tenets:
  - Explicit is better than implicit; dependencies, control flow, errors and conversions should be
    visible at the point where they matter.
  - Simple is better than complex, and complex is better than complicated; necessary complexity
    should remain orderly and readable.
  - Readability counts, so code is judged for future human understanding as well as immediate
    machine execution.
  - There should be one obvious way to do it, even if that way is not immediately obvious to every
    newcomer.
  - Errors should never pass silently unless deliberately and explicitly silenced.
  - >-
    Practicality beats purity: consistency and beauty matter, but real-world usefulness can justify
    a measured exception.
key_ideas:
  - name: Explicitness
    explanation: >-
      Python design favours visible names, imports, arguments and error handling over hidden magic
      or ambient conventions.
  - name: Readability counts
    explanation: >-
      Code is written for people first. Concise cleverness loses when it obscures intent or makes
      maintenance harder.
  - name: One obvious way
    explanation: >-
      The language and libraries should guide users toward a clear idiom instead of presenting many
      equivalent mechanisms for the same task.
in_practice: >-
  Name things directly; pass dependencies as arguments or constructors; raise clear exceptions
  instead of returning ambiguous sentinels; keep public APIs small and idiomatic; write straightforward
  control flow with early exits where they clarify; prefer standard-library conventions over custom
  cleverness.
complements:
  - a-philosophy-of-software-design
  - information-hiding
  - design-by-contract
  - simple-made-easy
tensions_with:
  - philosophy: worse-is-better
    reason: >-
      Both value practicality, but Python's Zen places stronger weight on readability, explicitness
      and errors not passing silently than a rough 90% implementation might.
  - philosophy: clean-architecture-solid
    reason: >-
      Heavy layering and indirection can make dependencies formally clean while violating the Zen's
      preference for obvious, readable code.
  - philosophy: unix-philosophy
    reason: >-
      Unix text pipelines prize generic composition; Python often prefers a more explicit, structured
      API when that improves readability and error reporting.
associated_patterns:
  - pattern: guard-clause
    reason: >-
      Makes exceptional or invalid cases explicit early, keeping the main path readable and flat.
  - pattern: fail-fast
    reason: >-
      Matches the rule that errors should not pass silently; invalid states should surface near
      their cause.
  - pattern: dependency-injection
    reason: >-
      Makes collaborators explicit rather than hidden in module globals or service locators.
  - pattern: input-validation
    reason: >-
      Turns assumptions about inputs into visible checks and clear failures rather than implicit
      downstream surprises.
  - pattern: problem-details
    reason: >-
      Gives API errors a clear, standard shape, aligning explicit error reporting with readability
      for clients.
  - pattern: options-object
    reason: >-
      Names configuration values explicitly, avoiding long positional argument lists whose meaning
      is implicit.
  - pattern: template-method
    reason: >-
      When used sparingly, provides one obvious algorithm skeleton while leaving clear extension
      points for specialised steps.
at_odds_patterns:
  - pattern: service-locator
    reason: >-
      Hides real dependencies behind implicit lookup, working against explicitness and readable
      call sites.
  - pattern: singleton
    reason: >-
      Global instance access can make state and dependencies implicit, surprising tests and
      maintainers.
  - pattern: fluent-interface
    reason: >-
      Fluent chains can be readable in moderation, but overuse hides intermediate values and errors
      behind clever surface syntax.
successfully_applied:
  - where: CPython and Python language design
    what: >-
      PEP 20 records the aphorisms as guiding principles for Python, and CPython exposes them
      directly through the standard "import this" easter egg.
    evidence_strength: primary-source
    source:
      title: PEP 20 -- The Zen of Python
      url: "https://peps.python.org/pep-0020/"
      year: 2004
  - where: Python standard library
    what: >-
      Standard-library APIs generally favour explicit names, readable control flow and clear
      exceptions, reflecting the Zen's community design norms.
    evidence_strength: inferred
    source:
      title: Python Standard Library documentation
      url: "https://docs.python.org/3/library/"
  - where: PEP 8 and Python style guidance
    what: >-
      Python's style guide reinforces readability, explicit naming and consistency, echoing the
      Zen's practical effect on day-to-day Python code.
    evidence_strength: primary-source
    source:
      title: PEP 8 -- Style Guide for Python Code
      url: "https://peps.python.org/pep-0008/"
      year: 2001
best_for:
  - library
  - sdk
  - cli-tool
  - web-api
  - backend-service
criticisms:
  - The aphorisms are intentionally terse and sometimes conflict; applying them requires judgement
    rather than rule-following.
  - There is not always one obvious way in the real Python ecosystem, especially where historical
    compatibility has preserved multiple idioms.
  - Practicality beats purity can justify exceptions, but can also be overused to excuse
    inconsistency.
references:
  - title: PEP 20 -- The Zen of Python
    author: Tim Peters
    year: 2004
    url: "https://peps.python.org/pep-0020/"
  - title: PEP 8 -- Style Guide for Python Code
    author: Guido van Rossum, Barry Warsaw, Nick Coghlan
    year: 2001
    url: "https://peps.python.org/pep-0008/"
  - title: "The History of Python: import this and The Zen of Python"
    author: Barry Warsaw
    year: 2020
