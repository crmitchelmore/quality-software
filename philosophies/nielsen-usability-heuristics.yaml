id: nielsen-usability-heuristics
title: Nielsen's Usability Heuristics
discipline: ux
aka:
  - 10 Usability Heuristics
originators:
  - Jakob Nielsen
origin:
  type: principles
  title: "10 Usability Heuristics for User Interface Design"
  year: 1994
short_description: >-
  Ten broad interface principles for finding usability problems quickly, from visibility of system status to error prevention and recovery.
description: >-
  Nielsen's usability heuristics are a compact set of design principles intended for heuristic evaluation: expert reviewers inspect an interface and identify likely usability problems without waiting for a full user study. They are deliberately general rather than prescriptive rules, covering system feedback, match with the real world, user control, consistency, error prevention, recognition over recall, flexibility, minimalism, error recovery and help. Their enduring value is speed and shared vocabulary: teams can cheaply catch common usability failures before or alongside empirical testing.
core_tenets:
  - Keep users informed about system status with timely, meaningful feedback.
  - Speak the user's language and align the interface with real-world concepts.
  - Support user control, freedom, undo and recovery from mistakes.
  - Prefer consistency, standards and recognition over forcing users to remember.
  - Prevent errors where possible and make unavoidable errors easy to diagnose and fix.
key_ideas:
  - name: Heuristic evaluation
    explanation: >-
      A small number of evaluators independently inspect an interface against the heuristics, then consolidate severity-rated findings.
  - name: Recognition rather than recall
    explanation: >-
      Interfaces should make options, state and instructions visible so users do not have to remember hidden information.
  - name: Error prevention and recovery
    explanation: >-
      Good design both reduces the chance of mistakes and provides clear paths back when they occur.
in_practice: >-
  Have several trained reviewers walk through important tasks, record violations of specific heuristics, rate severity, then prioritise fixes that reduce task failure or confusion. Use the heuristics as a screening method, not as a substitute for watching real users.
complements:
  - design-of-everyday-things
  - human-centered-design
associated_practice_patterns:
  - pattern: heuristic-evaluation
    reason: >-
      Nielsen's principles are the canonical checklist used in heuristic evaluation.
  - pattern: system-status-visibility
    reason: >-
      Visibility of system status is the first Nielsen heuristic and a common source of usability defects.
  - pattern: error-message-design
    reason: >-
      Helping users recognise, diagnose and recover from errors is one of the ten heuristics.
successfully_applied:
  - where: Nielsen Norman Group consulting and usability education
    what: >-
      The heuristics have been used for decades in NN/g training, consulting and published usability guidance.
    evidence_strength: primary-source
    source:
      title: "10 Usability Heuristics for User Interface Design"
      url: "https://www.nngroup.com/articles/ten-usability-heuristics/"
      year: 1994
  - where: Academic and industry usability inspection methods
    what: >-
      Heuristic evaluation became a standard low-cost inspection technique in HCI and product design curricula.
    evidence_strength: secondary-source
    source:
      title: "Usability Inspection Methods"
      year: 1994
best_for:
  - early usability review
  - design critique
  - teams needing a shared usability vocabulary
criticisms:
  - Expert inspection predicts likely issues but cannot prove real users will experience them.
  - Findings depend heavily on evaluator skill and domain knowledge.
  - The heuristics are broad, so teams may need accessibility and content-specific checks as well.
