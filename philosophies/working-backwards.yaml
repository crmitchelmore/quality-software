id: working-backwards
title: Working Backwards
discipline: product
aka:
  - PR/FAQ
  - Amazon Working Backwards
originators:
  - Amazon
  - Colin Bryar
  - Bill Carr
origin:
  type: book
  title: "Working Backwards"
  year: 2021
short_description: >-
  Start from the future customer experience, express it as a press release and FAQ, and work backwards to decide
  whether and how the product should be built.
description: >-
  Amazon's Working Backwards philosophy forces product thinking to begin with the customer and the finished
  experience rather than with internal technology, organisational convenience or incremental feature ideas. The
  canonical PR/FAQ method asks a team to write a future-facing press release that explains the customer problem,
  benefit and launch narrative, plus a frequently asked questions document that tests feasibility, economics,
  adoption and operational details. The artefact is debated before major investment so leaders can sharpen the idea,
  expose assumptions and align on what must be true for the product to deserve building.
core_tenets:
  - Begin with the customer problem and desired future experience, not the available solution.
  - Write the launch narrative before building so the value proposition is concrete and testable.
  - Use FAQs to expose assumptions about feasibility, economics, operations and customer adoption.
  - Prefer clear written narratives over slide decks for high-quality product decisions.
  - Iterate the PR/FAQ until the customer value and business logic are compelling or abandon the idea.
key_ideas:
  - name: Press release
    explanation: >-
      A concise future announcement describing the customer, problem, solution, benefits and why the product matters.
  - name: FAQ
    explanation: >-
      A detailed companion document answering customer, business, technical and operational questions before
      commitment.
  - name: Narrative decision-making
    explanation: >-
      Written memos create shared context and expose reasoning more effectively than presentation fragments.
in_practice: >-
  Draft a future press release in customer language; add external and internal FAQs; review the narrative with
  decision-makers; revise until assumptions are explicit; connect open questions to research or experiments; and only
  then commit teams and investment to delivery.
complements:
  - customer-development
  - outcome-over-output
  - empowered-product-teams
tensions_with:
  - philosophy: lean-startup
    reason: >-
      Working Backwards can create a persuasive complete narrative before evidence exists, while Lean Startup pushes
      teams to test the riskiest assumptions as cheaply as possible.
associated_practice_patterns:
  - pattern: working-backwards-prfaq
    reason: >-
      PR/FAQ is the core practice that turns the philosophy into a concrete product decision artefact.
  - pattern: narrative-memo
    reason: >-
      Amazon's written narrative culture supports the careful reasoning and critique required by Working Backwards.
  - pattern: product-vision-board
    reason: >-
      A vision board can complement the PR/FAQ by capturing target customers, needs, value and business goals.
successfully_applied:
  - where: Amazon product development
    what: >-
      Bryar and Carr describe Working Backwards and PR/FAQ as core mechanisms used in Amazon's product process for
      customer-focused innovation.
    evidence_strength: primary-source
    source:
      title: "Working Backwards"
      year: 2021
  - where: Amazon Kindle and AWS narratives
    what: >-
      Amazon's narrative-first decision process is commonly associated with major product initiatives, including the
      internal framing of Kindle and AWS-era customer problems.
    evidence_strength: secondary-source
    source:
      title: "Working Backwards"
      year: 2021
best_for:
  - major-product-bets
  - executive-alignment
  - customer-centric-strategy
criticisms:
  - A polished PR/FAQ can make an unvalidated idea feel more certain than it is.
  - The method is writing-intensive and may slow smaller teams if used for every minor feature.
  - It requires a culture willing to critique documents deeply rather than rubber-stamp narratives.
references:
  - title: "Working Backwards"
    author: Colin Bryar and Bill Carr
    year: 2021
