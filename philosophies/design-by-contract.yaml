id: design-by-contract
title: Design by Contract
aka:
  - DbC
  - Contract programming
originators:
  - Bertrand Meyer
origin:
  type: book
  title: Object-Oriented Software Construction
  year: 1988
short_description: >-
  Define software elements by explicit contracts: preconditions for callers, postconditions for
  suppliers and invariants that every valid object state must preserve.
description: >-
  Design by Contract, introduced by Bertrand Meyer in Eiffel and Object-Oriented Software
  Construction, treats each routine and class as a formal agreement between client and supplier.
  A method's preconditions state what callers must satisfy before invocation; its postconditions
  state what the method guarantees on return; class invariants state what must remain true for
  every externally visible object state. These contracts are not merely defensive checks: they
  allocate responsibility, document intent in executable form and enable local reasoning about
  correctness. When a contract is violated, the right behaviour is to fail fast and expose the
  broken assumption rather than silently compensate for a caller or supplier that has not met its
  obligation.
core_tenets:
  - >-
    Every operation should make its obligations explicit: what the caller must provide and what the
    supplier guarantees in return.
  - Preconditions belong to the caller; a callee should not quietly repair inputs that violate the
    contract.
  - Postconditions belong to the supplier; after a successful call, callers may rely on the stated
    result and side effects.
  - Class invariants must hold before and after public operations, making object validity a stable
    property rather than a hope.
  - Contract violation is a bug, not a normal business outcome; fail fast so the responsible side
    can be fixed.
  - >-
    Inheritance and substitution require behavioural compatibility: overridden methods must honour
    the ancestor contract.
key_ideas:
  - name: Preconditions
    explanation: >-
      Conditions a caller must satisfy before invoking an operation, such as non-null arguments,
      valid ranges or required state.
  - name: Postconditions
    explanation: >-
      Guarantees a routine makes if it returns normally, giving callers a reliable basis for the
      next step.
  - name: Class invariants
    explanation: >-
      Properties that define a valid instance and must be preserved by all public methods.
in_practice: >-
  Put explicit guards at module boundaries and constructors; document caller and supplier
  obligations in API contracts; assert invariants close to the state that owns them; distinguish
  expected domain rejection from contract violation. Use tests, property checks and contract tests
  to exercise the promises, but avoid scattering duplicate defensive checks that blur
  responsibility.
complements:
  - functional-core-type-driven
  - a-philosophy-of-software-design
  - clean-architecture-solid
tensions_with:
  - philosophy: unix-philosophy
    reason: >-
      Unix tools often rely on loose text conventions and tolerant parsing, while DbC prefers
      precise, explicit interface obligations.
  - philosophy: worse-is-better
    reason: >-
      DbC invests in correctness guarantees and explicit contracts; worse-is-better may accept a
      simpler incomplete interface that succeeds through adoption first.
associated_patterns:
  - pattern: guard-clause
    reason: >-
      A direct way to check preconditions early and keep the normal path free of invalid cases.
  - pattern: fail-fast
    reason: >-
      Contract violations should surface immediately rather than contaminating later state.
  - pattern: input-validation
    reason: >-
      Boundary validation can establish the preconditions needed before entering contracted code.
  - pattern: contract-testing
    reason: >-
      Verifies that providers and consumers agree on externally visible obligations.
  - pattern: property-based-testing
    reason: >-
      Exercises invariants and postconditions across broad generated input spaces.
  - pattern: specification
    reason: >-
      Encapsulates business rules that can serve as readable, reusable contract predicates.
  - pattern: null-object
    reason: >-
      Replaces null with an object that satisfies the expected interface contract for benign
      absence.
at_odds_patterns:
  - pattern: service-locator
    reason: >-
      Hidden dependencies make the real preconditions of an operation harder to see and reason
      about.
  - pattern: active-record
    reason: >-
      Persistence-coupled objects often blur whether invariants belong to the object, database or
      calling transaction.
successfully_applied:
  - where: Eiffel language and libraries
    what: >-
      Eiffel built contract syntax for preconditions, postconditions and invariants into the
      language, making DbC an executable part of routine and class definitions.
    evidence_strength: primary-source
    source:
      title: Object-Oriented Software Construction
      year: 1988
  - where: Eiffel Software method and tooling
    what: >-
      Meyer's later editions and Eiffel tooling continued to present contracts as the core design
      and verification mechanism for object-oriented systems.
    evidence_strength: primary-source
    source:
      title: "Object-Oriented Software Construction, second edition"
      year: 1997
  - where: Contract-testing practice in service APIs
    what: >-
      Consumer/provider contract tests apply the same responsibility split to distributed service
      interfaces, though usually with examples rather than full formal contracts.
    evidence_strength: inferred
    source:
      title: "Consumer-driven contract testing practice"
best_for:
  - library
  - sdk
  - safety-critical
  - backend-service
criticisms:
  - Runtime contract checks can add overhead or be disabled in production, weakening the guarantee
    if not handled deliberately.
  - Over-specified contracts can make harmless implementation changes difficult.
  - Many mainstream languages lack native contract support, so conventions and libraries may drift
    from the intended discipline.
references:
  - title: Object-Oriented Software Construction
    author: Bertrand Meyer
    year: 1988
  - title: "Object-Oriented Software Construction, second edition"
    author: Bertrand Meyer
    year: 1997
  - title: "Applying Design by Contract"
    author: Bertrand Meyer
    year: 1992
