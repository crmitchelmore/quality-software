id: property-based-thinking
title: Property-Based Thinking
aka:
  - Property-Based Testing
  - QuickCheck lineage
discipline: testing
originators:
  - Koen Claessen
  - John Hughes
origin:
  type: paper
  title: 'QuickCheck: A Lightweight Tool for Random Testing of Haskell Programs'
  year: 2000
short_description: >-
  Specify general properties and invariants, let generators search the input space, and shrink any
  counterexample to the smallest reproducible failure.
description: >-
  Property-based thinking changes testing from enumerating remembered examples to specifying rules
  that should hold for every valid input. The team describes invariants, algebraic laws, round trips,
  ordering guarantees or state-machine rules, then uses generators to create many concrete cases. When
  a property fails, shrinking turns the random failure into a minimal example that developers can
  understand and fix. The philosophy rewards clear domain invariants and deterministic code because
  tests become executable statements of what must never be violated.
core_tenets:
  - Describe domain properties and invariants rather than only hand-picked examples.
  - Use generators to explore normal, boundary and surprising inputs automatically.
  - Record seeds and shrink failures so every discovered counterexample is reproducible and small.
  - Treat weak properties as a design smell; a property should encode meaningful domain knowledge.
key_ideas:
  - name: Generative search
    explanation: >-
      The framework supplies many concrete inputs from a generator, widening the case space beyond what
      a developer would manually remember.
  - name: Shrinking
    explanation: >-
      A failing input is reduced to a smaller equivalent failure so the bug is easier to diagnose and
      keep as a regression test.
in_practice: >-
  Start with laws such as round trips, idempotence, ordering, conservation of money, parser stability
  or state-machine transitions. Build generators that create valid domain objects, keep seeds in CI
  output, and add example tests for important named cases that properties do not explain well.
complements:
  - extreme-programming-tdd
  - design-by-contract
tensions_with:
  - philosophy: mostly-integration-testing
    reason: >-
      Property-based thinking often pays off at deterministic function or model boundaries, while a
      mostly-integration strategy may under-invest in those smaller invariant checks.
associated_patterns:
  - pattern: property-based-testing
    reason: >-
      This is the direct implementation pattern: define properties, generate inputs and shrink
      failures into minimal counterexamples.
  - pattern: arrange-act-assert
    reason: >-
      Even generated tests benefit from a clear setup, operation and property assertion structure.
successfully_applied:
  - where: Haskell QuickCheck ecosystem
    what: >-
      Claessen and Hughes demonstrated a lightweight library for randomly testing Haskell properties,
      establishing the generator-and-shrinker lineage copied by later tools.
    evidence_strength: primary-source
    source:
      title: 'QuickCheck: A Lightweight Tool for Random Testing of Haskell Programs'
      url: https://dl.acm.org/doi/10.1145/351240.351266
      year: 2000
  - where: Python Hypothesis users
    what: >-
      Hypothesis brought property-based testing to Python with explicit generation, shrinking and
      reproducible examples for mainstream application code.
    evidence_strength: primary-source
    source:
      title: Hypothesis documentation
      url: https://hypothesis.readthedocs.io
best_for:
  - parser
  - serializer
  - validator
  - financial-calculation
  - state-machine
criticisms:
  - Meaningful properties are harder to invent than examples and require domain understanding.
  - Poor generators can miss important regions of the input space or create unrealistic data.
  - Stateful workflows need careful modelling before property-based tests remain understandable.
references:
  - title: 'QuickCheck: A Lightweight Tool for Random Testing of Haskell Programs'
    author: Koen Claessen, John Hughes
    year: 2000
    url: https://dl.acm.org/doi/10.1145/351240.351266
  - title: Hypothesis documentation
    author: Hypothesis contributors
    url: https://hypothesis.readthedocs.io
  - title: Property Testing is not Fuzz Testing
    author: Hillel Wayne
    url: https://www.hillelwayne.com/post/property-testing-is-not-fuzz-testing/
