id: classicist-tdd
title: Classicist Test-Driven Development
discipline: testing
aka:
  - Detroit school TDD
  - Chicago school TDD
  - Classical TDD
originators:
  - Kent Beck
origin:
  type: book
  title: Test-Driven Development by Example
  year: 2002
short_description: >-
  Drive design with red-green-refactor tests that prefer state verification and real collaborators,
  using doubles only where dependencies are awkward.
description: >-
  Classicist TDD is the Detroit or Chicago school of test-driven development. It uses the
  red-green-refactor loop to design behaviour incrementally, but generally lets the object under test
  collaborate with real, fast, deterministic neighbours. Tests primarily verify resulting state and
  observable outcomes. Test doubles are still useful, but mainly at awkward boundaries such as time,
  networks, databases, non-determinism or expensive infrastructure.
core_tenets:
  - Write the next failing test before implementation, then make it pass and refactor safely.
  - Prefer real collaborators when they are fast, deterministic and part of the same design surface.
  - Verify state and observable outcomes rather than internal message sequences.
  - Use test doubles at awkward boundaries, not as the default for every collaborator.
  - Treat tests as design feedback about interface usability and coupling.
key_ideas:
  - name: Sociable tests
    explanation: >-
      The system under test can collaborate with real domain objects, which increases confidence that
      the behaviour works as a composed design.
  - name: State verification
    explanation: >-
      The assertion focuses on the final observable result, leaving implementation steps free to
      change during refactoring.
in_practice: >-
  Write small behavioural examples, use real domain collaborators by default, replace only slow or
  non-deterministic collaborators with stubs or fakes, and refactor once the test is green without
  preserving accidental call sequences.
complements:
  - extreme-programming-tdd
  - behaviour-driven-development
tensions_with:
  - philosophy: mockist-tdd
    reason: >-
      Classicist TDD prefers state verification and real collaborators, while mockist TDD uses mock
      expectations to specify collaborator interactions outside-in.
associated_patterns:
  - pattern: arrange-act-assert
    reason: >-
      Makes red-green-refactor examples readable by separating fixture setup, exercised behaviour and
      state assertion.
  - pattern: fake-object
    reason: >-
      Keeps awkward infrastructure out of tests while preserving real behaviour behind a simplified
      implementation.
  - pattern: stub
    reason: >-
      Supplies deterministic answers from query-style dependencies without asserting internal calls.
  - pattern: test-data-builder
    reason: >-
      Keeps sociable tests focused on relevant domain variation while hiding incidental fixture detail.
  - pattern: test-double
    reason: >-
      Provides the vocabulary for choosing a double only when a real collaborator would make the test
      slow, unreliable or hard to control.
successfully_applied:
  - where: xUnit and Extreme Programming practice
    what: >-
      Beck's TDD by Example and XP work made red-green-refactor, programmer tests and refactoring
      safety a mainstream agile development discipline.
    evidence_strength: primary-source
    source:
      title: Test-Driven Development by Example
      year: 2002
  - where: Fowler's classical TDD description
    what: >-
      Fowler documents classical TDD as the style that usually avoids mocks unless they are necessary,
      contrasting it with mockist test-driven development.
    evidence_strength: secondary-source
    source:
      title: Mocks Aren't Stubs
      url: https://martinfowler.com/articles/mocksArentStubs.html
      year: 2007
references:
  - title: Test-Driven Development by Example
    author: Kent Beck
    year: 2002
  - title: TestDrivenDevelopment
    author: Martin Fowler
    year: 2023
    url: https://martinfowler.com/bliki/TestDrivenDevelopment.html
  - title: Mocks Aren't Stubs
    author: Martin Fowler
    year: 2007
    url: https://martinfowler.com/articles/mocksArentStubs.html
