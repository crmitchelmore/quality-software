id: risk-based-testing
title: Risk-Based Testing
aka:
  - Value-Based Testing
discipline: testing
originators:
  - James Bach
  - Rex Black
  - Michael Bolton
origin:
  type: tradition
  title: Risk-based and context-driven testing tradition
  era: 1990s-2000s
short_description: >-
  Allocate test effort by risk and value, concentrating depth where probability multiplied by impact is
  highest instead of spreading tests uniformly.
description: >-
  Risk-based testing treats testing as a scarce resource allocation problem. Since exhaustive testing is
  impossible, the team identifies what could fail, estimates likelihood and impact, and spends the most
  design, automation and exploratory effort where failures would hurt users, safety, revenue or trust.
  Low-impact stable areas may receive lighter coverage by explicit choice. The philosophy fits both
  traditional QA and continuous delivery when risk analysis is kept visible and revisited as the product
  and architecture change.
core_tenets:
  - Identify product, technical, safety, security and business risks before choosing test depth.
  - Prioritise scenarios by probability of failure multiplied by impact of failure.
  - Make accepted under-testing explicit rather than pretending all areas receive equal confidence.
  - Revisit the risk model when incidents, architecture changes or new usage patterns alter exposure.
key_ideas:
  - name: Risk exposure
    explanation: >-
      Testing effort follows the expected harm of failure, not the number of lines of code or the ease of
      automating a path.
  - name: Context-driven judgement
    explanation: >-
      Test choices depend on product context, domain expertise and observed failures rather than fixed
      universal ratios.
in_practice: >-
  Maintain a lightweight risk register or risk map, tag automated tests by risk area, strengthen
  coverage after production defects, and use exploratory sessions for high-risk behaviours where a test
  oracle is difficult to encode.
complements:
  - continuous-delivery-lean
  - mostly-integration-testing
tensions_with:
  - philosophy: extreme-programming-tdd
    reason: >-
      TDD encourages testing each next behaviour as part of design, while risk-based testing may
      deliberately leave low-impact behaviours with lighter automated coverage.
associated_patterns:
  - pattern: test-pyramid
    reason: >-
      Helps allocate risk coverage across cheap and expensive layers instead of overusing end-to-end
      tests for every scenario.
  - pattern: given-when-then
    reason: >-
      Makes high-risk business scenarios explicit and reviewable with stakeholders.
  - pattern: contract-testing
    reason: >-
      Targets high-impact service compatibility risks before provider or consumer deployments.
successfully_applied:
  - where: ISTQB testing curriculum and certification practice
    what: >-
      Risk-based testing is embedded as a standard approach for prioritising test analysis, design and
      execution when exhaustive testing is not possible.
    evidence_strength: secondary-source
    source:
      title: ISTQB Foundation Level Syllabus
      url: https://www.istqb.org/certifications/certified-tester-foundation-level
  - where: Context-driven testing practice
    what: >-
      Bach and Bolton's rapid software testing tradition uses risk and context to guide exploratory and
      scripted testing effort rather than applying a single universal process.
    evidence_strength: primary-source
    source:
      title: Risk-Based Testing
      url: https://www.satisfice.com/articles/risk-based-testing
best_for:
  - regulated-system
  - safety-critical-system
  - fintech
  - large-product-suite
  - legacy-modernisation
criticisms:
  - Risk scoring is subjective and can be distorted by missing domain knowledge or organisational incentives.
  - It says where to test more than how to design the tests.
  - Informal risk-based testing can become invisible intuition unless risks are documented and reviewed.
references:
  - title: Critical Testing Processes
    author: Rex Black
    year: 2003
  - title: Risk-Based Testing
    author: James Bach
    url: https://www.satisfice.com/articles/risk-based-testing
  - title: ISTQB Foundation Level Syllabus
    author: ISTQB
    url: https://www.istqb.org/certifications/certified-tester-foundation-level
  - title: TestPyramid
    author: Martin Fowler
    year: 2012
    url: https://martinfowler.com/bliki/TestPyramid.html
