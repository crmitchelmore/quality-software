id: customer-development
title: Customer Development
discipline: product
aka:
  - Four Steps to the Epiphany
  - CustDev
originators:
  - Steve Blank
origin:
  type: book
  title: "The Four Steps to the Epiphany"
  year: 2005
short_description: >-
  Replace product-plan execution with systematic customer discovery, validation, creation and company-building,
  proving that a market and repeatable sales process exist before scaling.
description: >-
  Customer Development is Steve Blank's method for startups operating under extreme uncertainty. Its central
  claim is that startups are not small versions of large companies: they are temporary organisations searching
  for a repeatable, scalable business model. Instead of writing a business plan and executing it internally,
  founders must get out of the building, test hypotheses with prospects, and use evidence to decide whether to
  pivot or proceed. The four steps — customer discovery, customer validation, customer creation and company
  building — separate learning from scaling so teams do not prematurely optimise a product or go-to-market motion
  that customers do not value.
core_tenets:
  - Startups search for a repeatable and scalable business model; established companies execute one.
  - Get out of the building and test assumptions with real customers, not internal opinions.
  - Separate customer discovery and validation from demand creation and company scaling.
  - Treat business-model components as hypotheses to be tested, revised or abandoned.
  - Do not scale sales, marketing or hiring until the product and selling process have been validated.
key_ideas:
  - name: Four steps
    explanation: >-
      Customer discovery, customer validation, customer creation and company building form a staged learning
      process from problem evidence to scalable execution.
  - name: Customer validation
    explanation: >-
      Proof that a target segment will buy through a repeatable sales process, not merely that interviewees like
      the idea.
  - name: Pivot
    explanation: >-
      A substantive change to customer, problem, channel, pricing or product hypotheses when evidence contradicts
      the current model.
in_practice: >-
  State the customer, problem, value proposition, channel and revenue hypotheses explicitly; interview and observe
  prospects; test buying intent with pilots, letters of intent or early sales; revise the model when evidence fails;
  and postpone heavy scaling until a repeatable acquisition and fulfilment pattern is visible.
complements:
  - lean-startup
  - hypothesis-driven-development
  - jobs-to-be-done
tensions_with:
  - philosophy: conceptual-integrity
    reason: >-
      Repeated customer-driven pivots can conflict with preserving a singular, internally coherent product vision.
associated_practice_patterns:
  - pattern: continuous-interviewing
    reason: >-
      Ongoing customer conversations operationalise Blank's instruction to get out of the building and replace
      assumptions with market evidence.
  - pattern: the-mom-test
    reason: >-
      Behaviour-focused interviewing helps avoid the false positives that Customer Development warns against.
  - pattern: business-model-canvas
    reason: >-
      The canvas makes the business-model hypotheses explicit enough to test during discovery and validation.
successfully_applied:
  - where: Lean Startup movement and startup accelerators
    what: >-
      Customer Development became a foundation for Lean Startup practice and is taught through startup courses and
      accelerators as the standard customer-learning method.
    evidence_strength: secondary-source
    source:
      title: "The Lean Startup"
      year: 2011
  - where: Steve Blank's startup and teaching practice
    what: >-
      Blank developed the model from repeated startup experience and codified it in his customer development
      texts and entrepreneurship curricula.
    evidence_strength: primary-source
    source:
      title: "The Four Steps to the Epiphany"
      year: 2005
best_for:
  - early-stage-startups
  - new-market-entry
  - business-model-risk
criticisms:
  - Customer interviews can still mislead if teams ask about opinions rather than behaviour or purchasing evidence.
  - The method is less prescriptive for mature products where the business model is already known and optimisation is the main work.
  - Founders sometimes over-index on what current prospects say and underweight strategic vision or latent demand.
references:
  - title: "The Four Steps to the Epiphany"
    author: Steve Blank
    year: 2005
  - title: "The Startup Owner's Manual"
    author: Steve Blank and Bob Dorf
    year: 2012
