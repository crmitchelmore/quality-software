id: hypothesis-driven-development
title: Hypothesis-Driven Development
discipline: product
aka:
  - HDD
  - Evidence-Based Development
originators:
  - Barry O'Reilly
origin:
  type: method
  title: "Hypothesis-Driven Development"
  era: 2010s
short_description: >-
  Express product and delivery bets as falsifiable hypotheses, run experiments to test them, and use evidence rather
  than opinion to decide what to build next.
description: >-
  Hypothesis-Driven Development brings scientific framing to product work: teams state what they believe will happen,
  why it matters, how they will test it and what evidence will change their decision. Associated with Barry O'Reilly's
  lean and evidence-based product practice, it extends Lean Startup thinking into day-to-day feature and capability
  development. Instead of treating requirements as facts, teams expose assumptions about customer value, usability,
  feasibility and business impact, then select experiments proportionate to risk.
core_tenets:
  - Every significant product bet rests on assumptions that should be made explicit.
  - Hypotheses should be falsifiable, measurable and tied to a decision.
  - Experiments should be as small as possible while still producing decision-quality evidence.
  - Evidence should determine whether to persevere, pivot, scale or stop a solution.
  - Learning is only useful when it changes prioritisation, design or investment.
key_ideas:
  - name: Hypothesis statement
    explanation: >-
      A clear belief about an intervention, target audience and expected measurable change, written so it can be
      tested.
  - name: Assumption mapping
    explanation: >-
      A way to identify which assumptions are most uncertain and most critical, making them candidates for early
      experiments.
  - name: Experiment design
    explanation: >-
      Choosing the lightest credible test — interview, prototype, fake door, A/B test or release — that can inform
      the decision at hand.
in_practice: >-
  List assumptions behind a product idea; rank them by risk and uncertainty; write a hypothesis with success and
  failure thresholds; choose an experiment such as an A/B test, fake door, concierge MVP or prototype; collect data;
  and explicitly decide whether to continue, change direction or stop.
complements:
  - lean-startup
  - customer-development
  - continuous-discovery
tensions_with:
  - philosophy: working-backwards
    reason: >-
      A strong future narrative can encourage commitment to a solution, while hypothesis-driven work keeps the idea
      provisional until evidence validates the riskiest assumptions.
associated_practice_patterns:
  - pattern: ab-test-design
    reason: >-
      Controlled experiments are a common way to test hypotheses about product changes against behavioural metrics.
  - pattern: assumption-mapping
    reason: >-
      Mapping assumptions identifies which beliefs should be tested before further investment.
  - pattern: hypothesis-statement
    reason: >-
      Explicit hypothesis statements make product bets testable rather than implicit requirements.
successfully_applied:
  - where: Lean Enterprise and enterprise product teams
    what: >-
      O'Reilly, Humble and Molesky describe hypothesis-led experiments as a core mechanism for improving product and
      organisational decisions in lean enterprises.
    evidence_strength: primary-source
    source:
      title: "Lean Enterprise"
      year: 2015
  - where: Digital experimentation programmes
    what: >-
      Product experimentation teams commonly use hypothesis templates and A/B tests to decide whether changes improve
      customer behaviour and business metrics.
    evidence_strength: secondary-source
    source:
      title: "Trustworthy Online Controlled Experiments"
      year: 2020
best_for:
  - product-experimentation
  - reducing-assumption-risk
  - evidence-based-roadmapping
criticisms:
  - Not all valuable product work can be cleanly tested with short-cycle experiments or statistical significance.
  - Teams may optimise measurable local hypotheses while missing broader strategic or qualitative value.
  - Bad experiment design can create false confidence and worse decisions than explicit judgement would have.
references:
  - title: "Lean Enterprise"
    author: Jez Humble, Joanne Molesky and Barry O'Reilly
    year: 2015
  - title: "Unlearn"
    author: Barry O'Reilly
    year: 2018
  - title: "Trustworthy Online Controlled Experiments"
    author: Ron Kohavi, Diane Tang and Ya Xu
    year: 2020
